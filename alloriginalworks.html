<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>日本原作目録</title>

<style>

/* ===============================
   BASE
================================= */
body {
  font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans JP", Arial, sans-serif;
  padding: 30px;
  background: #f4f5f7;
  color: #222;
}

/* ===============================
   HEADER
================================= */
.page-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 35px;
  padding-bottom: 12px;
  border-bottom: 1px solid #ddd;
}

.site-title {
  margin: 0;
  font-size: 26px;
  font-weight: 700;
}

.header-link {
  text-decoration: none;
  font-size: 13px;
  padding: 7px 14px;
  border-radius: 6px;
  background: #fff;
  color: #333;
  border: 1px solid #ddd;
  transition: 0.2s ease;
}

.header-link:hover {
  background: #222;
  color: #fff;
  border-color: #222;
}

/* ===============================
   TOP FILTERS (Sticky)
================================= */
.top-filters {
  background: #fff;
  padding: 18px 20px;
  border-radius: 10px;
  margin-bottom: 25px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.05);
  position: sticky;
  top: 0;
  z-index: 1000;
}

.filter-row {
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
  align-items: center;
}

.filter-row-top {
  margin-bottom: 18px;
}

#clearFiltersBtn {
  padding: 6px 14px;
  font-size: 12px;
  border-radius: 20px;
  border: 1px solid #ccc;
  background: #fff;
  cursor: pointer;
}

#clearFiltersBtn:hover {
  background: #222;
  color: #fff;
}

.search-wrapper {
  position: relative;
  flex: 1 1 280px;
  max-width: 420px;
}

.search-wrapper input {
  width: 100%;
  padding: 7px 30px 7px 12px;
  border-radius: 20px;
  border: 1px solid #ccc;
}

.clear-btn {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #aaa;
  display: none;
}

.clear-btn:hover {
  color: #000;
}

.result-count {
  font-size: 12px;
  color: #666;
}

.filter-dropdown {
  display: flex;
  flex-direction: column;
  font-size: 12px;
  min-width: 170px;
}

.filter-dropdown label {
  font-weight: 600;
  margin-bottom: 4px;
  font-size: 11px;
  color: #666;
}

.filter-dropdown select {
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* ===============================
   TABLE
================================= */
.content {
  overflow-x: auto;
}

.data-table {
  border-collapse: collapse;
  background: #fff;
  font-size: 12.5px;
  width: 100%;
}

.data-table th,
.data-table td {
  padding: 6px 10px;
  text-align: left;
  white-space: nowrap;
}

.data-table th {
  background: #fafafa;
  font-weight: 600;
  border-bottom: 2px solid #ddd;
  cursor: pointer;
}

.data-table th:hover {
  background: #f0f0f0;
}

.data-table td {
  border-bottom: 1px solid #eee;
}

.data-table tr:hover td {
  background: #f9fafc;
}

/* ===============================
   PAGINATION
================================= */
#pagination {
  margin-top: 25px;
  text-align: center;
  font-size: 12px;
}

#pagination button {
  margin: 0 4px;
  padding: 5px 10px;
  border: 1px solid #ddd;
  background: #fff;
  cursor: pointer;
  border-radius: 6px;
}

#pagination button:hover:not(:disabled) {
  background: #222;
  color: #fff;
}

.active-page {
  background: #222 !important;
  color: #fff;
}

/* ===============================
   MODAL
================================= */
.modal-box {
  background: #fff;
  width: 90%;
  max-width: 950px;
  margin: 4% auto;
  padding: 25px;
  border-radius: 12px;
}

.detail-container {
  display: flex;
  gap: 25px;
}

.detail-left {
  width: 35%;
}

.detail-left img {
  width: 100%;
  object-fit: contain;
}

.detail-right {
  width: 65%;
}

/* ===============================
   RESPONSIVE
================================= */
@media (max-width: 900px) {
  body {
    padding: 18px;
  }

  .filter-row {
    flex-direction: column;
    align-items: stretch;
  }

  .detail-container {
    flex-direction: column;
  }

  .detail-left,
  .detail-right {
    width: 100%;
  }
}

</style>
</head>

<body>

<header class="page-header">
  <div class="header-left">
    <h1 class="site-title">日本原作目録</h1>
  </div>

  <div class="header-right">
    <a href="Publish.html" class="header-link">香港出版目録</a>
  </div>
    <div class="header-right">
    <a href="PublishJP.html" class="header-link">日本出版目録</a>
  </div>
</header>

<!-- TOP FILTERS -->
<div class="top-filters">

  <!-- ROW 1 : Search + Clear -->
  <div class="filter-row filter-row-top">
    <button id="clearFiltersBtn" onclick="clearAllFilters()">
      清除所有篩選
    </button>

    <div class="search-wrapper">
      <input type="text"
             id="searchInput"
             placeholder="任何文字搜尋..."
             oninput="handleSearchInput()">
      <span class="clear-btn" onclick="clearSearch()">×</span>
    </div>

    <div id="resultCount" class="result-count"></div>
  </div>

  <!-- ROW 2 : All Dropdown Filters -->
  <div class="filter-row filter-row-bottom">

    <div class="filter-dropdown">
      <label>初出掲載誌</label>
      <select id="magazineFilter" onchange="applyFilters()">
        <option value="">全部</option>
      </select>
    </div>

    <div class="filter-dropdown">
      <label>単行本系列</label>
      <select id="tankobonFilter" onchange="applyFilters()">
        <option value="">全部</option>
      </select>
    </div>

    <div class="filter-dropdown">
      <label>その他単行本</label>
      <select id="othertankobonFilter" onchange="applyFilters()">
        <option value="">全部</option>
      </select>
    </div>

    <div class="filter-dropdown">
      <label>文庫系列</label>
      <select id="bunkobonFilter" onchange="applyFilters()">
        <option value="">全部</option>
      </select>
    </div>

    <div class="filter-dropdown">
      <label>ぴっかぴかコミックススペシャル</label>
      <select id="pikkapikaFilter" onchange="applyFilters()">
        <option value="">全部</option>
      </select>
    </div>

    <div class="filter-dropdown">
      <label>大全集</label>
      <select id="completeCollectionFilter" onchange="applyFilters()">
        <option value="">全部</option>
      </select>
    </div>

  </div>

</div>
<!-- MAIN CONTENT -->
<main class="content">
  <div id="pagination"></div>
  <div class="grid" id="mangalist">Loading...</div>
</main>

<script>
const SHEET_URL = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/作品完整列表";
let sheetData = [];
let currentPage = 1;
const itemsPerPage = 30;   // change this to 8, 16, etc.
let currentList = [];      // you already use this for modal nav
let currentSortColumn = null;
let currentSortDirection = "asc"; // "asc" or "desc"

fetch(SHEET_URL)
  .then(res => res.json())
  .then(data => {

    // Only keep Active = Yes
    sheetData = data.filter(row => 
      row.掲載番 != null && row.掲載番 !== ""
    );
    populateMagazine(); 
    populateTankobon(); 
    populateBunkobon();
    populateOtherTankobon();
    populatePikkapika();
    populateCompleteCollection();
    applyFilters();
  })
  .catch(error => {
    document.getElementById("mangalist").innerHTML = "Failed to load data.";
    console.error(error);
  });

function clearAllFilters() {
  // Clear search input
  const searchInput = document.getElementById("searchInput");
  searchInput.value = "";

  // Clear all dropdown filters
  const dropdowns = [
    'magazineFilter',
    'tankobonFilter',
    'othertankobonFilter',
    'bunkobonFilter',
    'pikkapikaFilter',
    'completeCollectionFilter'
  ];

  dropdowns.forEach(id => {
    const select = document.getElementById(id);
    if (select) select.value = "";
  });

  // Hide the clear (×) button in search
  const clearBtn = document.querySelector(".clear-btn");
  if (clearBtn) clearBtn.style.display = "none";

  // Re-apply filters
  applyFilters();
}

function populateMagazine() {
  const container = document.getElementById("magazineFilter");
  if (!container) return;

  const magazines = [...new Set(sheetData.map(row => row.初出掲載誌))];

  magazines.forEach(mag => {
    const option = document.createElement("option");
    option.value = mag;
    option.textContent = mag;
    container.appendChild(option);
  });
}

function populateTankobon() {
  const container = document.getElementById("tankobonFilter");
  if (!container) return;

  const tankobons = [...new Set(sheetData.map(row => row.単行本))];

  tankobons.forEach(tkb => {
    const option = document.createElement("option");
    option.value = tkb;
    option.textContent = tkb;
    container.appendChild(option);
  });
}
  
function populateOtherTankobon() {
  const container = document.getElementById("othertankobonFilter");
  const othertankobons = [...new Set(sheetData.map(row => row.その他単行本))];

  othertankobons.forEach(otkb => {
    const option = document.createElement("option");
    option.value = otkb;
    option.textContent = otkb;
    container.appendChild(option);
  });
}

function populateBunkobon() {
  const container = document.getElementById("bunkobonFilter");
  const bunkobons = [...new Set(sheetData.map(row => row.文庫))];

  bunkobons.forEach(bkb => {
    const option = document.createElement("option");
    option.value = bkb;
    option.textContent = bkb;
    container.appendChild(option);
  });
}



function populatePikkapika() {
  const container = document.getElementById("pikkapikaFilter");
  const pikkapikas = [...new Set(sheetData.map(row => row.ぴっかぴかコミックススペシャル))];

  pikkapikas.forEach(pkpk => {
    const option = document.createElement("option");
    option.value = pkpk;
    option.textContent = pkpk;
    container.appendChild(option);
  });
}

function populateCompleteCollection() {
  const container = document.getElementById("completeCollectionFilter");
  const completeCollections = [...new Set(sheetData.map(row => row.大全集))];

  completeCollections.forEach(cc => {
    const option = document.createElement("option");
    option.value = cc;
    option.textContent = cc;
    container.appendChild(option);
  });
}

function openDetail(id) {

  currentIndex = currentList.findIndex(d => d.ISBN === id);
  const detail = currentList[currentIndex];

  if (!detail) {
    document.getElementById("detailContent").innerHTML =
      "No detail found.";
  } else {
    document.getElementById("detailContent").innerHTML = `
  <div class="detail-container">

    <div class="detail-left">
      <img src="${detail.Image || ""}" 
      alt="${detail.標題} ${detail.巻}"      
      onclick="openLightbox('${detail.Image}')"
      style="cursor: zoom-in;">
    </div>

    <div class="detail-right">
      <h1>${detail.標題 || ""} ${detail.巻 || ""}</h1>
      <h2>${detail.副標題 || ""}</h2>
      <div class="detail-row"><strong>系列: </strong>${detail.系列 || ""}</div>  
      <div class="detail-row"><strong>著: </strong>${detail.著 || ""}</div>
      <div class="detail-row"><strong>話: </strong> ${detail.話 || ""}</div>
      <div class="detail-row"><strong>判型: </strong> ${detail.判型 || ""}</div>
      <div class="detail-row date"><strong>初版発行日: </strong> ${detail.初版発行日 || ""}</div>
      <div class="detail-row price"><strong>定価: </strong> $¥{detail.定価 || ""}</div>
      <div class="detail-row"><strong>頁: </strong> ${detail.頁 || ""}</div>   
      <div class="detail-row"><strong>ISBN:</strong> ${detail.ISBN || ""}</div>
    </div>

  </div>
  <button onclick="prevItem()" style="position:absolute; left:10px; top:50%;">◀</button>
  <button onclick="nextItem()" style="position:absolute; right:10px; top:50%;">▶</button>
    `;
  }

  document.getElementById("detailModal").style.display = "block";
}

function handleSearchInput() {
  const input = document.getElementById("searchInput");
  const clearBtn = document.querySelector(".clear-btn");

  clearBtn.style.display = input.value ? "block" : "none";
  applyFilters();
}

function clearSearch() {
  const input = document.getElementById("searchInput");
  const clearBtn = document.querySelector(".clear-btn");

  input.value = "";
  clearBtn.style.display = "none";
  applyFilters();
}

function sortBy(column) {

  if (currentSortColumn === column) {
    currentSortDirection = currentSortDirection === "asc" ? "desc" : "asc";
  } else {
    currentSortColumn = column;
    currentSortDirection = "asc";
  }

  currentList.sort((a, b) => {
    let valA = a[column] || "";
    let valB = b[column] || "";

    // Try numeric compare first
    if (!isNaN(valA) && !isNaN(valB)) {
      return currentSortDirection === "asc"
        ? Number(valA) - Number(valB)
        : Number(valB) - Number(valA);
    }

    // Otherwise string compare
    return currentSortDirection === "asc"
      ? valA.toString().localeCompare(valB.toString(), 'ja')
      : valB.toString().localeCompare(valA.toString(), 'ja');
  });

  currentPage = 1;
  renderPage();
}

function closeModal() {
  document.getElementById("detailModal").style.display = "none";
}

function openLightbox(src) {
  document.getElementById("lightboxImg").src = src;
  document.getElementById("imageLightbox").style.display = "flex";
}

function closeLightbox() {
  document.getElementById("imageLightbox").style.display = "none";
}

function nextItem() {
  if (currentIndex < currentList.length - 1) {
    currentIndex++;
    openDetail(currentList[currentIndex].ISBN);
  }
}

function prevItem() {
  if (currentIndex > 0) {
    currentIndex--;
    openDetail(currentList[currentIndex].ISBN);
  }
}
  
function applyFilters() {

  const search = document.getElementById("searchInput").value.toLowerCase();
  const magazine = document.getElementById('magazineFilter').value;
  const tankobon = document.getElementById('tankobonFilter').value;
  const othertankobo = document.getElementById('othertankobonFilter').value;
  const bunkobon = document.getElementById('bunkobonFilter').value;
  const pikkapika = document.getElementById('pikkapikaFilter').value;
  const completeCollection = document.getElementById('completeCollectionFilter').value;

  let filtered = sheetData.filter(row => {

    const searchMatch = Object.values(row)
      .join(" ")
      .toLowerCase()
      .includes(search);

    const magazineMatch = !magazine || row.初出掲載誌 === magazine;
    const tankobonMatch = !tankobon || row.単行本 === tankobon;
    const bunkobonMatch = !bunkobon || row.文庫 === bunkobon;
    const othertankoboMatch = !othertankobo || row.その他単行本 === othertankobo;
    const pikkapikaMatch = !pikkapika || row.ぴっかぴかコミックススペシャル === pikkapika;
    const completeCollectionMatch = !completeCollection || row.大全集 === completeCollection;

    return searchMatch && magazineMatch && tankobonMatch && bunkobonMatch && othertankoboMatch && pikkapikaMatch && completeCollectionMatch;
  });

  currentList = filtered;
  currentPage = 1; // reset to first page when filtering

  document.getElementById("resultCount").textContent = `共 ${filtered.length} 本作品`;
  renderPage();
}

function renderPage() {

  const start = (currentPage - 1) * itemsPerPage;
  const end = start + itemsPerPage;
  const pageItems = currentList.slice(start, end);

let html = `
  <table class="data-table">
    <thead>
      <tr>
        ${createSortableHeader("初出掲載誌")}
        ${createSortableHeader("初出掲載号")}
        ${createSortableHeader("初出掲載頁")}
        ${createSortableHeader("初出副題")}
        ${createSortableHeader("全集副題")}
        ${createSortableHeader("全集副題香港譯名")}
        ${createSortableHeader("単行本")}
        ${createSortableHeader("その他単行本")}
        ${createSortableHeader("文庫")}
        ${createSortableHeader("兒童版")}
        ${createSortableHeader("大全集")}
        ${createSortableHeader("備考")}
      </tr>
    </thead>
    <tbody>
`;

  html += pageItems.map(row => `
    <tr>
      <td>${row.初出掲載誌 || ""}</td>
      <td>${row.初出掲載号 || ""}</td>
      <td>${row.初出掲載頁 || ""}</td>
      <td>${row.初出副題 || ""}</td>
      <td>${row.全集副題 || ""}</td>
      <td>${row.全集副題香港譯名 || ""}</td>
      <td>${row.単行本 || ""}</td>
      <td>${row.その他単行本 || ""}</td>
      <td>${row.文庫 || ""}</td>
      <td>${row.兒童版 || ""}</td>
      <td>${row.大全集 || ""}</td>
      <td>${row.備考 || ""}</td>
    </tr>
  `).join("");

  html += `
      </tbody>
    </table>
  `;

  document.getElementById("mangalist").innerHTML =
    pageItems.length ? html : "No Manga found.";

  renderPaginationControls();
}

function createSortableHeader(columnName) {

  let arrow = "";

  if (currentSortColumn === columnName) {
    arrow = currentSortDirection === "asc" ? " ▲" : " ▼";
  }

  return `<th onclick="sortBy('${columnName}')" style="cursor:pointer;">
            ${columnName}${arrow}
          </th>`;
}
  
function renderPaginationControls() {

  const totalPages = Math.ceil(currentList.length / itemsPerPage);

  if (totalPages <= 1) {
    document.getElementById("pagination").innerHTML = "";
    return;
  }

  let html = "";

  // ----- Page Info -----
  html += `<div style="margin-bottom:10px;">
             Page ${currentPage} of ${totalPages}
           </div>`;

  // ----- First -----
  html += `
    <button onclick="changePage(1)" ${currentPage === 1 ? "disabled" : ""}>
      &laquo; First
    </button>
  `;

  // ----- Prev -----
  html += `
    <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? "disabled" : ""}>
      &lsaquo; Prev
    </button>
  `;

  // ----- Page Numbers Logic -----

  const maxVisible = 5;
  let startPage = Math.max(1, currentPage - 2);
  let endPage = Math.min(totalPages, currentPage + 2);

  // Adjust window if near edges
  if (currentPage <= 3) {
    endPage = Math.min(totalPages, maxVisible);
  }

  if (currentPage >= totalPages - 2) {
    startPage = Math.max(1, totalPages - (maxVisible - 1));
  }

  // Always show page 1
  if (startPage > 1) {
    html += `<button onclick="changePage(1)">1</button>`;
    if (startPage > 2) {
      html += `<span class="ellipsis">...</span>`;
    }
  }

  // Middle Pages
  for (let i = startPage; i <= endPage; i++) {
    html += `
      <button onclick="changePage(${i})"
        ${i === currentPage ? "class='active-page'" : ""}>
        ${i}
      </button>
    `;
  }

  // Always show last page
  if (endPage < totalPages) {
    if (endPage < totalPages - 1) {
      html += `<span class="ellipsis">...</span>`;
    }
    html += `<button onclick="changePage(${totalPages})">${totalPages}</button>`;
  }

  // ----- Next -----
  html += `
    <button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? "disabled" : ""}>
      Next &rsaquo;
    </button>
  `;

  // ----- Last -----
  html += `
    <button onclick="changePage(${totalPages})" ${currentPage === totalPages ? "disabled" : ""}>
      Last &raquo;
    </button>
  `;

  document.getElementById("pagination").innerHTML = html;
}

function changePage(page) {

  const totalPages = Math.ceil(currentList.length / itemsPerPage);

  if (page < 1 || page > totalPages) return;

  currentPage = page;
  renderPage();

  window.scrollTo({ top: 0, behavior: "smooth" });
}

  
  document.addEventListener("contextmenu", function(e) {
    if (e.target.tagName === "IMG") {
      e.preventDefault();
    }
  });
  document.addEventListener("keydown", function(e) {
    if (e.key === "F12") {
      e.preventDefault();
    }
  });
</script>
<div id="detailModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6);">
  <div class="modal-box">
    <button onclick="closeModal()" style="position:absolute; right:10px; top:10px;">X</button>
    <div id="detailContent"></div>
  </div>
</div>

<div id="imageLightbox" onclick="closeLightbox()" style="
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:2000;
">
  <img id="lightboxImg" style="
    max-width:90%;
    max-height:90%;
    object-fit:contain;
    cursor:zoom-out;
  ">
</div>
</body>
</html>
