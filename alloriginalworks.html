<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>日本原作目録</title>

<style>

/* ===============================
   BASE
================================= */
body {
  font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans JP", Arial, sans-serif;
  padding: 30px;
  background: #f4f5f7;
  color: #222;
}

/* ===============================
   HEADER
================================= */
.page-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 35px;
  padding-bottom: 12px;
  border-bottom: 1px solid #ddd;
}

.site-title {
  margin: 0;
  font-size: 26px;
  font-weight: 700;
}

.header-link {
  text-decoration: none;
  font-size: 13px;
  padding: 7px 14px;
  border-radius: 6px;
  background: #fff;
  color: #333;
  border: 1px solid #ddd;
  transition: 0.2s ease;
}

.header-link:hover {
  background: #222;
  color: #fff;
  border-color: #222;
}

/* ===============================
   TOP FILTERS (Sticky)
================================= */
.top-filters {
  background: #fff;
  padding: 18px 20px;
  border-radius: 10px;
  margin-bottom: 25px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.05);
  position: sticky;
  top: 0;
  z-index: 1000;
}

.filter-row {
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
  align-items: center;
}

.filter-row-top {
  display: flex;
  align-items: center;
  gap: 15px;
}

/* Result count stays fixed on right */
.result-count {
  white-space: nowrap;
  flex-shrink: 0;
  margin-left: 20px;
}

#clearFiltersBtn {
  padding: 6px 14px;
  font-size: 12px;
  border-radius: 20px;
  border: 1px solid #ccc;
  background: #fff;
  cursor: pointer;
  flex-shrink: 0;        /* Prevent shrinking */
  min-width: 80px;       /* Ensure it's clickable */
  z-index: 1;            /* Above other items if overlapping */
}

#clearFiltersBtn:hover {
  background: #222;
  color: #fff;
}

.search-wrapper {
  position: relative;
  flex: 1 1 280px;
  max-width: 420px;
  margin-left: 10px;
  margin-right: auto;
}

.search-wrapper input {
  width: 100%;
  padding: 7px 30px 7px 12px;
  border-radius: 20px;
  border: 1px solid #ccc;
}

.clear-btn {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #aaa;
  display: none;
}

.clear-btn:hover {
  color: #000;
}

.result-count {
  font-size: 12px;
  color: #666;
}

.filter-dropdown {
  display: flex;
  flex-direction: column;
  font-size: 12px;
  min-width: 170px;
}

.filter-dropdown label {
  font-weight: 600;
  margin-bottom: 4px;
  font-size: 11px;
  color: #666;
}

.filter-dropdown select {
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* ===============================
   TABLE
================================= */
.content {
  overflow-x: auto;
}

.data-table {
  border-collapse: collapse;
  background: #fff;
  font-size: 12.5px;
  width: 100%;
}

.data-table th,
.data-table td {
  padding: 6px 10px;
  text-align: left;
  white-space: nowrap;
}

.data-table th {
  background: #fafafa;
  font-weight: 600;
  border-bottom: 2px solid #ddd;
  cursor: pointer;
}

.data-table th:hover {
  background: #f0f0f0;
}

.data-table td {
  border-bottom: 1px solid #eee;
}

.data-table tr:hover td {
  background: #f9fafc;
}

/* ===============================
   PAGINATION
================================= */
#pagination {
  margin-top: 25px;
  text-align: center;
  font-size: 12px;
}

#pagination button {
  margin: 0 4px;
  padding: 5px 10px;
  border: 1px solid #ddd;
  background: #fff;
  cursor: pointer;
  border-radius: 6px;
}

#pagination button:hover:not(:disabled) {
  background: #222;
  color: #fff;
}

.active-page {
  background: #222 !important;
  color: #fff;
}

/* ===============================
   MODAL
================================= */
.modal-box {
  background: #fff;
  width: 90%;
  max-width: 950px;
  margin: 4% auto;
  padding: 25px;
  border-radius: 12px;
}

.detail-container {
  display: flex;
  gap: 25px;
}

.detail-left {
  width: 35%;
}

.detail-left img {
  width: 100%;
  object-fit: contain;
}

.detail-right {
  width: 65%;
}

/* ===============================
   RESPONSIVE
================================= */
@media (max-width: 900px) {
  body {
    padding: 18px;
  }

  .filter-row {
    flex-direction: column;
    align-items: stretch;
  }

  .detail-container {
    flex-direction: column;
  }

  .detail-left,
  .detail-right {
    width: 100%;
  }
}
/* ===============================
   DARK MODE
================================= */
body.dark {
  background: #121212;
  color: #e0e0e0;
}

body.dark .page-header {
  border-bottom: 1px solid #333;
}

body.dark .header-link {
  background: #1e1e1e;
  color: #ddd;
  border: 1px solid #333;
}

body.dark .header-link:hover {
  background: #fff;
  color: #000;
}

body.dark .top-filters,
body.dark .data-table,
body.dark .modal-box {
  background: #1e1e1e;
  color: #ddd;
}

body.dark .filter-dropdown select,
body.dark .search-wrapper input,
body.dark #clearFiltersBtn {
  background: #2a2a2a;
  color: #ddd;
  border: 1px solid #444;
}

body.dark .data-table th {
  background: #222;
  border-bottom: 2px solid #444;
}

body.dark .data-table td {
  border-bottom: 1px solid #333;
}

body.dark .data-table tr:hover td {
  background: #2a2a2a;
}

body.dark #pagination button {
  background: #2a2a2a;
  border: 1px solid #444;
  color: #ddd;
}

body.dark #pagination button:hover:not(:disabled) {
  background: #fff;
  color: #000;
}

.top-filters {
  position: sticky;
  top: 0;
  z-index: 1000;
}

/* ===============================
   RESIZABLE COLUMNS
================================= */
.data-table th {
  position: relative;
}

.resizer {
  position: absolute;
  right: 0;
  top: 0;
  width: 5px;
  height: 100%;
  cursor: col-resize;
  user-select: none;
}

.resizer:hover {
  background: rgba(0,0,0,0.2);
}

body.dark .resizer:hover {
  background: rgba(255,255,255,0.3);
}

.checkbox-list {
  display: flex;
  flex-direction: column;
  max-height: 200px;
  overflow-y: auto;
  font-size: 12px;
}
.checkbox-list label {
  margin-bottom: 4px;
}

.header-right {
    display: flex;
    gap: 10px; /* space between links */
    align-items: center;
}
</style>
</head>

<body>

<header class="page-header">
  <div class="header-left">
    <h1 class="site-title">日本原作目録</h1>
  </div>

  <div class="header-right">
    <a href="Publish.html" class="header-link">香港出版目録</a>
    <a href="PublishJP.html" class="header-link">日本出版目録</a>
  </div>
</header>

<!-- TOP FILTERS -->
<div class="top-filters">

  <!-- ROW 1 : Search + Clear -->
  <div class="filter-row filter-row-top">
    <button id="clearFiltersBtn" onclick="clearSearch()">
      清除所有篩選
    </button>

    <div class="search-wrapper">
      <input type="text"
             id="searchInput"
             placeholder="任何文字搜尋..."
             oninput="handleSearchInput()">
      <span class="clear-btn" onclick="clearSearch()">×</span>
    </div>

    <div id="resultCount" class="result-count"></div>
  </div>

  <!-- ROW 2 : All Dropdown Filters -->
<div class="filter-row filter-row-bottom">
  <div class="filter-dropdown">
    <label>初出掲載誌</label>
    <div class="checkbox-list" id="magazineFilter"></div>
  </div>

  <div class="filter-dropdown">
    <label>単行本系列</label>
    <div class="checkbox-list" id="tankobonFilter"></div>
  </div>

  <div class="filter-dropdown">
    <label>0巻</label>
    <div class="checkbox-list" id="volZeroFilter"></div>
  </div>

  <div class="filter-dropdown">
    <label>ドラミちゃん</label>
    <div class="checkbox-list" id="doramiFilter"></div>
  </div>

  <div class="filter-dropdown">
    <label>文庫系列</label>
    <div class="checkbox-list" id="bunkobonFilter"></div>
  </div>

  <div class="filter-dropdown">
    <label>兒童版</label>
    <div class="checkbox-list" id="pikkapikaFilter"></div>
  </div>

  <div class="filter-dropdown">
    <label>大全集</label>
    <div class="checkbox-list" id="completeCollectionFilter"></div>
  </div>
</div>

</div>
<!-- MAIN CONTENT -->
<main class="content">
  <div id="pagination"></div>
  <div class="grid" id="mangalist">Loading...</div>
</main>

<script>
const SHEET_URL = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/作品完整列表";
let sheetData = [];
let currentPage = 1;
const itemsPerPage = 50;   // change this to 8, 16, etc.
let currentList = [];      // you already use this for modal nav
let currentSortColumn = null;
let currentSortDirection = "asc"; // "asc" or "desc"

fetch(SHEET_URL)
  .then(res => {
    console.log("Status:", res.status);
    return res.text();
  })
  .then(text => {
    console.log("Raw response:", text.substring(0, 300));

    try {
      const data = JSON.parse(text);
      console.log("Parsed JSON:", data);

      sheetData = data.filter(row =>
        row.作品番 && row.作品番.trim() !== ""
      );

      populateMagazine(); 
      populateTankobon(); 
      populateBunkobon();
      populateVolZero();
      populateDorami();
      populatePikkapika();
      populateCompleteCollection();
      applyFilters();

    } catch (err) {
      console.error("JSON parse error:", err);
      document.getElementById("mangalist").innerHTML =
        "❌ Response is not valid JSON. Check console.";
    }
  })
  .catch(error => {
    console.error("Fetch error:", error);
    document.getElementById("mangalist").innerHTML =
      "❌ Network error. Check console.";
  });

function populateMagazine() {
    const container = document.getElementById("magazineFilter");
    if (!container) return;
    container.innerHTML = ""; // clear previous content
    const magazines = [...new Set(sheetData.map(row => row.初出掲載誌).filter(Boolean))].sort();
    magazines.forEach(mag => {
        const id = `mag-${mag.replace(/\s+/g,'')}`;
        const label = document.createElement("label");
        label.innerHTML = `<input type="checkbox" value="${mag}" onchange="applyFilters()"> ${mag}`;
        container.appendChild(label);
    });
}

function populateTankobon() {
    const container = document.getElementById("tankobonFilter");
    if (!container) return;
    container.innerHTML = ""; // clear previous content
    const tankobons = [...new Set(sheetData.map(row => row.単行本).filter(Boolean))].sort();
    tankobons.forEach(tkb => {
        const id = `tkb-${tkb.replace(/\s+/g,'')}`;
        const label = document.createElement("label");
        label.innerHTML = `<input type="checkbox" value="${tkb}" onchange="applyFilters()"> ${tkb}`;
        container.appendChild(label);
    });
}

function populateVolZero() {
    const container = document.getElementById("volZeroFilter");
    if (!container) return;
    container.innerHTML = ""; // clear previous content
    const volZeros = [...new Set(sheetData.map(row => row.0巻).filter(Boolean))].sort();
    volZeros.forEach(vz => {
        const id = `vz-${vz.replace(/\s+/g,'')}`;
        const label = document.createElement("label");
        label.innerHTML = `<input type="checkbox" value="${vz}" onchange="applyFilters()"> ${vz}`;
        container.appendChild(label);
    });
}

function populateDorami() {
    const container = document.getElementById("doramiFilter");
    if (!container) return;
    container.innerHTML = ""; // clear previous content
    const doramis = [...new Set(sheetData.map(row => row.ドラミちゃん).filter(Boolean))].sort();
    doramis.forEach(drm => {
        const id = `drm-${drm.replace(/\s+/g,'')}`;
        const label = document.createElement("label");
        label.innerHTML = `<input type="checkbox" value="${drm}" onchange="applyFilters()"> ${drm}`;
        container.appendChild(label);
    });
}
  
function populateBunkobon() {
    const container = document.getElementById("bunkobonFilter");
    if (!container) return;
    container.innerHTML = ""; // clear previous content
    const bunkobons = [...new Set(sheetData.map(row => row.文庫).filter(Boolean))].sort();
    bunkobons.forEach(bkb => {
        const id = `bkb-${bkb.replace(/\s+/g,'')}`;
        const label = document.createElement("label");
        label.innerHTML = `<input type="checkbox" value="${bkb}" onchange="applyFilters()"> ${bkb}`;
        container.appendChild(label);
    });
}

function populatePikkapika() {
    const container = document.getElementById("pikkapikaFilter");
    if (!container) return;
    container.innerHTML = ""; // clear previous content
    const pikkapikas = [...new Set(sheetData.map(row => row.兒童版).filter(Boolean))].sort();
    pikkapikas.forEach(pkpk => {
        const id = `pkpk-${pkpk.replace(/\s+/g,'')}`;
        const label = document.createElement("label");
        label.innerHTML = `<input type="checkbox" value="${pkpk}" onchange="applyFilters()"> ${pkpk}`;
        container.appendChild(label);
    });
}

function populateCompleteCollection() {
    const container = document.getElementById("completeCollectionFilter");
    if (!container) return;
    container.innerHTML = ""; // clear previous content
    const completeCollections = [...new Set(sheetData.map(row => row.大全集).filter(Boolean))].sort();
    completeCollections.forEach(cc => {
        const id = `cc-${cc.replace(/\s+/g,'')}`;
        const label = document.createElement("label");
        label.innerHTML = `<input type="checkbox" value="${cc}" onchange="applyFilters()"> ${cc}`;
        container.appendChild(label);
    });
}


function handleSearchInput() {
  const input = document.getElementById("searchInput");
  const clearBtn = document.querySelector(".clear-btn");

  clearBtn.style.display = input.value ? "block" : "none";
  applyFilters();
}

function clearSearch() {
    // 1️⃣ Clear search input
    document.getElementById("searchInput").value = "";

    // 2️⃣ Hide clear button
    const clearBtn = document.querySelector(".clear-btn");
    if (clearBtn) clearBtn.style.display = "none";

    // 3️⃣ Repopulate all checkbox filters (all unchecked)
    populateMagazine();
    populateTankobon();
    populateVolZero();
    populateDorami();
    populateBunkobon();
    populatePikkapika();
    populateCompleteCollection();

    // 4️⃣ Reset table to all rows
    currentList = sheetData.filter(r => r.作品番 && r.作品番.trim() !== "");
    currentPage = 1;

    // 5️⃣ Update result count
    document.getElementById("resultCount").textContent = `共 ${currentList.length} 部作品`;

    // 6️⃣ Render first page
    renderPage();
}


function sortBy(column) {

  if (currentSortColumn === column) {
    currentSortDirection = currentSortDirection === "asc" ? "desc" : "asc";
  } else {
    currentSortColumn = column;
    currentSortDirection = "asc";
  }

  currentList.sort((a, b) => {
    let valA = a[column] || "";
    let valB = b[column] || "";

    // Try numeric compare first
    if (!isNaN(valA) && !isNaN(valB)) {
      return currentSortDirection === "asc"
        ? Number(valA) - Number(valB)
        : Number(valB) - Number(valA);
    }

    // Otherwise string compare
    return currentSortDirection === "asc"
      ? valA.toString().localeCompare(valB.toString(), 'ja')
      : valB.toString().localeCompare(valA.toString(), 'ja');
  });

  currentPage = 1;
  renderPage();
}

function closeModal() {
  document.getElementById("detailModal").style.display = "none";
}

function openLightbox(src) {
  document.getElementById("lightboxImg").src = src;
  document.getElementById("imageLightbox").style.display = "flex";
}

function closeLightbox() {
  document.getElementById("imageLightbox").style.display = "none";
}

function nextItem() {
  if (currentIndex < currentList.length - 1) {
    currentIndex++;
    openDetail(currentList[currentIndex].ISBN);
  }
}

function prevItem() {
  if (currentIndex > 0) {
    currentIndex--;
    openDetail(currentList[currentIndex].ISBN);
  }
}
  
function applyFilters() {
    const search = document.getElementById("searchInput").value.toLowerCase();

    const getCheckedValues = (containerId) => {
        return Array.from(document.getElementById(containerId).querySelectorAll("input[type=checkbox]:checked"))
                    .map(cb => cb.value);
    }

    const magazineChecked = getCheckedValues("magazineFilter");
    const tankobonChecked = getCheckedValues("tankobonFilter");
    const volZeroChecked = getCheckedValues("volZeroFilter");
    const doramiChecked = getCheckedValues("doramiFilter");
    const bunkobonChecked = getCheckedValues("bunkobonFilter");
    const pikkapikaChecked = getCheckedValues("pikkapikaFilter");
    const completeCollectionChecked = getCheckedValues("completeCollectionFilter");

    let filtered = sheetData.filter(row => {
        const searchMatch = Object.values(row).join(" ").toLowerCase().includes(search);

        const magazineMatch = !magazineChecked.length || magazineChecked.includes(row.初出掲載誌);
        const tankobonMatch = !tankobonChecked.length || tankobonChecked.includes(row.単行本);
        const bunkobonMatch = !bunkobonChecked.length || bunkobonChecked.includes(row.文庫);
        const volZeroMatch = !volZeroChecked.length || volZeroChecked.includes(row.0巻);
        const doramiMatch = !doramiChecked.length || doramiChecked.includes(row.ドラミちゃん);
        const pikkapikaMatch = !pikkapikaChecked.length || pikkapikaChecked.includes(row.兒童版);
        const completeCollectionMatch = !completeCollectionChecked.length || completeCollectionChecked.includes(row.大全集);

        return searchMatch && magazineMatch && tankobonMatch && bunkobonMatch &&
               volZeroMatch && doramiMatch && pikkapikaMatch && completeCollectionMatch;
    });

    currentList = filtered;
    currentPage = 1;
    document.getElementById("resultCount").textContent = `共 ${filtered.length} 部作品`;
    renderPage();
}

function renderPage() {

  const start = (currentPage - 1) * itemsPerPage;
  const end = start + itemsPerPage;
  const pageItems = currentList.slice(start, end);

let html = `
  <table class="data-table">
    <thead>
      <tr>
        ${createSortableHeader("初出掲載誌")}
        ${createSortableHeader("初出掲載号")}
        ${createSortableHeader("初出掲載頁")}
        ${createSortableHeader("初出副題")}
        ${createSortableHeader("全集副題")}
        ${createSortableHeader("全集副題香港譯名")}
        ${createSortableHeader("単行本")}
        ${createSortableHeader("0巻")}
        ${createSortableHeader("ドラミちゃん")}
        ${createSortableHeader("文庫")}
        ${createSortableHeader("兒童版")}
        ${createSortableHeader("大全集")}
        ${createSortableHeader("備考")}
      </tr>
    </thead>
    <tbody>
`;

  html += pageItems.map(row => `
    <tr>
      <td>${row.初出掲載誌 || ""}</td>
      <td>${row.初出掲載号 || ""}</td>
      <td>${row.初出掲載頁 || ""}</td>
      <td>${row.初出副題 || ""}</td>
      <td>${row.全集副題 || ""}</td>
      <td>${row.全集副題香港譯名 || ""}</td>
      <td>${row.単行本 || ""}</td>
      <td>${row.0巻 || ""}</td>
      <td>${row.ドラミちゃん || ""}</td>
      <td>${row.文庫 || ""}</td>
      <td>${row.兒童版 || ""}</td>
      <td>${row.大全集 || ""}</td>
      <td>${row.備考 || ""}</td>
    </tr>
  `).join("");

  html += `
      </tbody>
    </table>
  `;

  document.getElementById("mangalist").innerHTML =
    pageItems.length ? html : "No Manga found.";
  makeColumnsResizable();
  renderPaginationControls();
}
function toggleDarkMode() {
  document.body.classList.toggle("dark");

  const btn = document.getElementById("darkModeToggle");
  btn.textContent = document.body.classList.contains("dark")
    ? "☀ Light"
    : "🌙 Dark";

  localStorage.setItem("darkMode",
    document.body.classList.contains("dark"));
}

// Remember preference
window.addEventListener("DOMContentLoaded", () => {
  if (localStorage.getItem("darkMode") === "true") {
    document.body.classList.add("dark");
    document.getElementById("darkModeToggle").textContent = "☀ Light";
  }
});
function createSortableHeader(columnName) {

  let arrow = "";

  if (currentSortColumn === columnName) {
    arrow = currentSortDirection === "asc" ? " ▲" : " ▼";
  }

  return `<th onclick="sortBy('${columnName}')" style="cursor:pointer;">
            ${columnName}${arrow}
          </th>`;
}
  
function renderPaginationControls() {

  const totalPages = Math.ceil(currentList.length / itemsPerPage);

  if (totalPages <= 1) {
    document.getElementById("pagination").innerHTML = "";
    return;
  }

  let html = "";

  // ----- Page Info -----
  html += `<div style="margin-bottom:10px;">
             Page ${currentPage} of ${totalPages}
           </div>`;

  // ----- First -----
  html += `
    <button onclick="changePage(1)" ${currentPage === 1 ? "disabled" : ""}>
      &laquo; First
    </button>
  `;

  // ----- Prev -----
  html += `
    <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? "disabled" : ""}>
      &lsaquo; Prev
    </button>
  `;

  // ----- Page Numbers Logic -----

  const maxVisible = 5;
  let startPage = Math.max(1, currentPage - 2);
  let endPage = Math.min(totalPages, currentPage + 2);

  // Adjust window if near edges
  if (currentPage <= 3) {
    endPage = Math.min(totalPages, maxVisible);
  }

  if (currentPage >= totalPages - 2) {
    startPage = Math.max(1, totalPages - (maxVisible - 1));
  }

  // Always show page 1
  if (startPage > 1) {
    html += `<button onclick="changePage(1)">1</button>`;
    if (startPage > 2) {
      html += `<span class="ellipsis">...</span>`;
    }
  }

  // Middle Pages
  for (let i = startPage; i <= endPage; i++) {
    html += `
      <button onclick="changePage(${i})"
        ${i === currentPage ? "class='active-page'" : ""}>
        ${i}
      </button>
    `;
  }

  // Always show last page
  if (endPage < totalPages) {
    if (endPage < totalPages - 1) {
      html += `<span class="ellipsis">...</span>`;
    }
    html += `<button onclick="changePage(${totalPages})">${totalPages}</button>`;
  }

  // ----- Next -----
  html += `
    <button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? "disabled" : ""}>
      Next &rsaquo;
    </button>
  `;

  // ----- Last -----
  html += `
    <button onclick="changePage(${totalPages})" ${currentPage === totalPages ? "disabled" : ""}>
      Last &raquo;
    </button>
  `;

  document.getElementById("pagination").innerHTML = html;
}

function changePage(page) {

  const totalPages = Math.ceil(currentList.length / itemsPerPage);

  if (page < 1 || page > totalPages) return;

  currentPage = page;
  renderPage();

  window.scrollTo({ top: 0, behavior: "smooth" });
}

function makeColumnsResizable() {

  const thElements = document.querySelectorAll(".data-table th");

  thElements.forEach(th => {

    const resizer = document.createElement("div");
    resizer.classList.add("resizer");
    th.appendChild(resizer);

    let startX, startWidth;

    resizer.addEventListener("mousedown", function (e) {

      startX = e.pageX;
      startWidth = th.offsetWidth;

      function onMouseMove(e) {
        const newWidth = startWidth + (e.pageX - startX);
        th.style.width = newWidth + "px";
      }

      function onMouseUp() {
        document.removeEventListener("mousemove", onMouseMove);
        document.removeEventListener("mouseup", onMouseUp);
      }

      document.addEventListener("mousemove", onMouseMove);
      document.addEventListener("mouseup", onMouseUp);
    });

  });
}

// Helper function to populate a filter
function populateCheckboxFilter(containerId, values) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = ""; // clear old checkboxes

    values.forEach(val => {
        const label = document.createElement("label");
        label.innerHTML = `<input type="checkbox" value="${val}" onchange="applyFilters()"> ${val}`;
        container.appendChild(label);
    });
}
