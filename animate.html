<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Archive | TV Animation</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none; }
        body { 
            -webkit-user-select: none; user-select: none;
            min-height: 100vh; background-color: #f8fafc; 
            font-family: 'Inter', 'Noto Sans TC', 'Noto Sans JP', sans-serif; color: #1e293b;
        }
        .bg-grid { background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to bottom, #e2e8f0 1px, transparent 1px); background-size: 40px 40px; }
        .loader-wrapper { position: fixed; inset: 0; background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 5px solid #e2e8f0; border-top: 5px solid #4f46e5; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .top-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .main-card { background: white; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); margin-bottom: 3rem; overflow: hidden; border: 1px solid #e2e8f0; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { font-size: 11px; font-weight: 800; padding: 16px 12px; text-align: left; color: #64748b; background: #f8fafc; border-bottom: 2px solid #e2e8f0; white-space: nowrap; position: sticky; top: 0; z-index: 10; }
        td { padding: 14px 12px; border-bottom: 1px solid #f1f5f9; font-size: 14px; vertical-align: middle; }

        .vol-link { display: flex; flex-direction: column; font-size: 10px; font-weight: 900; color: white !important; padding: 6px 4px; border-radius: 8px; line-height: 1; text-align: center; min-width: 50px; text-decoration: none !important; transition: all 0.15s; }
        .vol-link span:last-child { font-size: 14px; margin-top: 2px; }
        .vol-link:hover { filter: brightness(110%); transform: translateY(-2px); }
        
        .year-btn { padding: 8px 16px; border-radius: 12px; font-size: 12px; font-weight: 800; transition: all 0.2s; border: 2px solid #e2e8f0; background: white; color: #64748b; }
        .year-btn.active { background: #4f46e5; color: white; border-color: #4f46e5; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
    </style>
</head>
<body class="bg-grid" oncontextmenu="return false;">
    <div id="app" v-cloak>
        <div v-if="loading" class="loader-wrapper">
            <div class="spinner"></div>
            <p class="mt-4 text-[11px] font-black uppercase tracking-widest text-slate-500">Syncing Animation Database...</p>
        </div>

        <nav class="top-nav">
            <div class="max-w-[1920px] mx-auto px-6 h-20 flex items-center justify-between">
                <div class="flex items-center gap-6">
                    <a href="index.html" class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center text-white shadow-xl">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </a>
                    <h1 class="font-black text-2xl tracking-tighter text-slate-800 uppercase">TV Animation</h1>
                </div>
            </div>
        </nav>

        <main class="max-w-[1920px] mx-auto px-6 pt-10">
            <div class="mb-8">
                <div class="flex flex-col md:flex-row gap-6 items-end mb-6">
                    <div class="w-full max-w-2xl">
                        <label class="block text-[10px] font-black uppercase text-slate-400 mb-2 ml-1">Full Database Search</label>
                        <input type="text" v-model="searchQuery" placeholder="Search Titles, Media ID, Work ID, or Notes..." class="w-full bg-white border-2 border-slate-200 rounded-2xl px-6 py-4 text-base font-bold outline-none focus:border-indigo-500 shadow-sm transition-all">
                    </div>
                    <div class="flex gap-2 mb-1">
                        <button @click="activeYears = []" class="year-btn" :class="{ 'active': activeYears.length === 0 }">All Years</button>
                        <button v-for="year in availableYears" :key="year" @click="toggleYear(year)" class="year-btn" :class="{ 'active': activeYears.includes(year) }">
                            {{ year }}s
                        </button>
                    </div>
                </div>
            </div>

            <div class="main-card">
                <div class="overflow-x-auto">
                    <table>
                        <thead>
                            <tr>
                                <th>Media ID</th>
                                <th>JP Title / HK Title</th>
                                <th>Show Date (JP / HK)</th>
                                <th>45卷/P+/カラー</th>
                                <th>大全集</th>
                                <th>Note</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="row in filteredData" :key="row['Media ID']">
                                <td class="font-mono text-slate-400 text-[13px]">{{ row['Media ID'] }}</td>
                                <td class="font-black text-slate-900">
                                    <div class="hover:text-indigo-600 transition-colors cursor-default">{{ row['JP Title'] }}</div>
                                    <div class="text-indigo-500 text-xs tracking-tight">{{ row['HK Title'] }}</div>
                                </td>
                                <td class="text-[12px] whitespace-nowrap">
                                    <div class="flex items-center gap-2"><span class="w-4 opacity-50">🇯🇵</span> {{ row['JP Show Date'] || '-' }}</div>
                                    <div class="flex items-center gap-2 mt-1"><span class="w-4 opacity-50">🇭🇰</span> {{ row['HK Show Date'] || '-' }}</div>
                                </td>
                                
                                <td>
                                    <a v-if="m = getMapping(row['Work ID'], ['45卷', 'カラー作品集', 'プラス'])" 
                                       :href="'manga-database.html?isbn=' + m.hkIsbn + '&region=HK'" 
                                       target="_blank" class="vol-link bg-emerald-500">
                                        <span>{{m.type}}</span><span>{{m.vol}}</span>
                                    </a>
                                </td>

                                <td>
                                    <a v-if="m = getMapping(row['Work ID'], ['大全集', '大長編大全集'])" 
                                       :href="'manga-database.html?isbn=' + m.hkIsbn + '&region=HK'" 
                                       target="_blank" class="vol-link bg-indigo-500">
                                        <span>{{m.vol}}</span>
                                    </a>
                                </td>

                                <td class="text-slate-400 italic text-[12px] max-w-xs">{{ row.Note }}</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    loading: true,
                    searchQuery: '',
                    activeYears: [], // Stores decades like 1970, 1980
                    anime: [],
                    contents: [],
                    publishHk: []
                }
            },
            computed: {
                availableYears() {
                    const years = new Set();
                    this.anime.forEach(r => {
                        const dateStr = r['JP Show Date'];
                        if (dateStr) {
                            const year = parseInt(dateStr.split('/')[2]);
                            if (year) years.add(Math.floor(year / 10) * 10);
                        }
                    });
                    return Array.from(years).sort();
                },
                filteredData() {
                    const q = this.searchQuery.toLowerCase().trim();
                    return this.anime.filter(r => {
                        // 1. Full Search Logic
                        const combined = [
                            r['Media ID'], r['JP Title'], r['HK Title'], 
                            r['Work ID'], r['Note'], r['Reference']
                        ].join(' ').toLowerCase();
                        const matchesSearch = !q || combined.includes(q);

                        // 2. Year Filter Logic
                        let matchesYear = true;
                        if (this.activeYears.length > 0) {
                            const dateStr = r['JP Show Date'];
                            if (!dateStr) {
                                matchesYear = false;
                            } else {
                                const year = parseInt(dateStr.split('/')[2]);
                                const decade = Math.floor(year / 10) * 10;
                                matchesYear = this.activeYears.includes(decade);
                            }
                        }

                        return matchesSearch && matchesYear;
                    });
                }
            },
            methods: {
                async init() {
                    try {
                        const [a, c, h] = await Promise.all([
                            fetch("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/電視動畫").then(r => r.json()),
                            fetch("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/書籍收錄作品").then(r => r.json()),
                            fetch("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録HK").then(r => r.json())
                        ]);
                        this.anime = a;
                        this.contents = c;
                        this.publishHk = h;
                        this.loading = false;
                    } catch (e) { console.error("Load Error:", e); }
                },
                toggleYear(year) {
                    const idx = this.activeYears.indexOf(year);
                    if (idx > -1) this.activeYears.splice(idx, 1);
                    else this.activeYears.push(year);
                },
                getMapping(workId, types) {
                    if(!workId || workId === "-") return null;
                    const idStr = workId.toString().trim();
                    const match = this.contents.find(c => c.作品番?.toString().trim() === idStr && types.includes(c.類));
                    return this.processMatch(match);
                },
                processMatch(match) {
                    if (!match || !match.ISBN) return null;
                    const isbn = match.ISBN.trim();
                    const matches = this.publishHk.filter(h => 
                        (h.ISBN_JP && h.ISBN_JP.trim() === isbn) || (h.ISBN && h.ISBN.trim() === isbn)
                    );
                    if (matches.length === 0) return null;
                    const latestHk = matches.sort((a, b) => new Date(b.IssueDate || 0) - new Date(a.IssueDate || 0))[0];
                    return { vol: match.卷 || match.巻, hkIsbn: latestHk.ISBN, type: match.類 };
                }
            },
            mounted() { this.init(); }
        }).mount('#app')
    </script>
</body>
</html>
