<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電影動畫作品記錄 | Doraemon Archive</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none; }
        body { 
            -webkit-user-select: none; user-select: none;
            background-color: #f8fafc; font-family: system-ui, sans-serif;
        }
        .bg-grid {
            background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px), 
                              linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .movie-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .movie-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-grid min-h-screen pb-20">
    <div id="app" v-cloak>
        <div v-if="loading" class="fixed inset-0 bg-slate-50 z-50 flex flex-col items-center justify-center">
            <div class="w-12 h-12 border-4 border-purple-200 border-t-purple-600 rounded-full animate-spin"></div>
            <p class="mt-4 font-black text-slate-400 uppercase tracking-widest text-xs">Loading Movies...</p>
        </div>

        <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-slate-200">
            <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <a href="index.html" class="p-2 bg-slate-900 rounded-xl text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                    </a>
                    <h1 class="font-black text-xl tracking-tighter uppercase">Animate Archive</h1>
                </div>
                <div class="relative w-64 md:w-96">
                    <input type="text" v-model="searchQuery" placeholder="搜尋電影名稱 (中/日/英)..." 
                           class="w-full bg-slate-100 border-none rounded-xl px-4 py-2 text-sm font-bold focus:ring-2 focus:ring-purple-500 outline-none">
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-6 pt-12">
            <header class="mb-12">
                <h2 class="text-4xl font-black text-slate-900 uppercase tracking-tight">電影動畫作品</h2>
                <p class="text-slate-500 font-bold mt-2">Doraemon Movies & Animation Records</p>
            </header>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                <div v-for="movie in filteredMovies" :key="movie['Media ID']" class="movie-card bg-white rounded-[2rem] overflow-hidden border border-slate-200 flex flex-col">
                    
                    <div class="aspect-[3/4] bg-slate-100 relative overflow-hidden group">
                        <img :src="movie['HK Image'] || movie['JP Image']" 
                             class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
                             @error="handleImageError">
                        <div class="absolute top-4 left-4 bg-black/50 backdrop-blur-md text-white text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">
                            {{ movie['Media ID'] }}
                        </div>
                    </div>

                    <div class="p-6 flex flex-col flex-grow">
                        <div class="mb-4">
                            <h3 class="font-black text-lg text-slate-900 leading-tight mb-1">{{ movie['HK Title'] || movie['JP Title'] }}</h3>
                            <p class="text-xs text-slate-400 font-bold italic">{{ movie['JP Title'] }}</p>
                        </div>

                        <div class="space-y-3 mb-6">
                            <div class="flex items-center justify-between text-[11px] font-bold uppercase tracking-wider">
                                <span class="text-slate-400">日本上映</span>
                                <span class="text-slate-700">{{ movie['JP Release Date'] || '-' }}</span>
                            </div>
                            <div class="flex items-center justify-between text-[11px] font-bold uppercase tracking-wider">
                                <span class="text-slate-400">香港上映</span>
                                <span class="text-indigo-600">{{ movie['HK Release Date'] || '-' }}</span>
                            </div>
                        </div>

                        <div class="mt-auto flex flex-wrap gap-2">
                            <span v-if="movie['Manga']" class="px-3 py-1 bg-emerald-100 text-emerald-700 text-[10px] font-black rounded-lg uppercase">Manga</span>
                            <span v-if="movie['Film Comics']" class="px-3 py-1 bg-amber-100 text-amber-700 text-[10px] font-black rounded-lg uppercase">Film Comic</span>
                        </div>
                    </div>
                </div>
            </div>

            <div v-if="filteredMovies.length === 0 && !loading" class="text-center py-20">
                <p class="text-slate-300 font-black text-xl uppercase tracking-widest">No Movies Found</p>
            </div>
        </main>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    loading: true,
                    searchQuery: '',
                    movies: []
                }
            },
            computed: {
                filteredMovies() {
                    const q = this.searchQuery.toLowerCase().trim();
                    if (!q) return this.movies;
                    return this.movies.filter(m => 
                        (m['HK Title'] || '').toLowerCase().includes(q) ||
                        (m['JP Title'] || '').toLowerCase().includes(q) ||
                        (m['EN Title'] || '').toLowerCase().includes(q) ||
                        (m['Media ID'] || '').toString().toLowerCase().includes(q)
                    );
                }
            },
            methods: {
                async init() {
                    try {
                        // Fetching from your specific sheet name: 電影動畫
                        const response = await fetch("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/電影動畫");
                        this.movies = await response.json();
                    } catch (e) {
                        console.error("Load Error:", e);
                    } finally {
                        this.loading = false;
                    }
                },
                handleImageError(e) {
                    // Fallback if image link is broken
                    e.target.src = "https://placehold.co/600x800/e2e8f0/64748b?text=No+Image";
                }
            },
            mounted() {
                this.init();
                // Basic security disable keys
                window.addEventListener('keydown', e => {
                    if ((e.ctrlKey || e.metaKey) && ['c','s','p','u'].includes(e.key)) e.preventDefault();
                });
            }
        }).mount('#app')
    </script>
</body>
</html>
