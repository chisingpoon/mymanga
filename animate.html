<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
    
    <div class="flex flex-col relative group min-h-[400px]">
        <div class="badge">原作/改編漫畫</div>
        
        <a v-if="mappedManga" 
           :href="'manga-database.html?region=JP&isbn=' + mappedManga.isbnParam + '&series=' + encodeURIComponent(mappedManga.series)" 
           target="_blank"
           class="data-card block bg-slate-50 rounded-[2.5rem] border border-slate-100 overflow-hidden">
            <div class="aspect-[16/9] bg-slate-200">
                <img :src="mappedManga.image || 'https://placehold.co/600x400?text=No+Cover'" class="w-full h-full object-cover">
            </div>
            <div class="p-8">
                <p class="font-black text-slate-900 text-xl leading-tight mb-2">{{ mappedManga.title }}</p>
                <p v-if="mappedManga.subtitle" class="text-sm text-slate-500 font-bold mb-4 italic">{{ mappedManga.subtitle }}</p>
                <p class="text-[11px] font-black text-indigo-600 uppercase tracking-widest">{{ mappedManga.author }}</p>
            </div>
            <div class="hover-hint">Click for Details</div>
        </a>

        <div v-else class="data-card flex-1 p-10 bg-slate-50 rounded-[2.5rem] border-2 border-dashed border-slate-200 text-center flex flex-col items-center justify-center opacity-60">
            <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mt-4">No Linked Manga</p>
            <div class="hover-hint">No Record Found</div>
        </div>
    </div>

    <div class="flex flex-col relative group min-h-[400px]">
        <div class="badge">電影漫畫</div>
        
        <a v-if="mappedFilmComic" 
           :href="'manga-database.html?region=JP&isbn=' + mappedFilmComic.isbnParam + '&series=' + encodeURIComponent(mappedFilmComic.series)" 
           target="_blank"
           class="data-card block bg-slate-50 rounded-[2.5rem] border border-slate-100 overflow-hidden">
            <div class="aspect-[16/9] bg-slate-200">
                <img :src="mappedFilmComic.image || 'https://placehold.co/600x400?text=No+Cover'" class="w-full h-full object-cover">
            </div>
            <div class="p-8">
                <p class="font-black text-slate-900 text-xl leading-tight mb-2">{{ mappedFilmComic.title }}</p>
                <p v-if="mappedFilmComic.subtitle" class="text-sm text-slate-500 font-bold mb-4 italic">{{ mappedFilmComic.subtitle }}</p>
                <p class="text-[11px] font-black text-indigo-600 uppercase tracking-widest">{{ mappedFilmComic.author }}</p>
            </div>
            <div class="hover-hint">Click for Details</div>
        </a>

        <div v-else class="data-card flex-1 p-10 bg-slate-50 rounded-[2.5rem] border-2 border-dashed border-slate-200 text-center flex flex-col items-center justify-center opacity-60">
            <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mt-4">No Linked Film Comic</p>
            <div class="hover-hint">No Record Found</div>
        </div>
    </div>

</div>
