<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My X Feed</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #15202b; /* X Dark Mode background */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            width: 100%;
            /* Removed the white background so the dark widget blends in */
            border-radius: 15px;
            min-height: 600px; /* Gives space for the widget to load */
        }
        h1 { margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>Latest from X</h1>

    <div class="container">
        <a class="twitter-timeline" 
           data-theme="dark" 
           href="https://twitter.com/doraemonChannel?ref_src=twsrc%5Etfw">
           Loading Twists from @doraemonChannel...
        </a> 
        
        <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
    </div>

</body>
</html>
