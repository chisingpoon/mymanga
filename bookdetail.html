<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Book Detail</title>

<style>
body {
  font-family: Arial;
  padding: 40px;
}

.top-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  margin-bottom: 40px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 25px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

.card-inner {
  display: grid;
  grid-template-columns: 40% 60%;
  gap: 20px;
}

.book-image {
  aspect-ratio: 3 / 4;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f5f5f5;
  border-radius: 8px;
  overflow: hidden;
}

.book-image img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

.column-box {
  font-size: 14px;
}

.book-image {
  width: 100%;
  aspect-ratio: 3 / 4;   /* keeps book proportion */
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f5f5f5;
  border-radius: 8px;
  overflow: hidden;
}

.book-image img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

.column-box {
  font-size: 14px;
}

.book-image img {
  width: 100%;
  height: auto;
  object-fit: contain;
  border-radius: 8px;
}

.book-info {
  width: 70%;
}

.book-info h1 {
  margin-top: 0;
}

.info-row {
  margin-bottom: 8px;
}

/* ===== Details Table ===== */
.details-table {
  width: 100%;              /* Fill browser width */
  border-collapse: collapse;
  table-layout: auto;       /* Natural sizing */
}

.details-table th,
.details-table td {
  border: 1px solid #ccc;
  padding: 6px 10px;
  word-break: break-word;   /* Prevent overflow */
}

.details-table th {
  background: #f2f2f2;
  text-align: left;
}

.details-table tr:nth-child(even) {
  background: #fafafa;
}

.details-table {
  width: 100%;
  border-collapse: collapse;
}

.details-table th:nth-child(1),
.details-table th:nth-child(2),
.details-table th:nth-child(3),
.details-table th:nth-child(4),
.details-table th:nth-child(6),
.details-table th:nth-child(10),
.details-table td:nth-child(1),
.details-table td:nth-child(2),
.details-table td:nth-child(3),
.details-table td:nth-child(4),
.details-table td:nth-child(6),
.details-table td:nth-child(10) {
  white-space: nowrap;
  width: 1%;
}

.details-table th,
.details-table td {
  border: 1px solid #ccc;
  padding: 8px;
}

.details-table thead {
  background: #f2f2f2;
  font-weight: bold;
}

.details-table tr:nth-child(even) {
  background: #fafafa;
}

/* ===== Image Modal ===== */
.image-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.image-modal.show {
  display: flex;
}

.image-modal img {
  max-width: 90%;
  max-height: 90%;
  object-fit: contain;
  border-radius: 8px;
}

.image-close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 40px;
  color: white;
  cursor: pointer;
}

.clickable-image {
  cursor: zoom-in;
}

.jp-detail-button {
  display: inline-block;
  margin-top: 15px;
  padding: 8px 16px;
  background-color: #0077cc;
  color: white;
  text-decoration: none;
  border-radius: 6px;
  font-weight: bold;
  transition: background-color 0.3s;
}

.jp-detail-button:hover {
  background-color: #005fa3;
}


img {
  user-select: none;
  -webkit-user-drag: none;
}
</style>
</head>
<body>

<div id="content">Loading...</div>

<script>

// 1️⃣ Get ISBN from URL
const params = new URLSearchParams(window.location.search);
const isbn = params.get("isbn");

// 2️⃣ Sheet URLs
// 2️⃣ Sheet URLs
const MANGALIST_SHEET =
  "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録HK";
const JPINFO_SHEET =
  "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録JP";
const BOOKSTORY_SHEET =
  "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/書籍收錄作品";
const STORYDETAIL_SHEET =
  "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/作品完整列表";

 
// 3️⃣ Load everything
Promise.all([
  fetch(MANGALIST_SHEET).then(r => r.json()),
  fetch(JPINFO_SHEET).then(r => r.json()),
  fetch(BOOKSTORY_SHEET).then(r => r.json()),
  fetch(STORYDETAIL_SHEET).then(r => r.json())
])
.then(([hkbooks, jpbooks, bookStories, allStories]) => {

  // 1️⃣ Find HK book
  const manga = hkbooks.find(b => b.ISBN?.trim() === isbn?.trim());
  if (!manga) {
    document.getElementById("content").innerHTML = "Book not found.";
    return;
  }

  // 2️⃣ Find JP book via ISBN_JP
  const jpinfo = jpbooks.find(j =>
    j.ISBN?.trim() === manga.ISBN_JP?.trim()
  );

  if (!jpinfo) {
    render(manga, [], null);
    return;
  }

  // 3️⃣ Get 書籍收錄作品 rows using JP ISBN
  const collectedWorks = bookStories
    .filter(r => r.ISBN?.trim() === jpinfo.ISBN?.trim())
    .sort((a,b) => Number(a.話) - Number(b.話));

  // 4️⃣ Join with 作品完整列表 via 作品番
  const mergedRows = collectedWorks.map(r => {
    const detail = allStories.find(s =>
      s.作品番?.trim() === r.作品番?.trim()
    );

    return {
      ...r,
      ...detail
    };
  });

  render(manga, mergedRows, jpinfo);

})
.catch(err => {
  document.getElementById("content").innerHTML = "Failed to load data.";
  console.error(err);
});


// 7️⃣ Render page
function render(manga, storyRows, jpinfo) {

  // Build table rows from Stories Map sheet
const tableRows = storyRows.map(d => `
  <tr>
    <td>${d.番 || ""}</td>
    <td>${d.巻 || ""}</td>
    <td>${d.收錄話 || ""}</td>
    <td>${d.全集副題香港譯名 || ""}</td>
    <td>${d.出版副題 || ""}</td>
    <td>${d.頁 || ""}</td>
    <td>${d.初出副題 || ""}</td>
    <td>${d.全集副題 || ""}</td>
    <td>${d.初出掲載誌 || ""}</td>
    <td>${d.初出掲載号 || ""}</td>
    <td>${d.大全集 || ""}</td>
    <td>${d.出版備考 || ""}</td>
  </tr>
`).join("");

  // Only show table if there is data
  const tableSection = storyRows.length > 0 ? `
    <h2>收錄故事</h2>
    <table class="details-table">
      <thead>
        <tr>
          <th>番</th>
          <th>巻</th>
          <th>收錄話</th>
          <th>香港譯名</th>
          <th>日本副題</th>
          <th>頁</th>
          <th>初出副題</th>
          <th>全集副題</th>
          <th>初出掲載誌</th>
          <th>初出掲載号</th>
          <th>大全集</th>
          <th>日本出版備考</th>
        </tr>
      </thead>
      <tbody>
        ${tableRows}
      </tbody>
    </table>
  ` : "";
  
const jpCard = jpinfo ? `
  <!-- JP CARD -->
  <div class="card">
    <div class="card-inner">

      <div class="book-image">
        <img src="${jpinfo.Image || ""}" 
             alt="${jpinfo.標題} ${jpinfo.巻}" 
             class="clickable-image"
             onclick="openImageModal('${jpinfo.Image || ""}')">
      </div>

      <div class="column-box">
        <h3>日文原版資料</h3>
        <h1>${jpinfo.標題 || ""} ${jpinfo.巻 || ""}</h1>
        <h2>${jpinfo.副標題 || ""}</h2>    
        <div><strong>系列:</strong> ${jpinfo.系列 || ""}</div>
        <div><strong>著:</strong> ${jpinfo.著 || ""}</div>
        <div><strong>判型:</strong> ${jpinfo.判型 || ""}</div>
        <div><strong>頁:</strong> ${jpinfo.頁 || ""}</div>
        <div><strong>話:</strong> ${jpinfo.話 || ""}</div>
        <div><strong>初版発行日:</strong> ${jpinfo.初版発行日 || ""}</div>
        <div><strong>定価:</strong> ${jpinfo.定価 || ""}</div>
        <div><strong>ISBN:</strong> ${jpinfo.ISBN || ""}</div>

        ${jpinfo.ISBN ? `
          <div>
            <a 
              href="bookdetailjp.html?isbn=${encodeURIComponent(jpinfo.ISBN)}" 
              target="_blank" 
              class="jp-detail-button"
            >
              查看日文原版詳情
            </a>
          </div>
        ` : ''}
      </div>

    </div>
  </div>
` : "";

document.getElementById("content").innerHTML = `

  <!-- ===== Top Section ===== -->
  
<div class="top-section">

  <!-- HK CARD -->
  <div class="card">
    <div class="card-inner">
      <!-- Column 1: Image -->
      <div class="book-image">
        <img src="${manga.Image || ""}" 
             alt="${manga.Title} ${manga.Volume}" 
             class="clickable-image"
             onclick="openImageModal('${manga.Image || ""}')">
      </div>

      <!-- Column 2: Main Info -->
      <div class="column-box">
        <h3>${manga.OriginCountry || ""}版資料</h3>
        <h1>${manga.Title || ""} ${manga.Volume || ""}</h1>
        <h2>${manga.Subtitle || ""}</h2>
    <!--
        <div><strong>日文書名:</strong>
          ${manga.OriginalTitle || ""} 
          ${manga.Volume || ""}  
          ${manga.OriginalSubtitle || ""}
        </div>
    -->
        <div><strong>作者:</strong> ${manga.Author || ""}</div>
        <div><strong>出版社:</strong> ${manga.Publisher || ""}</div>
        <div><strong>尺碼:</strong> ${manga.Size || ""}</div>
        <div><strong>出版日期:</strong> ${manga.IssueDate || ""}</div>
        <div><strong>售價:</strong> $${manga.Price || ""}</div>
        <div><strong>頁數:</strong> ${manga.Page || ""}</div>
        <div><strong>出版地區:</strong> ${manga.OriginCountry || ""}</div>
        <div><strong>ISBN:</strong> ${manga.ISBN || ""}</div>
      </div>
    </div>
  </div>


  <!-- JP CARD -->
   ${jpCard}
</div>

  <!-- ===== Bottom Details Table (OUTSIDE top-section) ===== -->
  ${tableSection}
`;
}

function openImageModal(src) {
  const modal = document.getElementById("imageModal");
  const modalImg = document.getElementById("modalImage");

  modalImg.src = src;
  modal.classList.add("show");
}

function closeImageModal() {
  const modal = document.getElementById("imageModal");
  modal.classList.remove("show");
}

// Wait until page fully loads
window.addEventListener("load", function () {

  const modal = document.getElementById("imageModal");
  const closeBtn = document.querySelector(".image-close");
  const modalImage = document.getElementById("modalImage");
  
  closeBtn.addEventListener("click", closeImageModal);

  modal.addEventListener("click", function (e) {
    if (e.target === modal) {
      closeImageModal();
    }
  });
  modalImage.addEventListener("contextmenu", function(e) {
    e.preventDefault();
  });
});

// ESC key close
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") {
    closeImageModal();
  }
});

// Disable right-click everywhere
window.addEventListener("contextmenu", function (e) {
  e.preventDefault();
  return false;
}, true);

// Disable dragging
window.addEventListener("dragstart", function(e) {
  e.preventDefault();
});

</script>
  <!-- Image Modal -->
  <div id="imageModal" class="image-modal">
  <span class="image-close">&times;</span>
  <img id="modalImage">
</div>
</body>
</html>
