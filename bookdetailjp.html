<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Book Detail</title>

<style>
body {
  font-family: Arial;
  padding: 40px;
}

.top-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  margin-bottom: 40px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 25px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

.card-inner {
  display: grid;
  grid-template-columns: 40% 60%;
  gap: 20px;
}

.page-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
  padding-bottom: 15px;
  border-bottom: 2px solid #eee;
}

.book-image {
  aspect-ratio: 3 / 4;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f5f5f5;
  border-radius: 8px;
  overflow: hidden;
}

.book-image img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

.column-box {
  font-size: 14px;
}

.book-image {
  width: 100%;
  aspect-ratio: 3 / 4;   /* keeps book proportion */
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f5f5f5;
  border-radius: 8px;
  overflow: hidden;
}

.book-image img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

.column-box {
  font-size: 14px;
}

.book-image img {
  width: 100%;
  height: auto;
  object-fit: contain;
  border-radius: 8px;
}

.book-info {
  width: 70%;
}

.book-info h1 {
  margin-top: 0;
}

.info-row {
  margin-bottom: 8px;
}

/* ===== Details Table ===== */
.details-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: auto;   /* ✅ important */
}

.details-table th,
.details-table td {
  border: 1px solid #ddd;
  padding: 10px;
  vertical-align: top;
}

.details-table th {
  background: #f5f5f5;
  width: 20%;
  text-align: left;
}

.details-table tr:nth-child(even) {
  background: #fafafa;
}

.details-table th,
.details-table td {
  border: 1px solid #ccc;
  padding: 8px;
}

.details-table th:nth-child(1),
.details-table th:nth-child(2),
.details-table th:nth-child(3),
.details-table th:nth-child(4),
.details-table th:nth-child(8),
.details-table th:nth-child(9),
.details-table th:nth-child(10),
.details-table th:nth-child(11),
.details-table th:nth-child(12),
.details-table td:nth-child(1),
.details-table td:nth-child(2),
.details-table td:nth-child(3),
.details-table td:nth-child(4),
.details-table th:nth-child(8), 
.details-table th:nth-child(9),
.details-table th:nth-child(10),
.details-table th:nth-child(11),
.details-table th:nth-child(12) {
  white-space: nowrap;
  width: 1%;
}

.details-table thead {
  background: #f2f2f2;
  font-weight: bold;
}

.details-table tr:nth-child(even) {
  background: #fafafa;
}

/* ===== Image Modal ===== */
.image-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.image-modal.show {
  display: flex;
}

.image-modal img {
  max-width: 90%;
  max-height: 90%;
  object-fit: contain;
  border-radius: 8px;
}

.image-close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 40px;
  color: white;
  cursor: pointer;
}

.clickable-image {
  cursor: zoom-in;
}

img {
  user-select: none;
  -webkit-user-drag: none;
}
</style>
</head>
<body>

<header class="page-header">
  <div>
    <h1 class="site-title">日本版資料</h1>
  </div>
</header>
  
<div id="content">Loading...</div>

<script>

// 1️⃣ Get ISBN from URL
const params = new URLSearchParams(window.location.search);
const isbn = params.get("isbn");

// 2️⃣ Sheet URLs
const MANGALIST_SHEET = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録JP";
const STORYMAP_SHEET = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/書籍收錄作品";
const STORY_SHEET = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/作品完整列表"
 
// 3️⃣ Load everything
Promise.all([
  fetch(MANGALIST_SHEET).then(r => r.json()),
  fetch(STORYMAP_SHEET).then(r => r.json()),
  fetch(STORY_SHEET).then(r => r.json())
])
.then(([mangas, storymaps, stories]) => {

  // 4️⃣ Find manga
  const manga = mangas.find(b => b.ISBN?.trim() === isbn?.trim());

  if (!manga) {
    document.getElementById("content").innerHTML = "Manga not found.";
    return;
  }

  // 5️⃣ Get rows for this ISBN
  const mangamaps = storymaps
    .filter(j => j.ISBN?.trim() === isbn?.trim());
  
  // 6️⃣ Join and sort safely
  const mergedRows = mangamaps
    .map(map => {
      const story = stories.find(d =>
        d.作品番?.trim() === map.作品番?.trim()
      );
  
      return {
        ...map,
        ...story
      };
    })
    .filter(r => r.作品番) // remove failed joins
    .sort((a, b) => {
      const aNum = parseInt(a.話?.replace(/\D/g, "")) || 0;
      const bNum = parseInt(b.話?.replace(/\D/g, "")) || 0;
      return aNum - bNum;
    });
  
  render(manga, mergedRows);

})
.catch(err => {
  document.getElementById("content").innerHTML = "Failed to load data.";
  console.error(err);
});


// 7️⃣ Render page
function render(manga, rows) {

  const tableRows = rows.map(d => `
    <tr>
      <td>${d.番 || ""}</td>
      <td>${d.巻 || ""}</td>
      <td>${d.話 || ""}</td>
      <td>${d.頁 || ""}</td>
      <td>${d.初出副題 || ""}</td>
      <td>${d.全集副題 || ""}</td>
      <td>${d.初出掲載誌 || ""}</td>
      <td>${d.初出掲載号 || ""}</td>
      <td>${d.単行本 || ""}</td>
      <td>${d.その他単行本 || ""}</td>
      <td>${d.文庫 || ""}</td>
      <td>${d.兒童版 || ""}</td>
      <td>${d.大全集 || ""}</td>
      <td>${d.出版備考 || ""}</td>
      <td>${d.備考 || ""}</td>
    </tr>
  `).join("");

  // Only show table if there is data
  const tableSection = rows.length > 0 ? `
    <h2>收錄故事</h2>
    <table class="details-table">
      <thead>
        <tr>
          <th>番</th>
          <th>巻</th>
          <th>話</th>
          <th>頁</th>
          <th>初出副題</th>
          <th>全集副題</th>          
          <th>初出掲載誌</th>
          <th>初出掲載号</th>
          <th>単行本</th>
          <th>その他単行本</th>
          <th>文庫</th>
          <th>兒童版</th>
          <th>大全集</th>
          <th>出版出版</th>
          <th>備考</th>
        </tr>
      </thead>
      <tbody>
        ${tableRows}
      </tbody>
    </table>
  ` : "";
  
document.getElementById("content").innerHTML = `

  <!-- ===== Top Section ===== -->
  
<div class="top-section">

  <!-- JP CARD -->
  <div class="card">
    <div class="card-inner">
      <!-- Column 1: Image -->
      <div class="book-image">
        <img src="${manga.Image || ""}" 
             alt="${manga.標題} ${manga.巻}" 
             class="clickable-image"
             onclick="openImageModal('${manga.Image || ""}')">
      </div>

      <!-- Column 2: Main Info -->
      <div class="column-box">
        <h1>${manga.標題 || ""} ${manga.巻 || ""}</h1>
        <h2>${manga.副標題 || ""}</h2>
        <div><strong>系列:</strong> ${manga.系列 || ""}</div>
        <div><strong>著:</strong> ${manga.著 || ""}</div>
        <div><strong>判型:</strong> ${manga.判型 || ""}</div>
        <div><strong>初版発行日:</strong> ${manga.初版発行日 || ""}</div>
        <div><strong>定価:</strong> $${manga.定価 || ""}</div>
        <div><strong>頁:</strong> ${manga.頁 || ""}</div>
        <div><strong>話:</strong> ${manga.話 || ""}</div>
        <div><strong>ISBN:</strong> ${manga.ISBN || ""}</div>
      </div>
    </div>
  </div>

</div>

  <!-- ===== Bottom Details Table (OUTSIDE top-section) ===== -->
  ${tableSection}
`;
}

function openImageModal(src) {
  const modal = document.getElementById("imageModal");
  const modalImg = document.getElementById("modalImage");

  modalImg.src = src;
  modal.classList.add("show");
}

function closeImageModal() {
  const modal = document.getElementById("imageModal");
  modal.classList.remove("show");
}

// Wait until page fully loads
window.addEventListener("load", function () {

  const modal = document.getElementById("imageModal");
  const closeBtn = document.querySelector(".image-close");
  const modalImage = document.getElementById("modalImage");
  
  closeBtn.addEventListener("click", closeImageModal);

  modal.addEventListener("click", function (e) {
    if (e.target === modal) {
      closeImageModal();
    }
  });
  modalImage.addEventListener("contextmenu", function(e) {
    e.preventDefault();
  });
});

// ESC key close
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") {
    closeImageModal();
  }
});

// Disable right-click everywhere
window.addEventListener("contextmenu", function (e) {
  e.preventDefault();
  return false;
}, true);

// Disable dragging
window.addEventListener("dragstart", function(e) {
  e.preventDefault();
});

</script>
  <!-- Image Modal -->
  <div id="imageModal" class="image-modal">
  <span class="image-close">&times;</span>
  <img id="modalImage">
</div>
</body>
</html>
