<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Book Detail</title>
<style>
body { font-family: Arial; padding: 40px; }
.top-section { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 40px; }
.card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
.card-inner { display: grid; grid-template-columns: 40% 60%; gap: 20px; height: 100%; }
.book-image { position: relative; width: 100%; height: 100%; border-radius: 8px; overflow: hidden; }
.book-image img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit:contain; border-radius:8px; }
.column-box { font-size: 14px; }

/* Table styles */
.table-wrapper { margin-top:20px; border:1px solid #ccc; overflow:auto; max-height:600px; }
.table-header, .table-row { display:grid; grid-template-columns: repeat(auto-fit, minmax(50px, auto)); }
.table-header div, .table-row div { border:1px solid #ccc; padding:6px 10px; white-space: normal; word-break: break-word; }
.table-header div.nowrap, .table-row div.nowrap { white-space: nowrap; }
.table-header { background:#f2f2f2; font-weight:bold; position:sticky; top:0; z-index:1; }
.table-row:nth-child(even) { background:#fafafa; }

/* Image modal */
.image-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 9999; }
.image-modal.show { display: flex; }
.image-modal img { max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 8px; }
.image-close { position: absolute; top: 20px; right: 30px; font-size: 40px; color: white; cursor: pointer; }
.clickable-image { cursor: zoom-in; }
img { user-select: none; -webkit-user-drag: none; }
</style>
</head>
<body>

<div id="content">Loading...</div>

<div id="imageModal" class="image-modal">
  <span class="image-close" onclick="closeImageModal()">&times;</span>
  <img id="modalImage">
</div>

<script>
// ===== Config =====
const hideColumns = ["ISBN","作品番","類","番","頁","收錄初出掲載誌","收錄初出掲載号","掲載番","初出掲載頁","単行本","第0巻","ドラミちゃん","文庫","兒童版","藤子不二雄ランド","全集副題","備考","全集副題香港譯名","作品類"];
const nowrapColumns = ["巻","收錄話","副題港譯","收錄頁","初出掲載誌","初出掲載号","大全集"];
const columnOrderTable = [
"ISBN","作品番","類","番","巻","收錄話","收錄頁","出版副題","副題港譯","收錄初出掲載誌","收錄初出掲載号",
"色","初出掲載誌","掲載番","初出掲載号","初出掲載頁","初出副題",
"単行本","第0巻","ドラミちゃん","文庫","兒童版","藤子不二雄ランド","大全集","頁","全集副題",
"出版備考","備考","全集副題香港譯名","作品類"
];

const params = new URLSearchParams(window.location.search);
const isbnhk = (params.get("isbnhk")||"").trim();
const isbnjp = (params.get("isbnjp")||"").trim();

const SHEETS = {
  MANGALIST:"https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録HK",
  JPINFO:"https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録JP",
  BOOKSTORY:"https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/書籍收錄作品",
  STORYDETAIL:"https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/作品完整列表"
};

// ===== Helpers =====
async function fetchSheet(url){ try{ const r=await fetch(url); if(!r.ok) throw Error(); return r.json(); } catch(e){console.warn("Sheet fail:",url); return []; } }
function createRow(row, columns){ const div=document.createElement("div"); div.className="table-row"; columns.forEach(c=>{ const cell=document.createElement("div"); cell.textContent=row[c]||""; if(nowrapColumns.includes(c)) cell.classList.add("nowrap"); div.appendChild(cell); }); return div; }
function createHeader(columns){ const div=document.createElement("div"); div.className="table-header"; columns.forEach(c=>{ const cell=document.createElement("div"); cell.textContent=c; if(nowrapColumns.includes(c)) cell.classList.add("nowrap"); div.appendChild(cell); }); return div; }

// ===== Main =====
(async ()=>{
  if(!isbnhk && !isbnjp){ document.getElementById("content").innerText="Please provide a valid ISBN."; return; }
  document.getElementById("content").innerText="Loading top cards...";
  const [hkBooks,jpBooks]=await Promise.all([fetchSheet(SHEETS.MANGALIST),fetchSheet(SHEETS.JPINFO)]);
  const manga = isbnhk? hkBooks.find(b=>b.ISBN?.trim()===isbnhk):null;
  const jpinfo = isbnjp? jpBooks.find(b=>b.ISBN?.trim()===isbnjp):null;
  if(!manga && !jpinfo){ document.getElementById("content").innerText="Book not found."; return; }

  // Render top cards
  const topHtml = `<div class="top-section">
    ${manga?`<div class="card"><div class="card-inner"><div class="book-image"><img src="${manga.Image||''}" class="clickable-image" onclick="openImageModal('${manga.Image||''}')"></div><div class="column-box"><h3>${manga.OriginCountry||''}版資料</h3><h1>${manga.Title||''}</h1><div><strong>作者:</strong>${manga.Author||''}</div><div><strong>出版社:</strong>${manga.Publisher||''}</div><div><strong>出版日期:</strong>${manga.IssueDate||''}</div><div><strong>頁數:</strong>${manga.Page||''}</div></div></div></div>`:""}
    ${jpinfo?`<div class="card"><div class="card-inner"><div class="book-image"><img src="${jpinfo.Image||''}" class="clickable-image" onclick="openImageModal('${jpinfo.Image||''}')"></div><div class="column-box"><h3>日文原版資料</h3><h1>${jpinfo.標題||''}</h1><div><strong>著:</strong>${jpinfo.著||''}</div><div><strong>頁:</strong>${jpinfo.頁||''}</div></div></div></div>`:""}
  </div>`;
  document.getElementById("content").innerHTML = topHtml;

  if(jpinfo){
    document.getElementById("content").insertAdjacentHTML("beforeend","<h2>收錄故事</h2><div id='tableContainer' class='table-wrapper'></div>");
    const [bookStories,allStories]=await Promise.all([fetchSheet(SHEETS.BOOKSTORY),fetchSheet(SHEETS.STORYDETAIL)]);
    const collectedWorks = bookStories.filter(r=>r.ISBN?.trim()===jpinfo.ISBN?.trim());
    const storyMap = new Map(allStories.map(s=>[s.作品番?.trim(),s]));
    const merged = collectedWorks.map(r=>({...r,...storyMap.get(r.作品番?.trim())}));
    if(!merged.length) return;

    // Determine columns
    const allCols = Array.from(new Set(merged.flatMap(r=>Object.keys(r)))).filter(c=>!hideColumns.includes(c));
    const columns = columnOrderTable.filter(c=>allCols.includes(c)).concat(allCols.filter(c=>!columnOrderTable.includes(c)));

    const container=document.getElementById("tableContainer");
    container.appendChild(createHeader(columns));
    merged.forEach(r=>container.appendChild(createRow(r,columns)));
  }
})();

// ===== Image modal =====
function openImageModal(src){const m=document.getElementById("imageModal");document.getElementById("modalImage").src=src;m.classList.add("show");}
function closeImageModal(){document.getElementById("imageModal").classList.remove("show");}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeImageModal();});
</script>
</body>
</html>
