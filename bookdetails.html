<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Viewer</title>

<style>
body{
  font-family:Arial, Helvetica, sans-serif;
  margin:20px;
  background:#f3f3f3;
}

/* ---------- TOP SECTION ---------- */
#topSection{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  margin-bottom:30px;
  align-items:flex-start;
  justify-content:flex-start;  /* always left align */
}

/* containers for cards */
#hkCard,
#jpCard{
  flex:0 0 420px; /* fixed width cards */
  max-width:100%;
}

/* ---------- CARD ---------- */
.card{
  display:flex;
  flex-direction:row;
  gap:20px;
  background:white;
  border-radius:10px;
  padding:18px;
  box-shadow:0 3px 8px rgba(0,0,0,0.15);
  min-height:260px;
  align-items:stretch;
}

/* Image wrapper for proper scaling */
.imgWrapper{
  flex:0 0 auto;
  max-width:220px;
  display:flex;
  align-items:center;
}
.imgWrapper img{
  max-height:100%;
  width:auto;
  object-fit:contain;
  pointer-events:none;
  user-select:none;
}

.cardContent{
  flex:1;
  overflow:auto;
}

.cardContent h2{
  margin:0 0 12px 0;
  font-size:clamp(22px,2vw,32px);
}

.field{
  font-size:14px;
  margin:3px 0;
}

/* ---------- TABLE ---------- */
#bottomSection{
  display:none;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 3px 8px rgba(0,0,0,0.15);
}

table{
  border-collapse:collapse;
  width:100%;
  table-layout:auto;
}

th,td{
  border:1px solid #ddd;
  padding:6px 10px;
  vertical-align:top;
  word-break:break-word;
}

th{
  background:#eee;
  white-space:nowrap;
}

/* ---------- MOBILE ---------- */
@media (max-width:700px){

  #hkCard,
  #jpCard{
    flex:1 1 100%;
  }

  .card{
    flex-direction:column;
    align-items:center;
  }

  .imgWrapper{
    max-width:100%;
    width:100%;
  }

  .imgWrapper img{
    max-height:250px;
    width:auto;
  }
}
</style>
</head>

<body>

<div id="topSection">
  <div id="hkCard"></div>
  <div id="jpCard"></div>
</div>

<div id="bottomSection">
  <h2>收錄作品</h2>
  <table id="worksTable"></table>
</div>

<script>
/* ---------- BACKEND COLUMN CONFIG ---------- */
const hiddenColumns = ["ISBN"]; 

const columnOrder = [
  "作品番","作品名","作者","類","番","巻","收錄話","收錄頁",
  "出版副題","收錄初出掲載誌","收錄初出掲載号","出版備考",
  "副題港譯","色","初出掲載誌","掲載番","初出掲載号","初出掲載頁",
  "初出副題","単行本","第0巻","ドラミちゃん","文庫","兒童版",
  "藤子不二雄ランド","大全集","頁","全集副題","備考","全集副題香港譯名","作品類"
];

/* ---------- LABELS ---------- */

const hkCardFieldLabels = {
  "Title": "書名",
  "Volume": "卷數",
  "Subtitle": "副標題",
  "Author": "作者",
  "Publisher": "出版社",
  "Price": "定價",
  "Page": "頁數",
  "IssueDate": "發行日期",
  "Size": "尺寸",
  "RetailPoint": "零售點",
  "ISBN": "ISBN",
  "OriginalTitle": "原書名",
  "OriginalSubtitle": "原副標題",
  "OriginCountry": "原產地",
  "ISBN_JP": "日本ISBN",
  "Active": "是否上架",
  "Sold": "已售數"
};

const jpCardFieldLabels = {
  "標題": "タイトル",
  "巻": "巻数",
  "副標題": "サブタイトル",
  "著": "著者",
  "出版社": "出版社",
  "定価": "定価",
  "頁": "ページ",
  "初版発行日": "初版発行日",
  "判型": "判型",
  "ISBN": "ISBN",
  "Active": "販売中",
  "Image": "画像"
};

/* ---------- CACHE ---------- */

const CACHE_TIME = 10 * 60 * 1000;

async function fetchWithCache(url){
  let cache = localStorage.getItem(url);
  if(cache){
    let obj = JSON.parse(cache);
    if(Date.now() - obj.time < CACHE_TIME) return obj.data;
  }
  let data = await (await fetch(url)).json();
  localStorage.setItem(url,JSON.stringify({time:Date.now(),data:data}));
  return data;
}

/* ---------- URL PARAMETERS ---------- */

const params = new URLSearchParams(location.search);
const ISBNHK = params.get("ISBNHK");
const ISBNJP = params.get("ISBNJP");

/* ---------- DATA SOURCES ---------- */

const hkURL = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録HK";
const jpURL = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録JP";
const worksURL = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/書籍收錄作品";
const masterURL = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/作品完整列表";

/* ---------- HELPERS ---------- */

function key(v){ return String(v||"").trim(); }

function createCard(data,titleField,labelMap){
  let card = document.createElement("div");
  card.className = "card";

  let img = document.createElement("img");
  img.src = data.Image || "";

  let imgWrapper = document.createElement("div");
  imgWrapper.className = "imgWrapper";
  imgWrapper.appendChild(img);

  let content = document.createElement("div");
  content.className = "cardContent";

  let title = document.createElement("h2");
  title.textContent = data[titleField] || "";
  content.appendChild(title);

  for(let k in data){
    if(k===titleField || k==="Image") continue;
    let div = document.createElement("div");
    div.className="field";
    div.innerHTML = "<b>" + (labelMap[k]||k) + "</b>: " + data[k];
    content.appendChild(div);
  }

  card.appendChild(imgWrapper);
  card.appendChild(content);

  return card;
}

/* ---------- LOAD CARDS ---------- */

async function loadHK(){
  if(!ISBNHK) return;
  let data = await fetchWithCache(hkURL);
  let row = data.find(r=>key(r.ISBN)===key(ISBNHK));
  if(row) document.getElementById("hkCard").appendChild(createCard(row,"Title",hkCardFieldLabels));
}

async function loadJP(){
  if(!ISBNJP) return;
  let data = await fetchWithCache(jpURL);
  let row = data.find(r=>key(r.ISBN)===key(ISBNJP));
  if(row) document.getElementById("jpCard").appendChild(createCard(row,"標題",jpCardFieldLabels));
}

/* ---------- LOAD TABLE ---------- */

async function loadTable(){
  if(!ISBNJP) return;
  document.getElementById("bottomSection").style.display="block";

  const works = await fetchWithCache(worksURL);
  const master = await fetchWithCache(masterURL);
  const masterMap = {};
  master.forEach(r=>masterMap[key(r["作品番"])]=r);

  let filtered = works.filter(r=>key(r.ISBN)===key(ISBNJP));
  filtered = filtered.map(w=>({...w,...(masterMap[key(w["作品番")]]||{})}));
  filtered.sort((a,b)=>Number(a["收錄話"]||0)-Number(b["收錄話"]||0));

  let allColumns = new Set();
  filtered.forEach(r=>Object.keys(r).forEach(c=>allColumns.add(c)));

  let visibleColumns = [...allColumns].filter(c=>!hiddenColumns.includes(c));
  visibleColumns.sort((a,b)=>{
    let ia = columnOrder.indexOf(a), ib = columnOrder.indexOf(b);
    if(ia===-1) ia=999; if(ib===-1) ib=999;
    return ia-ib || a.localeCompare(b);
  });

  let table = document.getElementById("worksTable");
  let html="<tr>"+visibleColumns.map(c=>"<th>"+c+"</th>").join("")+"</tr>";
  filtered.forEach(r=>{
    html+="<tr>"+visibleColumns.map(c=><td>"+(r[c]??"")+"</td>").join("")+"</tr>";
  });
  table.innerHTML=html;
}

/* ---------- SECURITY ---------- */
document.addEventListener("contextmenu",e=>e.preventDefault());
document.addEventListener("dragstart",e=>{if(e.target.tagName==="IMG") e.preventDefault();});

/* ---------- RUN ---------- */
Promise.all([loadHK(), loadJP(), loadTable()]);
</script>

</body>
</html>
