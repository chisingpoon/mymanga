<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Viewer</title>
<style>
body{
  font-family: Arial, Helvetica, sans-serif;
  margin: 20px;
  background: #f3f3f3;
}

#topSection{
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  margin-bottom: 30px;
  align-items: stretch; /* all cards equal height */
  justify-content: flex-start; /* left align */
}

#hkCard, #jpCard{
  flex: 0 0 420px;
  max-width: 100%;
  display: flex;
}

.card{
  display: flex;
  flex: 1 1 auto;
  flex-direction: row;
  gap: 20px;
  background: white;
  border-radius: 10px;
  padding: 18px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.15);
  min-height: 260px;
  align-items: stretch; /* ensures equal height within flex */
}

.imgWrapper{
  flex: 0 0 auto;
  max-width: 220px;
  display: flex;
  align-items: center;
}
.imgWrapper img{
  max-height: 100%;
  width: auto;
  object-fit: contain;
  pointer-events: none;
  user-select: none;
}

.cardContent{
  flex: 1;
  overflow: auto;
}

.cardContent h2{
  margin: 0 0 12px 0;
  font-size: clamp(22px, 2vw, 32px);
}

.field{
  font-size: 14px;
  margin: 3px 0;
}

#bottomSection{
  display: none;
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.15);
}

table{
  border-collapse: collapse;
  width: 100%;
  table-layout: auto;
}

th, td{
  border: 1px solid #ddd;
  padding: 6px 10px;
  vertical-align: top;
  word-break: break-word;
}

th{
  background: #eee;
  white-space: nowrap;
}

@media(max-width:700px){
  #hkCard, #jpCard{
    flex: 1 1 100%;
  }
  .card{
    flex-direction: column;
    align-items: center;
  }
  .imgWrapper{
    max-width: 100%;
    width: 100%;
  }
  .imgWrapper img{
    max-height: 250px;
    width: auto;
  }
}
</style>
</head>
<body>

<div id="topSection">
  <div id="hkCard"></div>
  <div id="jpCard"></div>
</div>

<div id="bottomSection">
  <h2>收錄作品</h2>
  <table id="worksTable"></table>
</div>

<script>
const params = new URLSearchParams(location.search);
const ISBNHK = params.get("ISBNHK");
const ISBNJP = params.get("ISBNJP");

const CACHE_TIME = 10 * 60 * 1000;
const hkURL = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録HK";
const jpURL = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録JP";
const worksURL = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/書籍收錄作品";
const masterURL = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/作品完整列表";

function key(v){ return String(v||"").trim(); }

async function fetchWithCache(url){
  try{
    const cache = localStorage.getItem(url);
    if(cache){
      const obj = JSON.parse(cache);
      if(Date.now() - obj.time < CACHE_TIME) return obj.data;
    }
    const response = await fetch(url);
    const data = await response.json();
    localStorage.setItem(url, JSON.stringify({time: Date.now(), data}));
    return data;
  }catch(e){
    console.error("Fetch failed:", url, e);
    return [];
  }
}

function createCard(data, titleField){
  const card = document.createElement("div");
  card.className = "card";

  const img = document.createElement("img");
  img.src = data.Image || "";

  const imgWrapper = document.createElement("div");
  imgWrapper.className = "imgWrapper";
  imgWrapper.appendChild(img);

  const content = document.createElement("div");
  content.className = "cardContent";

  const title = document.createElement("h2");
  title.textContent = data[titleField] || "";
  content.appendChild(title);

  for(const k in data){
    if(k === titleField || k === "Image") continue;
    const div = document.createElement("div");
    div.className = "field";
    div.innerHTML = "<b>" + k + "</b>: " + data[k];
    content.appendChild(div);
  }

  card.appendChild(imgWrapper);
  card.appendChild(content);
  return card;
}

async function loadCard(containerId, url, ISBN, titleField){
  if(!ISBN) return;
  try{
    const data = await fetchWithCache(url);
    const row = data.find(r=>key(r.ISBN)===key(ISBN));
    if(row){
      document.getElementById(containerId).appendChild(createCard(row, titleField));
    }
  }catch(e){ console.error(e); }
}

async function loadTable(){
  if(!ISBNJP) return;
  try{
    const [works, master] = await Promise.all([fetchWithCache(worksURL), fetchWithCache(masterURL)]);
    const masterMap = {};
    master.forEach(r=>masterMap[key(r["作品番"])] = r);

    let filtered = works.filter(r=>key(r.ISBN)===key(ISBNJP));
    filtered = filtered.map(w=>({...w, ...(masterMap[key(w["作品番")]]||{})}));

    if(filtered.length === 0) return;

    document.getElementById("bottomSection").style.display = "block";

    const columns = Array.from(new Set(filtered.flatMap(r=>Object.keys(r))));
    const table = document.getElementById("worksTable");

    let html = "<tr>"+columns.map(c=>"<th>"+c+"</th>").join("")+"</tr>";
    filtered.forEach(r=>{
      html+="<tr>"+columns.map(c=>"<td>"+(r[c]||"")+"</td>").join("")+"</tr>";
    });
    table.innerHTML = html;
  }catch(e){ console.error(e); }
}

loadCard("hkCard", hkURL, ISBNHK, "Title");
loadCard("jpCard", jpURL, ISBNJP, "標題");
loadTable();
</script>

</body>
</html>
