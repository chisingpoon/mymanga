<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Book Detail</title>
<style>
body {
  font-family: Arial;
  padding: 40px;
}
.top-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  margin-bottom: 40px;
}
.card {
  background: white;
  border-radius: 12px;
  padding: 25px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}
.card-inner {
  display: grid;
  grid-template-columns: 40% 60%;
  gap: 20px;
  height: 100%;
}
.book-image {
  position: relative;
  width: 100%;
  height: 100%;
  border-radius: 8px;
  overflow: hidden;
}
.book-image img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  border-radius: 8px;
}
.column-box {
  font-size: 14px;
}

/* Table styling */
.details-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: auto; /* auto-fit columns based on content */
}
.details-table th, .details-table td {
  border: 1px solid #ccc;
  padding: 6px 10px;
  word-break: break-word;
  white-space: normal; /* wrap by default */
}
.details-table th.nowrap, .details-table td.nowrap {
  white-space: nowrap; /* keep nowrap columns single-line */
}
.details-table th {
  background: #f2f2f2;
  text-align: left;
}
.details-table tr:nth-child(even) {
  background: #fafafa;
}

/* Image modal */
.image-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
  z-index: 9999;
}
.image-modal.show {
  display: flex;
}
.image-modal img {
  max-width: 90%;
  max-height: 90%;
  object-fit: contain;
  border-radius: 8px;
}
.image-close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 40px;
  color: white;
  cursor: pointer;
}
.clickable-image {
  cursor: zoom-in;
}
img {
  user-select: none;
  -webkit-user-drag: none;
}
</style>
</head>
<body>

<div id="content">Loading...</div>

<script>
// ===== Configuration =====
const hideColumns = []; // Columns to hide
const nowrapColumns = ["ISBN", "作品番", "巻"]; // Columns to keep single-line

// ===== URL parameters =====
const params = new URLSearchParams(window.location.search);
const isbnhk = (params.get("isbnhk") || params.get("isbn") || "").trim();
const isbnjp = (params.get("isbnjp") || params.get("isbn") || "").trim();

// ===== Sheet URLs =====
const MANGALIST_SHEET = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録HK";
const JPINFO_SHEET = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録JP";
const BOOKSTORY_SHEET = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/書籍收錄作品";
const STORYDETAIL_SHEET = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/作品完整列表";

// ===== Validate ISBN =====
if (!isbnhk && !isbnjp) {
  document.getElementById("content").innerHTML = "Please provide a valid ISBN (isbnhk or isbnjp) in the URL.";
} else {
  Promise.all([
    fetch(MANGALIST_SHEET).then(r => r.json()),
    fetch(JPINFO_SHEET).then(r => r.json()),
    fetch(BOOKSTORY_SHEET).then(r => r.json()),
    fetch(STORYDETAIL_SHEET).then(r => r.json())
  ])
  .then(([hkbooks, jpbooks, bookStories, allStories]) => {
    const manga = isbnhk ? hkbooks.find(b => b.ISBN?.trim() === isbnhk) : null;
    const jpinfo = isbnjp ? jpbooks.find(j => j.ISBN?.trim() === isbnjp) : null;

    if (!manga && !jpinfo) {
      document.getElementById("content").innerHTML = "Book not found.";
      return;
    }

    const collectedWorks = jpinfo ? bookStories
      .filter(r => r.ISBN?.trim() === jpinfo.ISBN?.trim())
      .sort((a, b) => Number(a.話 || a.收錄話 || 0) - Number(b.話 || b.收錄話 || 0))
      : [];

    const mergedRows = collectedWorks.map(r => {
      const detail = allStories.find(s => s.作品番?.trim() === r.作品番?.trim());
      return {...r, ...detail};
    });

    renderPage(manga, jpinfo, mergedRows);

  })
  .catch(err => {
    console.error(err);
    document.getElementById("content").innerHTML = "Failed to load data.";
  });
}

// ===== Render Page =====
function renderPage(manga, jpinfo, storyRows) {
  const hkCard = manga ? `
    <div class="card">
      <div class="card-inner">
        <div class="book-image">
          <img src="${manga.Image || ""}" alt="${manga.Title || ""}" class="clickable-image" onclick="openImageModal('${manga.Image || ""}')">
        </div>
        <div class="column-box">
          <h3>${manga.OriginCountry || ""}版資料</h3>
          <h1>${manga.Title || ""} ${manga.Volume || ""}</h1>
          <h2>${manga.Subtitle || ""}</h2>
          <div><strong>作者:</strong> ${manga.Author || ""}</div>
          <div><strong>出版社:</strong> ${manga.Publisher || ""}</div>
          <div><strong>尺碼:</strong> ${manga.Size || ""}</div>
          <div><strong>出版日期:</strong> ${manga.IssueDate || ""}</div>
          <div><strong>售價:</strong> $${manga.Price || ""}</div>
          <div><strong>頁數:</strong> ${manga.Page || ""}</div>
          <div><strong>出版地區:</strong> ${manga.OriginCountry || ""}</div>
          <div><strong>ISBN:</strong> ${manga.ISBN || ""}</div>
        </div>
      </div>
    </div>
  ` : "";

  const jpCard = jpinfo ? `
    <div class="card">
      <div class="card-inner">
        <div class="book-image">
          <img src="${jpinfo.Image || ""}" alt="${jpinfo.標題 || ""}" class="clickable-image" onclick="openImageModal('${jpinfo.Image || ""}')">
        </div>
        <div class="column-box">
          <h3>日文原版資料</h3>
          <h1>${jpinfo.標題 || ""} ${jpinfo.巻 || ""}</h1>
          <h2>${jpinfo.副標題 || ""}</h2>
          <div><strong>系列:</strong> ${jpinfo.系列 || ""}</div>
          <div><strong>著:</strong> ${jpinfo.著 || ""}</div>
          <div><strong>判型:</strong> ${jpinfo.判型 || ""}</div>
          <div><strong>頁:</strong> ${jpinfo.頁 || ""}</div>
          <div><strong>話:</strong> ${jpinfo.話 || ""}</div>
          <div><strong>初版発行日:</strong> ${jpinfo.初版発行日 || ""}</div>
          <div><strong>定価:</strong> ${jpinfo.定価 || ""}</div>
          <div><strong>ISBN:</strong> ${jpinfo.ISBN || ""}</div>
        </div>
      </div>
    </div>
  ` : "";

  document.getElementById("content").innerHTML = `<div class="top-section">${hkCard}${jpCard}</div>`;

  // ===== Bottom Table =====
  if (storyRows.length > 0) {
    const allColumns = Array.from(new Set(storyRows.flatMap(row => Object.keys(row))))
      .filter(c => !hideColumns.includes(c));

    const thead = `<tr>${allColumns.map(c => `<th class="${nowrapColumns.includes(c) ? 'nowrap' : ''}">${c}</th>`).join('')}</tr>`;
    const tbody = storyRows.map(row => `
      <tr>${allColumns.map(c => `<td class="${nowrapColumns.includes(c) ? 'nowrap' : ''}">${row[c] || ""}</td>`).join('')}</tr>
    `).join("");

    const tableSection = `
      <h2>收錄故事</h2>
      <table class="details-table">
        <thead>${thead}</thead>
        <tbody>${tbody}</tbody>
      </table>
    `;
    document.getElementById("content").insertAdjacentHTML('beforeend', tableSection);
  }
}

// ===== Image modal =====
function openImageModal(src) {
  const modal = document.getElementById("imageModal");
  const modalImg = document.getElementById("modalImage");
  modalImg.src = src;
  modal.classList.add("show");
}
function closeImageModal() {
  const modal = document.getElementById("imageModal");
  modal.classList.remove("show");
}

// ===== Key and interaction events =====
document.addEventListener("keydown", e => { if(e.key==="Escape") closeImageModal(); });
window.addEventListener("contextmenu", e => e.preventDefault(), true);
window.addEventListener("dragstart", e => e.preventDefault());
</script>

<div id="imageModal" class="image-modal">
  <span class="image-close" onclick="closeImageModal()">&times;</span>
  <img id="modalImage">
</div>

</body>
</html>
