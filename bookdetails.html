<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Book Detail</title>
  <style>
    body {
      font-family: Arial;
      padding: 40px;
    }

    .top-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      margin-bottom: 40px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    .card-inner {
      display: grid;
      grid-template-columns: 40% 60%;
      gap: 20px;
    }

    .book-image {
      aspect-ratio: 3 / 4;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      border-radius: 8px;
      overflow: hidden;
    }

    .book-image img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .column-box {
      font-size: 14px;
    }

    /* ===== Details Table ===== */
    .details-table {
      width: 100%;              
      border-collapse: collapse;
      table-layout: auto;       
    }

    .details-table th,
    .details-table td {
      border: 1px solid #ccc;
      padding: 6px 10px;
      word-break: break-word;
    }

    .details-table th {
      background: #f2f2f2;
      text-align: left;
    }

    .details-table tr:nth-child(even) {
      background: #fafafa;
    }

    /* ===== Image Modal ===== */
    .image-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .image-modal.show {
      display: flex;
    }

    .image-modal img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      border-radius: 8px;
    }

    .image-close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 40px;
      color: white;
      cursor: pointer;
    }

    .clickable-image {
      cursor: zoom-in;
    }
  </style>
</head>
<body>

<div id="content">Loading...</div>

<script>
// 1️⃣ Get ISBN from URL
const params = new URLSearchParams(window.location.search);
const isbnhk = params.get("isbnhk");  // HK ISBN
const isbnjp = params.get("isbnjp");  // JP ISBN

console.log('isbnhk:', isbnhk, 'isbnjp:', isbnjp);  // Debugging ISBNs

// 2️⃣ Sheet URLs
const MANGALIST_SHEET =
  "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録HK";
const JPINFO_SHEET =
  "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録JP";
const BOOKSTORY_SHEET =
  "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/書籍收錄作品";
const STORYDETAIL_SHEET =
  "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/作品完整列表";

// 3️⃣ Load everything
if (!isbnhk && !isbnjp) {
  document.getElementById("content").innerHTML = "Please provide a valid ISBN (isbnhk or isbnjp) in the URL.";
  return;
}

Promise.all([
  fetch(MANGALIST_SHEET).then(r => r.json()),
  fetch(JPINFO_SHEET).then(r => r.json()),
  fetch(BOOKSTORY_SHEET).then(r => r.json()),
  fetch(STORYDETAIL_SHEET).then(r => r.json())
])
.then(([hkbooks, jpbooks, bookStories, allStories]) => {
  console.log('Loaded Sheets:', { hkbooks, jpbooks, bookStories, allStories });

  // 1️⃣ Find HK book if isbnhk is provided
  const manga = isbnhk ? hkbooks.find(b => b.ISBN?.trim() === isbnhk?.trim()) : null;
  console.log('Found HK Book:', manga);

  // 2️⃣ Find JP book if isbnjp is provided
  const jpinfo = isbnjp ? jpbooks.find(j => j.ISBN?.trim() === isbnjp?.trim()) : null;
  console.log('Found JP Book:', jpinfo);

  if (!manga && !jpinfo) {
    document.getElementById("content").innerHTML = "Book not found.";
    return;
  }

  const collectedWorks = jpinfo ? bookStories
    .filter(r => r.ISBN?.trim() === jpinfo.ISBN?.trim())
    .sort((a, b) => Number(a.話) - Number(b.話)) : [];

  const mergedRows = collectedWorks.map(r => {
    const detail = allStories.find(s => s.作品番?.trim() === r.作品番?.trim());
    return { ...r, ...detail };
  });

  render(manga, mergedRows, jpinfo);
})
.catch(err => {
  console.error('Error fetching data:', err);
  document.getElementById("content").innerHTML = "Failed to load data.";
});
