<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>書籍資料</title>

<style>
body { font-family: Arial; padding:40px; }

.top-section{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
margin-bottom:40px;
}

.card{
background:white;
border-radius:12px;
padding:25px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.card-inner{
display:grid;
grid-template-columns:40% 60%;
gap:20px;
height:100%;
}

.book-image{
position:relative;
width:100%;
height:100%;
border-radius:8px;
overflow:hidden;
}

.book-image img{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:contain;
border-radius:8px;
}

.column-box{font-size:14px;}

.details-table{
width:100%;
border-collapse:collapse;
table-layout:auto;
}

.details-table th,
.details-table td{
border:1px solid #ccc;
padding:6px 10px;
word-break:break-word;
}

.details-table th{
background:#f2f2f2;
text-align:left;
}

.details-table tr:nth-child(even){
background:#fafafa;
}

.nowrap{
white-space:nowrap;
width:1%;
}

.image-modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
z-index:9999;
}

.image-modal.show{
display:flex;
}

.image-modal img{
max-width:90%;
max-height:90%;
object-fit:contain;
}

.image-close{
position:absolute;
top:20px;
right:30px;
font-size:40px;
color:white;
cursor:pointer;
}

.clickable-image{cursor:zoom-in;}

img{
user-select:none;
-webkit-user-drag:none;
}
</style>
</head>


<body>

<header>
<h1>書籍資料</h1>
</header>

<div id="content">Loading...</div>

<script>

/* ---------------- CONFIG ---------------- */

const hideColumns=[
"ISBN","作品番","類","番","頁",
"收錄初出掲載誌","收錄初出掲載号","掲載番","初出掲載頁",
"単行本","第0巻","ドラミちゃん","文庫","兒童版",
"藤子不二雄ランド","全集副題","備考","全集副題香港譯名","作品類"
];

const nowrapColumns=[
"巻","番","收錄話","副題港譯","收錄頁",
"初出掲載誌","初出掲載号","大全集"
];

const columnOrderTable=[
"ISBN","作品番","類","番","巻","話","收錄話","收錄頁",
"出版副題","副題港譯",
"收錄初出掲載誌","收錄初出掲載号",
"色","初出掲載誌","掲載番","初出掲載号",
"初出掲載頁","初出副題",
"単行本","第0巻","ドラミちゃん","文庫",
"兒童版","藤子不二雄ランド","大全集","頁","全集副題",
"出版備考","備考","全集副題香港譯名","作品類"
];


/* ---------------- URL ---------------- */

const params=new URLSearchParams(window.location.search);
const isbnhk=(params.get("isbnhk")||"").trim();
const isbnjp=(params.get("isbnjp")||"").trim();


/* ---------------- SHEETS ---------------- */

const MANGALIST_SHEET="https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録HK";
const JPINFO_SHEET="https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録JP";
const BOOKSTORY_SHEET="https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/書籍收錄作品";
const STORYDETAIL_SHEET="https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/作品完整列表";


/* ---------------- CACHE ---------------- */

let cache={
loaded:false,
isbnIndex:new Map(),
storyIndex:new Map()
};


/* ---------------- LOAD DATA ---------------- */

async function loadStoryData(){

if(cache.loaded) return cache;

const [bookStories,allStories]=await Promise.all([
fetch(BOOKSTORY_SHEET).then(r=>r.json()),
fetch(STORYDETAIL_SHEET).then(r=>r.json())
]);


/* index stories by 作品番 */

allStories.forEach(row=>{
const key=row.作品番?.trim();
if(key) cache.storyIndex.set(key,row);
});


/* index bookStories by ISBN */

bookStories.forEach(row=>{
const isbn=row.ISBN?.trim();
if(!isbn) return;

if(!cache.isbnIndex.has(isbn)){
cache.isbnIndex.set(isbn,[]);
}

cache.isbnIndex.get(isbn).push(row);
});

cache.loaded=true;

return cache;
}


/* ---------------- MAIN ---------------- */

if(!isbnhk && !isbnjp){

document.getElementById("content").innerHTML="Please provide a valid ISBN.";

}else{

loadSheets();

}


async function loadSheets(){

let hkbooks=[];
let jpbooks=[];

const tasks=[];

if(isbnhk)
tasks.push(fetch(MANGALIST_SHEET).then(r=>r.json()));

if(isbnjp)
tasks.push(fetch(JPINFO_SHEET).then(r=>r.json()));

const results=await Promise.all(tasks);

let i=0;

if(isbnhk) hkbooks=results[i++];
if(isbnjp) jpbooks=results[i++];


const manga=isbnhk?hkbooks.find(b=>b.ISBN?.trim()===isbnhk):null;
const jpinfo=isbnjp?jpbooks.find(j=>j.ISBN?.trim()===isbnjp):null;

if(!manga && !jpinfo){
document.getElementById("content").innerHTML="Book not found.";
return;
}

renderCards(manga,jpinfo);

if(jpinfo){

const loading=document.createElement("div");
loading.innerText="Loading bottom table...";
document.getElementById("content").appendChild(loading);

const data=await loadStoryData();

loading.remove();

renderBottomTable(jpinfo,data);

}

}


/* ---------------- TOP CARDS ---------------- */

function renderCards(manga,jpinfo){

const hk=manga?`
<div class="card">
<div class="card-inner">

<div class="book-image">
<img src="${manga.Image||""}" class="clickable-image"
onclick="openImageModal('${manga.Image||""}')">
</div>

<div class="column-box">
<h3>${manga.OriginCountry||""}版資料</h3>
<h1>${manga.Title||""} ${manga.Volume||""}</h1>
<h2>${manga.Subtitle||""}</h2>
<div><b>作者:</b> ${manga.Author||""}</div>
<div><b>出版社:</b> ${manga.Publisher||""}</div>
<div><b>出版日期:</b> ${manga.IssueDate||""}</div>
<div><b>頁數:</b> ${manga.Page||""}</div>
<div><b>ISBN:</b> ${manga.ISBN||""}</div>
</div>

</div>
</div>`:"";


const jp=jpinfo?`
<div class="card">
<div class="card-inner">

<div class="book-image">
<img src="${jpinfo.Image||""}" class="clickable-image"
onclick="openImageModal('${jpinfo.Image||""}')">
</div>

<div class="column-box">
<h3>日文原版資料</h3>
<h1>${jpinfo.標題||""} ${jpinfo.巻||""}</h1>
<h2>${jpinfo.副標題||""}</h2>
<div><b>系列:</b> ${jpinfo.系列||""}</div>
<div><b>著:</b> ${jpinfo.著||""}</div>
<div><b>頁:</b> ${jpinfo.頁||""}</div>
<div><b>話:</b> ${jpinfo.話||""}</div>
<div><b>ISBN:</b> ${jpinfo.ISBN||""}</div>
</div>

</div>
</div>`:";


document.getElementById("content").innerHTML=
`<div class="top-section">${hk}${jp}</div>`;

}


/* ---------------- BOTTOM TABLE ---------------- */

function renderBottomTable(jpinfo,data){

const collectedWorks=data.isbnIndex.get(jpinfo.ISBN?.trim())||[];

if(!collectedWorks.length) return;

collectedWorks.sort((a,b)=>Number(a.收錄話||0)-Number(b.收錄話||0));

const mergedRows=collectedWorks.map(r=>{

const story=data.storyIndex.get(r.作品番?.trim());

return story?{...r,...story}:{...r};

});


const allColumns=[...new Set(
mergedRows.flatMap(r=>Object.keys(r))
)].filter(c=>!hideColumns.includes(c));

const finalColumns=[
...columnOrderTable.filter(c=>allColumns.includes(c)),
...allColumns.filter(c=>!columnOrderTable.includes(c))
];


const table=document.createElement("table");
table.className="details-table";

const thead=document.createElement("thead");
const tr=document.createElement("tr");

finalColumns.forEach(c=>{
const th=document.createElement("th");
th.textContent=c;
if(nowrapColumns.includes(c)) th.classList.add("nowrap");
tr.appendChild(th);
});

thead.appendChild(tr);
table.appendChild(thead);


const tbody=document.createElement("tbody");

mergedRows.forEach(r=>{

const tr=document.createElement("tr");

finalColumns.forEach(c=>{

const td=document.createElement("td");
td.textContent=r[c]?.trim()||"";

if(nowrapColumns.includes(c))
td.classList.add("nowrap");

tr.appendChild(td);

});

tbody.appendChild(tr);

});

table.appendChild(tbody);

const h2=document.createElement("h2");
h2.textContent="收錄故事";

document.getElementById("content").appendChild(h2);
document.getElementById("content").appendChild(table);

}


/* ---------------- IMAGE MODAL ---------------- */

function openImageModal(src){
const modal=document.getElementById("imageModal");
document.getElementById("modalImage").src=src;
modal.classList.add("show");
}

function closeImageModal(){
document.getElementById("imageModal").classList.remove("show");
}

document.addEventListener("keydown",e=>{
if(e.key==="Escape") closeImageModal();
});

window.addEventListener("contextmenu",e=>e.preventDefault(),true);
window.addEventListener("dragstart",e=>e.preventDefault());

</script>


<div id="imageModal" class="image-modal">
<span class="image-close" onclick="closeImageModal()">&times;</span>
<img id="modalImage">
</div>

</body>
</html>
