<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Viewer</title>

<style>
body{
  font-family:Arial, Helvetica, sans-serif;
  margin:20px;
  background:#f3f3f3;
}

/* ---------- TOP SECTION ---------- */
#topSection{
  display:grid;
  grid-template-columns:repeat(2, minmax(420px, 1fr));
  gap:20px;
  margin-bottom:30px;
  align-items:stretch;
}

#topSection.singleCard {
  grid-template-columns: 1fr; /* For single card display (only JP card) */
}

#jpCard {
  order: -1; /* Moves JP card to the left when it's the only card */
  display: none; /* Hide JP card when only HK card is displayed */
}

#hkCard {
  display: none; /* Hide HK card when ISBNHK is not passed */
}

/* ---------- CARD ---------- */
.card{
  display:flex;
  flex-direction:row;
  gap:20px;
  background:white;
  border-radius:10px;
  padding:18px;
  box-shadow:0 3px 8px rgba(0,0,0,0.15);
  min-height:260px;
  height:100%;
  align-items:stretch;
}

.card img{
  height:100%;
  width:auto;
  max-width:220px;
  object-fit:contain;
  pointer-events:none;
  user-select:none;
}

.cardContent{
  flex:1;
  overflow:auto;
}

.cardContent h2{
  margin:0 0 12px 0;
  font-size:clamp(22px,2vw,32px);
}

.field{
  font-size:14px;
  margin:3px 0;
}

/* ---------- TABLE ---------- */
#bottomSection{
  display:none;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 3px 8px rgba(0,0,0,0.15);
}

table{
  border-collapse:collapse;
  width:100%;
  table-layout:auto;
}

th,td{
  border:1px solid #ddd;
  padding:6px 10px;
  vertical-align:top;
  word-break:break-word;
}

th{
  background:#eee;
  white-space:nowrap;
}

/* ---------- MOBILE ---------- */
@media (max-width:700px){
  .card{
    flex-direction:column;
    align-items:center;
  }
  .card img{
    height:auto;
    max-height:250px;
  }
}
</style>
</head>

<body>
<div id="topSection">
  <div id="hkCard"></div>
  <div id="jpCard"></div>
</div>

<div id="bottomSection">
  <h2>收錄作品</h2>

/* ---------- CACHE ---------- */
const CACHE_TIME = 10*60*1000;
async function fetchWithCache(url){
  let cache = localStorage.getItem(url);
  if(cache){
    let obj = JSON.parse(cache);
    if(Date.now() - obj.time < CACHE_TIME){
      return obj.data;
    }
  }
  let data = await (await fetch(url)).json();
  localStorage.setItem(url, JSON.stringify({time:Date.now(), data:data}));
  return data;
}
