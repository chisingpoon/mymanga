<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Archive | Characters and Objects</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none; }
        body { 
            -webkit-user-select: text; user-select: text;
            min-height: 100vh; background-color: #f8fafc; 
            font-family: 'Inter', 'Noto Sans TC', 'Noto Sans JP', system-ui, sans-serif; color: #1e293b;
        }
        .bg-grid { background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to bottom, #e2e8f0 1px, transparent 1px); background-size: 40px 40px; }
        .loader-wrapper { position: fixed; inset: 0; background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 5px solid #cbd5e1; border-top: 5px solid #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .top-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .data-card { background: white; border-radius: 20px; border: 2px solid #f1f5f9; transition: all 0.3s ease; height: 100%; }
        .data-card:hover { border-color: #e2e8f0; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="bg-grid">
    <div id="app" v-cloak>
        <div v-if="loading" class="loader-wrapper">
            <div class="spinner"></div>
            <p class="mt-4 text-[11px] font-black uppercase tracking-widest text-slate-500">Syncing with Archive...</p>
        </div>

        <nav class="top-nav">
            <div class="max-w-[1400px] mx-auto px-6 h-20 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </div>
                    <h1 class="font-black text-xl tracking-tight text-slate-800 uppercase">Characters & Things</h1>
                </div>
            </div>
        </nav>

        <main class="max-w-[1400px] mx-auto px-6 pt-10 pb-20">
            <div class="flex flex-wrap items-center gap-4 mb-10 bg-white p-4 rounded-2xl border border-slate-200 shadow-sm sticky top-24 z-30">
                <div class="flex-1 min-w-[300px] relative">
                    <input type="text" v-model.trim="searchQuery" placeholder="Search names, translations, or movies..." 
                           class="w-full bg-slate-50 border-2 border-slate-50 rounded-xl pl-12 pr-4 py-3 text-sm font-bold outline-none focus:border-indigo-500 focus:bg-white transition-all">
                    <svg class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2.5" stroke-linecap="round"></path></svg>
                </div>
            
                <div class="flex items-center gap-3">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Group By</span>
                    <div class="flex bg-slate-100 p-1 rounded-xl">
                        <button @click="groupBy = 'object'" :class="groupBy === 'object' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'" class="px-4 py-2 rounded-lg text-xs font-black transition-all">OBJECT</button>
                        <button @click="groupBy = 'movie'" :class="groupBy === 'movie' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'" class="px-4 py-2 rounded-lg text-xs font-black transition-all">MOVIE</button>
                    </div>
                </div>

                <div class="px-4 py-2 bg-slate-900 rounded-xl text-white">
                    <span class="text-[10px] font-bold opacity-60 mr-2">TOTAL</span>
                    <span class="text-sm font-black">{{ displayGroups.length }}</span>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div v-for="group in paginatedGroups" :key="group.id" class="data-card p-6 flex flex-col">
                    <div class="mb-5">
                        <template v-if="groupBy === 'movie'">
                            <p class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-1">Source Material</p>
                            <h2 class="text-xl font-black text-slate-900 leading-tight">{{ group.title }}</h2>
                        </template>
                        <template v-else>
                            <p class="text-[10px] font-black text-emerald-500 uppercase tracking-widest mb-1">Subject Entry</p>
                            <h2 class="text-xl font-black text-slate-900 leading-tight">{{ group.title }}</h2>
                            <p v-if="group.hkTrans" class="text-lg font-bold text-slate-400 mt-1">{{ group.hkTrans }}</p>
                        </template>
                    </div>

                    <div class="space-y-3 mt-auto">
                        <div v-for="(item, idx) in group.items" :key="idx" class="p-4 bg-slate-50 rounded-xl border border-slate-100 hover:border-indigo-200 transition-colors">
                            <template v-if="groupBy === 'movie'">
                                <div class="flex justify-between items-start mb-1">
                                    <span class="text-[9px] font-black text-slate-400 uppercase">ID: {{ item.objectId }}</span>
                                    <span v-if="item.type" class="text-[9px] font-bold bg-white px-1.5 py-0.5 rounded border border-slate-200 uppercase">{{ item.type }}</span>
                                </div>
                                <p class="font-black text-slate-800 leading-snug">{{ item.jpTitle }}</p>
                                <p v-if="item.hkTrans" class="text-sm font-bold text-indigo-600 mt-1">港譯: {{ item.hkTrans }}</p>
                            </template>
                            <template v-else>
                                <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Featured In</p>
                                <p class="font-bold text-slate-800 leading-tight">{{ item.movieTitle }}</p>
                            </template>

                            <div v-if="item.culture || item.chingwin" class="flex flex-wrap gap-2 mt-3 pt-3 border-t border-slate-200/50">
                                <span v-if="item.culture && item.culture !== '-'" class="text-[9px] font-black bg-rose-50 text-rose-700 px-2 py-1 rounded">文傳: {{ item.culture }}</span>
                                <span v-if="item.chingwin && item.chingwin !== '-'" class="text-[9px] font-black bg-sky-50 text-sky-700 px-2 py-1 rounded">青文: {{ item.chingwin }}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div v-if="totalPages > 1" class="mt-12 flex flex-col items-center gap-4">
                <div class="flex items-center gap-2">
                    <button @click="changePage(currentPage - 1)" :disabled="currentPage === 1" class="w-12 h-12 flex items-center justify-center rounded-xl border-2 border-slate-200 bg-white font-black hover:border-indigo-500 disabled:opacity-30 disabled:hover:border-slate-200 transition-all">←</button>
                    <div class="px-6 py-2 bg-white border-2 border-slate-200 rounded-xl font-black text-sm">PAGE {{ currentPage }} / {{ totalPages }}</div>
                    <button @click="changePage(currentPage + 1)" :disabled="currentPage === totalPages" class="w-12 h-12 flex items-center justify-center rounded-xl border-2 border-slate-200 bg-white font-black hover:border-indigo-500 disabled:opacity-30 disabled:hover:border-slate-200 transition-all">→</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    loading: true,
                    searchQuery: '',
                    groupBy: 'object',
                    currentPage: 1,
                    itemsPerPage: 12,
                    objectsMaster: [], // Data from '人物'
                    objectMedia: [],   // Data from '媒體與人物'
                    movies: []         // Data from '電影動畫'
                }
            },
            computed: {
                processedData() {
                    if (this.loading) return [];
                    const q = this.searchQuery.toLowerCase();

                    return this.objectMedia.map(m => {
                        // MATCHING LOGIC: Find character info in '人物' sheet using 'Object ID'
                        const masterEntry = this.objectsMaster.find(o => String(o['Object ID']) === String(m['Object ID']));
                        const movieEntry = this.movies.find(mov => String(mov['Media ID']) === String(m['Movie ID']));

                        return {
                            objectId: m['Object ID'],
                            movieId: m['Movie ID'],
                            type: m['Object Type'],
                            jpTitle: masterEntry ? masterEntry['JP Title'] : 'Unknown',
                            movieTitle: movieEntry ? movieEntry['JP Title'] : 'Unknown Movie',
                            active: masterEntry ? (masterEntry['Active'] || 'yes') : 'yes',
                            hkTrans: m['HK Translation'],
                            culture: m['CultureCom Trans'],
                            chingwin: m['HKChingWin Trans']
                        };
                    }).filter(item => {
                        // Filter logic
                        const isActive = String(item.active).toLowerCase() === 'yes';
                        const matchText = (item.jpTitle + item.hkTrans + item.movieTitle + item.culture + item.chingwin).toLowerCase();
                        return isActive && (!q || matchText.includes(q));
                    });
                },
                displayGroups() {
                    const groups = {};
                    this.processedData.forEach(item => {
                        const key = this.groupBy === 'object' ? item.objectId : item.movieId;
                        if (!key || key === '-') return;

                        if (!groups[key]) {
                            groups[key] = {
                                id: key,
                                title: this.groupBy === 'object' ? item.jpTitle : item.movieTitle,
                                hkTrans: this.groupBy === 'object' ? item.hkTrans : '',
                                items: []
                            };
                        }
                        groups[key].items.push(item);
                    });
                    
                    // Sort alphabetically by title
                    return Object.values(groups).sort((a, b) => a.title.localeCompare(b.title, 'zh-Hant'));
                },
                totalPages() {
                    return Math.ceil(this.displayGroups.length / this.itemsPerPage);
                },
                paginatedGroups() {
                    const start = (this.currentPage - 1) * this.itemsPerPage;
                    return this.displayGroups.slice(start, start + this.itemsPerPage);
                }
            },
            methods: {
                async init() {
                    const base = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/";
                    try {
                        const [o, om, m] = await Promise.all([
                            fetch(base + "人物").then(r => r.json()),
                            fetch(base + "媒體與人物").then(r => r.json()),
                            fetch(base + "電影動畫").then(r => r.json())
                        ]);

                        this.objectsMaster = Array.isArray(o) ? o : [];
                        this.objectMedia = Array.isArray(om) ? om : [];
                        this.movies = Array.isArray(m) ? m : [];
                        
                        this.loading = false;
                    } catch (e) {
                        console.error("Archive Load Error:", e);
                        alert("Could not load data. Check sheet naming or privacy settings.");
                    }
                },
                changePage(p) {
                    this.currentPage = p;
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            },
            mounted() {
                this.init();
            }
        }).mount('#app');
    </script>
</body>
</html>
