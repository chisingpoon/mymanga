<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Archive | Characters and Things</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none; }
        body { 
            -webkit-user-select: text; user-select: text;
            min-height: 100vh; background-color: #f8fafc; 
            font-family: 'Inter', 'Noto Sans TC', 'Noto Sans JP', system-ui, sans-serif; color: #1e293b;
        }
        .bg-grid { background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to bottom, #e2e8f0 1px, transparent 1px); background-size: 40px 40px; }
        .loader-wrapper { position: fixed; inset: 0; background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 5px solid #e2e8f0; border-top: 5px solid #4f46e5; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .top-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .data-card { background: white; border-radius: 20px; border: 1px solid #e2e8f0; transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-grid">
    <div id="app" v-cloak>
        <div v-if="loading" class="loader-wrapper">
            <div class="spinner"></div>
            <p class="mt-4 text-[11px] font-black uppercase tracking-widest text-slate-500">Processing Archive...</p>
        </div>

        <nav class="top-nav">
            <div class="max-w-[1400px] mx-auto px-6 h-20 flex items-center justify-between">
                <div class="flex items-center gap-6">
                    <a href="index.html" class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center text-white shadow-xl">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </a>
                    <h1 class="font-black text-2xl tracking-tighter text-slate-800 uppercase">Characters and Things</h1>
                </div>
            </div>
        </nav>

        <main class="max-w-[1400px] mx-auto px-6 pt-10">
            <div class="flex flex-wrap items-center gap-4 mb-8 bg-white/80 p-4 rounded-2xl backdrop-blur-md border border-slate-200 sticky top-24 z-30 shadow-sm">
                <div class="flex-1 min-w-[280px] relative">
                    <input type="text" v-model.trim="searchQuery" placeholder="Search objects or movies..." 
                           class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl pl-11 pr-10 py-2.5 text-sm font-bold outline-none focus:border-indigo-500 focus:bg-white transition-all">
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="3" stroke-linecap="round"></path></svg>
                    </div>
                    <button v-if="searchQuery" @click="searchQuery = ''" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-600 p-1">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </button>
                </div>
            
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">View By</span>
                    <select v-model="groupBy" class="bg-slate-50 border-2 border-slate-100 rounded-xl px-3 py-2.5 text-sm font-black outline-none focus:border-indigo-500 cursor-pointer">
                        <option value="object">Object</option>
                        <option value="movie">Movie</option>
                    </select>
                </div>
            
                <div class="bg-indigo-50 border border-indigo-100 px-4 py-2.5 rounded-xl flex items-center gap-3">
                    <span class="text-[10px] font-black text-indigo-400 uppercase">Results</span>
                    <span class="text-base font-black text-indigo-700">{{ displayGroups.length }}</span>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-12">
                <template v-for="group in paginatedGroups" :key="group.id">
                    <div class="data-card p-6 flex flex-col border-2 border-slate-100 shadow-sm hover:border-indigo-200 transition-colors">
                        <div class="mb-6">
                            <template v-if="groupBy === 'movie'">
                                <span class="text-[11px] font-black text-cyan-600 uppercase tracking-widest mb-1 block">Movie</span>
                                <h2 class="text-2xl font-black text-slate-900 leading-tight">{{ group.title }}</h2>
                            </template>
                            <template v-else>
                                <span class="text-[11px] font-black text-indigo-500 uppercase tracking-widest mb-1 block">Character/Thing</span>
                                <h2 class="text-2xl font-black text-slate-900 leading-tight">{{ group.title }}</h2>
                                <h2 v-if="group.hkTrans" class="text-xl font-bold text-slate-500 mt-1">{{ group.hkTrans }}</h2>
                            </template>
                        </div>
                        <hr class="border-slate-100 mb-6">
                        <div class="flex-1 space-y-5">
                            <div v-for="(item, idx) in group.items" :key="idx" class="border-l-4 border-indigo-200 pl-4">
                                <div class="p-4 bg-slate-50 rounded-xl hover:bg-white border border-transparent hover:border-slate-100 transition-all">
                                    <template v-if="groupBy === 'movie'">
                                        <p class="text-[10px] font-black text-slate-400 uppercase mb-1">ID: {{ item.objectId }}</p>
                                        <p class="font-black text-slate-800 leading-snug">{{ item.jpTitle }}</p>
                                        <p v-if="item.hkTrans" class="text-sm font-bold text-indigo-600 mt-1">{{ item.hkTrans }}</p>
                                    </template>
                                    <template v-else>
                                        <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Source Material</p>
                                        <p class="font-bold text-slate-800">{{ item.movieTitle }}</p>
                                    </template>

                                    <div v-if="item.culture || item.chingwin" class="flex flex-wrap gap-2 mt-3">
                                        <span v-if="item.culture && item.culture !== '-'" class="px-2 py-1 text-[9px] font-black rounded bg-red-50 text-red-700">文傳: {{ item.culture }}</span>
                                        <span v-if="item.chingwin && item.chingwin !== '-'" class="px-2 py-1 text-[9px] font-black rounded bg-blue-50 text-blue-700">青文: {{ item.chingwin }}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <div v-if="totalPages > 1" class="flex flex-col items-center gap-4 py-12">
                <div class="flex gap-2">
                    <button @click="changePage(currentPage - 1)" :disabled="currentPage === 1" class="px-6 py-2 rounded-xl border-2 border-slate-200 font-bold bg-white disabled:opacity-30">PREV</button>
                    <button @click="changePage(currentPage + 1)" :disabled="currentPage === totalPages" class="px-6 py-2 rounded-xl border-2 border-slate-200 font-bold bg-white disabled:opacity-30">NEXT</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    loading: true,
                    searchQuery: '',
                    groupBy: 'object',
                    currentPage: 1,
                    itemsPerPage: 12,
                    objectsMaster: [],
                    objectMedia: [],
                    movies: []
                }
            },
            computed: {
                processedData() {
                    if (this.loading) return [];
                    const q = this.searchQuery.toLowerCase().trim();
                    
                    return this.objectMedia.map(m => {
                        const obj = this.objectsMaster.find(o => String(o['Object ID']) === String(m['Object ID']));
                        const movie = this.movies.find(mov => String(mov['Media ID']) === String(m['Movie ID']));
                        
                        return {
                            objectId: m['Object ID'],
                            movieId: m['Movie ID'],
                            jpTitle: obj ? obj['JP Title'] : 'Unknown',
                            movieTitle: movie ? movie['JP Title'] : 'Unknown Movie',
                            active: obj ? (obj['Active'] || 'yes') : 'yes',
                            hkTrans: m['HK Translation'] || '',
                            culture: m['CultureCom Trans'] || '',
                            chingwin: m['HKChingWin Trans'] || ''
                        };
                    }).filter(i => {
                        const isActive = String(i.active).toLowerCase() === 'yes';
                        const match = (i.jpTitle + i.hkTrans + i.movieTitle + i.culture + i.chingwin).toLowerCase().includes(q);
                        return isActive && match;
                    });
                },
                displayGroups() {
                    const groups = {};
                    this.processedData.forEach(item => {
                        const key = this.groupBy === 'object' ? item.objectId : item.movieId;
                        if (!key || key === '-') return;
                        if (!groups[key]) {
                            groups[key] = {
                                id: key,
                                title: this.groupBy === 'object' ? item.jpTitle : item.movieTitle,
                                hkTrans: this.groupBy === 'object' ? item.hkTrans : '',
                                items: []
                            };
                        }
                        groups[key].items.push(item);
                    });
                    return Object.values(groups).sort((a,b) => a.title.localeCompare(b.title, 'zh-Hant'));
                },
                totalPages() { return Math.ceil(this.displayGroups.length / this.itemsPerPage); },
                paginatedGroups() {
                    const start = (this.currentPage - 1) * this.itemsPerPage;
                    return this.displayGroups.slice(start, start + this.itemsPerPage);
                }
            },
            methods: {
                async init() {
                    const base = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/";
                    try {
                        const [o, om, m] = await Promise.all([
                            fetch(base + "人物").then(r => r.json()),
                            fetch(base + "媒體與人物").then(r => r.json()),
                            fetch(base + "電影動畫").then(r => r.json())
                        ]);
                        this.objectsMaster = o; 
                        this.objectMedia = om; 
                        this.movies = m;

                        // RESTORED URL PARAMETER LOGIC
                        const urlParams = new URLSearchParams(window.location.search);
                        const movieIdParam = urlParams.get('movieid');
                        if (movieIdParam) {
                            const foundMovie = this.movies.find(x => String(x['Media ID']) === String(movieIdParam));
                            if (foundMovie) {
                                this.groupBy = 'movie';
                                this.searchQuery = foundMovie['JP Title'];
                            }
                        }

                        this.loading = false;
                    } catch (e) { 
                        console.error(e); 
                        alert("Data fetch error. Check sheet accessibility.");
                    }
                },
                changePage(p) { if(p > 0 && p <= this.totalPages) { this.currentPage = p; window.scrollTo(0,0); }}
            },
            mounted() { this.init(); }
        }).mount('#app');
    </script>
</body>
</html>
