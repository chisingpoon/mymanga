<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Archive | Gadgets in Media</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none; }
        body { 
            -webkit-user-select: none; user-select: none;
            min-height: 100vh; background-color: #f8fafc; 
            font-family: 'Inter', 'Noto Sans TC', 'Noto Sans JP', system-ui, sans-serif; color: #1e293b;
        }
        .bg-grid { background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to bottom, #e2e8f0 1px, transparent 1px); background-size: 40px 40px; }
        
        th { 
            font-size: 11px; font-weight: 800; padding: 16px 12px; 
            text-align: left; color: #64748b; background: #f1f5f9; 
            border-bottom: 2px solid #e2e8f0; white-space: nowrap; 
            position: sticky; top: 0; z-index: 10; 
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .th-gadget { background: #f8fafc; border-right: 2px solid #e2e8f0; }
        .th-media { background: #ecfdf5; color: #065f46; border-bottom-color: #10b981; }
        .th-manga { background: #eff6ff; color: #1e40af; border-bottom-color: #3b82f6; }

        .loader-wrapper { position: fixed; inset: 0; background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 5px solid #e2e8f0; border-top: 5px solid #4f46e5; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .top-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .main-card { background: white; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); margin-bottom: 3rem; overflow: hidden; border: 1px solid #e2e8f0; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        td { padding: 16px 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; vertical-align: top; }

        .appearance-item { min-height: 52px; padding-bottom: 8px; margin-bottom: 8px; border-bottom: 1px dashed #e2e8f0; display: flex; flex-direction: column; justify-content: center; }
        .appearance-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        .archive-link { display: flex; flex-direction: column; padding: 8px 12px; border-radius: 10px; text-decoration: none !important; transition: 0.2s; line-height: 1.2; border: 1px solid rgba(0,0,0,0.05); margin-bottom: 6px; min-width: 170px; }
        .archive-link .label-top { font-weight: 900; font-size: 11px; margin-bottom: 1px; }
        .archive-link .label-bottom { opacity: 0.85; font-weight: 600; font-size: 9px; }
        
        .manga-standard { background: #4f46e5; color: white !important; } 
        .manga-grand { background: #be185d; color: white !important; }     
        .movie-btn { background: #0891b2; color: white !important; }      

        .pub-badge { display: flex; align-items: center; gap: 6px; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 800; margin-bottom: 4px; }
        .pub-culture { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
        .pub-chingwin { background: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; }
        .counter-badge { background: #f1f5f9; color: #475569; padding: 4px 12px; border-radius: 999px; font-size: 11px; font-weight: 800; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="bg-grid">
    <div id="app" v-cloak>
        <div v-if="loading" class="loader-wrapper">
            <div class="spinner"></div>
            <p class="mt-4 text-[11px] font-black uppercase tracking-widest text-slate-500">Processing Archive...</p>
        </div>

        <nav class="top-nav">
            <div class="max-w-[1920px] mx-auto px-6 h-20 flex items-center justify-between">
                <div class="flex items-center gap-6">
                    <a href="index.html" class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center text-white shadow-xl hover:bg-indigo-600 transition-all">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </a>
                    <h1 class="font-black text-2xl tracking-tighter text-slate-800 uppercase">Gadgets Archive</h1>
                </div>
                <span class="counter-badge">{{ filteredData.length }} Items Found</span>
            </div>
        </nav>

        <main class="max-w-[1920px] mx-auto px-6 pt-10">
        <div class="flex flex-wrap gap-4 mb-8">
            <div class="flex-[2] min-w-[300px] relative">
                <input type="text" v-model.trim="searchQuery" @input="handleManualInput" 
                       placeholder="Search gadget names or translations..." 
                       class="w-full bg-white border-2 border-slate-200 rounded-2xl pl-12 pr-12 py-4 text-sm font-bold outline-none focus:border-indigo-500 shadow-sm transition-all">
                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                </div>
                <button v-if="searchQuery" @click="searchQuery = ''; handleManualInput()" class="absolute right-4 top-1/2 -translate-y-1/2 w-6 h-6 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 hover:bg-slate-200">✕</button>
            </div>
    
            <div class="flex-1 min-w-[200px]">
                <select v-model="selectedMovie" @change="handleManualInput" class="w-full bg-white border-2 border-slate-200 rounded-2xl px-4 py-4 text-sm font-bold appearance-none cursor-pointer focus:border-indigo-500 outline-none shadow-sm">
                    <option value="">🎬 All Movies</option>
                    <option v-for="m in dynamicMovies" :key="m.id" :value="m.id">{{ m.label }}</option>
                </select>
            </div>
    
            <div class="flex-1 min-w-[200px]">
                <select v-model="selectedGrandType" @change="handleManualInput" class="w-full bg-white border-2 border-slate-200 rounded-2xl px-4 py-4 text-sm font-bold appearance-none cursor-pointer focus:border-indigo-500 outline-none shadow-sm">
                    <option value="">📚 Grand: All Types</option>
                    <option v-for="t in dynamicGrandTypes" :key="t" :value="t">{{ t }}</option>
                </select>
            </div>
    
            <button @click="resetFilters" class="px-8 py-4 bg-slate-200 hover:bg-slate-800 hover:text-white text-slate-700 font-bold rounded-2xl transition-all shadow-sm">
                Reset
            </button>
        </div>
    
        </main>
    </div>

    <script>
        const { createApp } = Vue;
        
        createApp({
            data() {
                return {
                    loading: true,
                    searchQuery: '',
                    selectedMovie: '',
                    selectedGrandType: '',
                    paramGadgetId: null,
                    currentPage: 1,
                    itemsPerPage: 30,
                    gadgetsMaster: [],
                    gadgetMedia: [],
                    movies: [],
                    contents: [],
                    publishHk: []
                }
            },
            mounted() {
                this.init();
            },
            computed: {
                // STAGE 1: The Core Filter (Search + URL)
                baseFiltered() {
                    if (this.loading || !this.gadgetsMaster.length) return [];
                    const q = this.searchQuery.toLowerCase().trim();
                    
                    return this.gadgetsMaster.filter(g => {
                        // 1. Safety: Ignore empty rows
                        if (!g || !g['Gadget ID']) return false;
        
                        // 2. Active Status: Default to 'yes' if the column is missing
                        const isActive = (g['Active'] || 'yes').toLowerCase().trim() === 'yes';
                        if (!isActive) return false;
        
                        // 3. URL Parameter: ONLY filter if paramGadgetId actually has a value
                        if (this.paramGadgetId) {
                            if (String(g['Gadget ID']).trim() !== String(this.paramGadgetId).trim()) {
                                return false;
                            }
                        }
        
                        // 4. Text Search: ONLY filter if searchQuery actually has a value
                        if (q) {
                            const apps = this.gadgetMedia.filter(m => String(m['Gadget ID']).trim() === String(g['Gadget ID']).trim());
                            const searchableText = (
                                (g['JP Title'] || '') + ' ' + 
                                apps.map(a => `${a['HK Translation']} ${a['CultureCom Trans']} ${a['HKChingWin Trans']}`).join(' ')
                            ).toLowerCase();
                            if (!searchableText.includes(q)) return false;
                        }
        
                        return true;
                    });
                },
        
                // STAGE 2: Dropdown Filters (applied to the results of Stage 1)
                filteredData() {
                    return this.baseFiltered.filter(g => {
                        // Movie Dropdown: ONLY filter if a movie is selected
                        if (this.selectedMovie) {
                            const apps = this.gadgetMedia.filter(m => String(m['Gadget ID']).trim() === String(g['Gadget ID']).trim());
                            const hasMovie = apps.some(a => String(a['Movie ID']).trim() === String(this.selectedMovie).trim());
                            if (!hasMovie) return false;
                        }
        
                        // Grand Collection Dropdown: ONLY filter if a type is selected
                        if (this.selectedGrandType) {
                            const grandBooks = this.getMangaData(g, true);
                            const hasGrandType = grandBooks.some(b => b.type === this.selectedGrandType);
                            if (!hasGrandType) return false;
                        }
        
                        return true;
                    }).map(g => {
                        // Attach appearances for table display
                        let apps = this.gadgetMedia.filter(m => String(m['Gadget ID']).trim() === String(g['Gadget ID']).trim());
                        if (this.selectedMovie) {
                            apps = apps.filter(a => String(a['Movie ID']).trim() === String(this.selectedMovie).trim());
                        }
                        return { ...g, appearances: apps };
                    });
                },
        
                dynamicMovies() {
                    if (!this.baseFiltered.length) return [];
                    const currentGids = new Set(this.baseFiltered.map(g => String(g['Gadget ID']).trim()));
                    const movieIds = [...new Set(this.gadgetMedia
                        .filter(m => currentGids.has(String(m['Gadget ID']).trim()))
                        .map(m => m['Movie ID'])
                    )].filter(id => id && id !== "-");
        
                    return movieIds.map(id => {
                        const m = this.movies.find(movie => String(movie['Media ID']).trim() === String(id).trim());
                        return { id: id, label: m ? `${m['JP Title']} (${m['HK Title']})` : id };
                    }).sort((a,b) => a.label.localeCompare(b.label, 'zh-Hant'));
                },
        
                dynamicGrandTypes() {
                    if (!this.baseFiltered.length) return [];
                    const types = this.baseFiltered.flatMap(g => this.getMangaData(g, true).map(b => b.type));
                    return [...new Set(types)].filter(Boolean).sort();
                },
        
                paginatedData() {
                    const start = (this.currentPage - 1) * this.itemsPerPage;
                    return this.filteredData.slice(start, start + this.itemsPerPage);
                },
                totalPages() { return Math.ceil(this.filteredData.length / this.itemsPerPage) || 1; }
            },
            methods: {
                async init() {
                    try {
                        const base = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/";
                        const [g, gm, m, s, h] = await Promise.all([
                            fetch(base + "法寶").then(r => r.json()), 
                            fetch(base + "媒體與法寶").then(r => r.json()),
                            fetch(base + "電影動畫").then(r => r.json()), 
                            fetch(base + "書籍收錄作品").then(r => r.json()),
                            fetch(base + "出版目録HK").then(r => r.json())
                        ]);
                        this.gadgetsMaster = Array.isArray(g) ? g : [];
                        this.gadgetMedia = Array.isArray(gm) ? gm : [];
                        this.movies = Array.isArray(m) ? m : [];
                        this.contents = Array.isArray(s) ? s : [];
                        this.publishHk = Array.isArray(h) ? h : [];
                        
                        const params = new URLSearchParams(window.location.search);
                        const gid = params.get('gadgetid');
                        const mid = params.get('movieid');
                        
                        if (gid) this.paramGadgetId = gid.trim();
                        if (mid) this.selectedMovie = mid.trim();
                        
                        this.loading = false;
                    } catch (e) { 
                        console.error("Initialization failed:", e); 
                        this.loading = false; 
                    }
                },
        
                getMangaData(gadget, isGrand) {
                    const gid = String(gadget['Gadget ID']).trim();
                    const wids = [...new Set(this.gadgetMedia
                        .filter(m => String(m['Gadget ID']).trim() === gid)
                        .map(a => String(a['Work ID']).trim())
                        .filter(id => id && id !== "-")
                    )];
                    
                    let books = [];
                    wids.forEach(wid => {
                        const bookEntries = this.contents.filter(c => {
                            const isGCategory = (c.類 === '大長編大全集' || c.類 === '大全集');
                            return String(c.作品番).trim() === wid && (isGrand ? isGCategory : !isGCategory);
                        });
        
                        bookEntries.forEach(entry => {
                            const pubMatches = this.publishHk.filter(p => String(p.ISBN_JP).trim() === String(entry.ISBN).trim());
                            if (pubMatches.length > 0) {
                                const latest = pubMatches.sort((a, b) => new Date(b.IssueDate || 0) - new Date(a.IssueDate || 0))[0];
                                books.push({
                                    hkIsbn: latest.ISBN,
                                    title: latest.Title,
                                    sub: (latest.Volume ? `Vol.${latest.Volume} ` : '') + (latest.Subtitle || ''),
                                    type: entry.類
                                });
                            }
                        });
                    });
                    return Array.from(new Map(books.map(b => [b.hkIsbn, b])).values());
                },
        
                getMovieData(id, field) {
                    const m = this.movies.find(x => String(x['Media ID']).trim() === String(id).trim());
                    return m ? (m[field] || '-') : (field === 'Media ID' ? id : '-');
                },
        
                resetFilters() { 
                    this.searchQuery = ''; this.selectedMovie = ''; this.selectedGrandType = ''; 
                    this.paramGadgetId = null; this.currentPage = 1; 
                    window.history.replaceState({}, '', window.location.pathname);
                },
        
                handleManualInput() { this.currentPage = 1; },
                changePage(p) { this.currentPage = p; window.scrollTo({top:0, behavior:'smooth'}); }
            }
        }).mount('#app');
    </script>
</body>
</html>
