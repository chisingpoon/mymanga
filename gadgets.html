<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Archive | Secret Gadgets</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none; }
        body { 
            -webkit-user-select: none; -moz-user-select: none; user-select: none;
            min-height: 100vh; background-color: #f8fafc; margin: 0; padding: 0; 
            font-family: 'Inter', 'Noto Sans TC', 'Noto Sans JP', system-ui, sans-serif; color: #1e293b;
        }
        .bg-grid {
            background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px), 
                              linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .loader-wrapper {
            position: fixed; inset: 0; background: #f8fafc;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #e2e8f0; border-top: 5px solid #4f46e5;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .top-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .main-card { position: relative; background: white; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); margin-bottom: 3rem; overflow: hidden; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { font-size: 12px; font-weight: 800; padding: 16px 12px; text-align: left; color: #64748b; background: #f8fafc; border-bottom: 2px solid #e2e8f0; white-space: nowrap; position: sticky; top: 0; z-index: 10; }
        td { padding: 18px 12px; border-bottom: 1px solid #f1f5f9; font-size: 15px; vertical-align: middle; }
        
        @media (min-width: 1280px) {
            .sticky-col-1 { position: sticky; left: 0; z-index: 20; background: white; min-width: 100px; }
            .sticky-col-2 { position: sticky; left: 100px; z-index: 20; background: white; box-shadow: 4px 0 6px -4px rgba(0,0,0,0.1); }
            th.sticky-col-1 { background: #f8fafc; z-index: 40; }
            th.sticky-col-2 { background: #f8fafc; z-index: 40; }
        }

        .gadget-link { display: inline-flex; align-items: center; font-size: 11px; font-weight: 900; color: white !important; padding: 4px 10px; border-radius: 6px; margin: 2px; text-decoration: none !important; transition: 0.2s; white-space: nowrap; }
        .col-wrap { min-width: 150px; max-width: 300px; word-break: break-word; }
    </style>
</head>
<body class="bg-grid">
    <div id="app" v-cloak>
        <div v-if="loading" class="loader-wrapper">
            <div class="spinner"></div>
            <p class="mt-4 text-[11px] font-black uppercase tracking-widest text-slate-500">Loading Gadget Database...</p>
        </div>

        <nav class="top-nav">
            <div class="max-w-[1920px] mx-auto px-6 h-20 flex items-center justify-between">
                <div class="flex items-center gap-6">
                    <a href="index.html" class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center text-white shadow-xl">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </a>
                    <h1 class="font-black text-2xl tracking-tighter text-slate-800 uppercase">Gadget Archive</h1>
                </div>
            </div>
        </nav>

        <main class="max-w-[1920px] mx-auto px-6 pt-10">
            <div class="mb-10 flex items-center justify-between">
                <h2 class="text-4xl font-black text-slate-900">法寶一覽</h2>
            </div>

            <div class="main-card">
                <div class="p-6 border-b border-slate-100 flex items-center justify-between gap-4">
                    <div class="relative w-full max-w-xl">
                        <input type="text" v-model="searchQuery" placeholder="搜尋法寶名稱..." class="w-full bg-slate-50 border-2 border-slate-200 rounded-2xl px-6 py-4 text-base font-bold outline-none focus:border-indigo-500">
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table>
                        <thead>
                            <tr>
                                <th class="sticky-col-1">編號</th>
                                <th class="sticky-col-2">法寶名稱</th>
                                <th>港譯名稱</th>
                                <th>全集副題</th> <th>港譯副題</th> <th>初出作品番 (掲載誌)</th> <th>收錄於 (港版書籍連結)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="item in paginatedData" :key="item.法寶編號">
                                <td class="sticky-col-1 font-mono text-slate-400 text-[13px]">{{ item.法寶編號 }}</td>
                                <td class="sticky-col-2 font-black text-slate-900 col-wrap">{{ item.名 }}</td>
                                <td class="font-bold text-indigo-600">{{ item.港譯名 }}</td>
                                
                                <td class="text-[13px] text-slate-700 font-medium">
                                    {{ getMappedWork(item).subTitleJp }}
                                </td>
                                
                                <td class="text-[13px] text-indigo-600 font-bold">
                                    {{ getMappedWork(item).subTitleHk }}
                                </td>
                            
                                <td class="font-mono text-[12px] text-slate-500 bg-slate-50/50">
                                    {{ getMappedWork(item).magazineInfo }}
                                </td>
                            
                                <td>
                                    <div class="flex flex-wrap items-center">
                                        <a v-for="link in getBookLinks(item.初出作品番)" 
                                           :key="link.isbn"
                                           :href="'manga-database.html?isbn=' + link.isbn"
                                           target="_blank"
                                           class="gadget-link"
                                           :class="getLinkColor(link.type)">
                                            {{ link.label }}
                                        </a>
                                        <span v-if="getBookLinks(item.初出作品番).length === 0" class="text-slate-300 text-xs italic">無紀錄</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                </div>
        </main>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    loading: true,
                    searchQuery: '',
                    debouncedSearch: '',
                    searchTimeout: null,
                    currentPage: 1,
                    itemsPerPage: 50,
                    gadgets: [],
                    contents: [],
                    publishHk: [],
                    fullWorksList: []
                }
            },
            watch: {
                searchQuery(newVal) {
                    clearTimeout(this.searchTimeout);
                    this.searchTimeout = setTimeout(() => {
                        this.debouncedSearch = newVal;
                        this.currentPage = 1;
                    }, 300);
                }
            },
            computed: {
                filteredGadgets() {
                    const q = this.debouncedSearch.toLowerCase().trim();
                    if (!q) return this.gadgets;
                    return this.gadgets.filter(g => 
                        (g.名 || '').toLowerCase().includes(q) || 
                        (g.港譯名 || '').toLowerCase().includes(q) ||
                        (g.法寶編號 || '').toString().includes(q)
                    );
                },
                totalPages() { return Math.ceil(this.filteredGadgets.length / this.itemsPerPage) || 1; },
                paginatedData() {
                    const start = (this.currentPage - 1) * this.itemsPerPage;
                    return this.filteredGadgets.slice(start, start + this.itemsPerPage);
                },
                paginationRange() {
                    const current = this.currentPage, last = this.totalPages, range = [];
                    for (let i = 1; i <= last; i++) { if (i == 1 || i == last || (i >= current - 2 && i <= current + 2)) range.push(i); }
                    const res = []; let l;
                    for (let i of range) { if (l && i - l !== 1) res.push('...'); res.push(i); l = i; }
                    return res;
                }
            },
            methods: {
                async init() {
                    try {
                        const [g, c, h, w] = await Promise.all([
                            fetch("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/法寶").then(r => r.json()),
                            fetch("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/書籍收錄作品").then(r => r.json()),
                            fetch("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録HK").then(r => r.json()),
                            fetch("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/作品完整列表").then(r => r.json())
                        ]);
                        this.gadgets = g;
                        this.contents = c;
                        this.publishHk = h;
                        this.fullWorksList = w;
                        this.loading = false;
                    } catch (e) { 
                        console.error("Data Load Error:", e); 
                        this.loading = false; 
                    }
                },
                // Core mapping function with data type safety
                getMappedWork(item) {
                    // 1. Get the ID from '法寶' sheet and normalize it
                    const workId = item.初出作品番 ? item.初出作品番.toString().trim() : '';
                    
                    // 2. If no ID exists, return the original '初出' text as a fallback
                    if (!workId) {
                        return { subTitleJp: '', subTitleHk: '', magazineInfo: item.初出 || '-' };
                    }
                
                    // 3. Search for the matching record in '作品完整列表'
                    const match = this.fullWorksList.find(w => {
                        const targetId = w.初出作品番 ? w.初出作品番.toString().trim() : '';
                        return targetId === workId;
                    });
                
                    if (match) {
                        // 4. Create the 'Magazine + Issue' string
                        const mag = match.初出掲載誌 || '';
                        const issue = match.初出掲載号 || '';
                        const combinedInfo = `${mag} ${issue}`.trim();
                
                        return {
                            subTitleJp: match.全集副題 || '',
                            subTitleHk: match.全集副題香港譯名 || '',
                            magazineInfo: combinedInfo || '-' // This will be displayed in the '初出作品番' column
                        };
                    }
                    
                    // 5. Fallback if the ID doesn't find a match in the Works List
                    return { 
                        subTitleJp: '', 
                        subTitleHk: '', 
                        magazineInfo: item.初出 || `ID: ${workId} (未匹配)` 
                    };
                },
                
                getBookLinks(workId) {
                    if (!workId) return [];
                    const idStr = workId.toString().trim();
                    
                    // Match against '作品番' in the '書籍收錄作品' sheet
                    const matches = this.contents.filter(c => {
                        const contentId = c.作品番 ? c.作品番.toString().trim() : '';
                        return contentId === idStr;
                    });
                    
                    const links = [];
                    matches.forEach(m => {
                        if (!m.ISBN) return;
                        const isbnJp = m.ISBN.toString().trim();
                        const hkInfo = this.publishHk.find(h => {
                            const h_isbn_jp = h.ISBN_JP ? h.ISBN_JP.toString().trim() : '';
                            const h_isbn = h.ISBN ? h.ISBN.toString().trim() : '';
                            return h_isbn_jp === isbnJp || h_isbn === isbnJp;
                        });
                
                        if (hkInfo) {
                            links.push({
                                label: `${m.類}${m.卷 || m.巻 || ''}`,
                                isbn: hkInfo.ISBN,
                                type: m.類
                            });
                        }
                    });
                    return links;
                },         
                getLinkColor(type) {
                    if (!type) return 'bg-slate-400';
                    const t = type.toString();
                    if (t.includes('45卷') || t.includes('カラー') || t.includes('プラス')) return 'bg-emerald-500';
                    if (t.includes('大全集')) return 'bg-indigo-600';
                    if (t.includes('0卷')) return 'bg-slate-700';
                    if (t.includes('ドラミ')) return 'bg-rose-400';
                    if (t.includes('文庫')) return 'bg-amber-500';
                    if (t.includes('ぴっか')) return 'bg-purple-500';
                    if (t.includes('とっておき')) return 'bg-cyan-600';
                    return 'bg-slate-400';
                },
            
                changePage(p) { this.currentPage = p; window.scrollTo({ top: 0, behavior: 'smooth' }); }
            },
            mounted() { this.init(); }
        }).mount('#app')
    </script>
</body>
</html>
