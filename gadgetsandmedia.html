<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Archive | Gadgets in Media</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none; }
        body { 
            -webkit-user-select: text; user-select: text;
            min-height: 100vh; background-color: #f8fafc; 
            font-family: 'Inter', 'Noto Sans TC', 'Noto Sans JP', system-ui, sans-serif; color: #1e293b;
        }
        .bg-grid { background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to bottom, #e2e8f0 1px, transparent 1px); background-size: 40px 40px; }
        
        .loader-wrapper { position: fixed; inset: 0; background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 5px solid #e2e8f0; border-top: 5px solid #4f46e5; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .top-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        
        /* Card Styles */
        .data-card { background: white; border-radius: 20px; border: 1px solid #e2e8f0; transition: all 0.3s ease; }
        .data-card:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -10px rgba(0,0,0,0.1); }
        .sub-card { background: #f8fafc; border: 1px solid #f1f5f9; border-radius: 12px; padding: 12px; margin-top: 8px; }

        .archive-link { display: flex; flex-direction: column; padding: 6px 10px; border-radius: 8px; text-decoration: none !important; transition: 0.2s; line-height: 1.2; font-size: 12px; }
        .manga-standard { background: #4f46e5; color: white !important; } 
        .manga-grand { background: #be185d; color: white !important; }      
        .movie-btn { background: #0891b2; color: white !important; }      

        .pub-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; }
        .pub-culture { background: #fee2e2; color: #b91c1c; }
        .pub-chingwin { background: #e0f2fe; color: #0369a1; }
        .counter-badge { background: #f1f5f9; color: #475569; padding: 4px 12px; border-radius: 999px; font-size: 11px; font-weight: 800; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="bg-grid">
    <div id="app" v-cloak>
        <div v-if="loading" class="loader-wrapper">
            <div class="spinner"></div>
            <p class="mt-4 text-[11px] font-black uppercase tracking-widest text-slate-500">Processing Archive...</p>
        </div>

        <nav class="top-nav">
            <div class="max-w-[1400px] mx-auto px-6 h-20 flex items-center justify-between">
                <div class="flex items-center gap-6">
                    <div class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center text-white shadow-xl">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </div>
                    <h1 class="font-black text-2xl tracking-tighter text-slate-800 uppercase">Gadget Archive</h1>
                </div>
                <div class="flex items-center gap-4">
                    <select v-model="groupBy" class="bg-indigo-50 border-2 border-indigo-200 rounded-xl px-4 py-2 text-xs font-black text-indigo-700 uppercase outline-none">
                        <option value="gadget">Group by Gadget</option>
                        <option value="movie">Group by Movie</option>
                    </select>
                    <span class="counter-badge">{{ displayGroups.length }} Groups</span>
                </div>
            </div>
        </nav>

        <main class="max-w-[1400px] mx-auto px-6 pt-10">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
                <template v-for="group in paginatedGroups" :key="group.id">
                    <div class="data-card p-6 flex flex-col">
                        
                        <div class="mb-4">
                            <span class="text-[10px] font-black text-indigo-500 uppercase tracking-widest">{{ groupBy === 'gadget' ? 'Gadget' : 'Movie' }}</span>
                            <h2 class="text-xl font-black text-slate-900 leading-tight">{{ group.title }}</h2>
                            <h2 v-if="groupBy === 'gadget' && group.hkTrans" class="text-xl font-black text-slate-500 leading-tight">
                                {{ group.hkTrans }}
                            </h2>
                        </div>
            
                        <hr class="border-slate-100 mb-4">
            
                        <div class="flex-1 space-y-6">
                            <div v-for="(item, idx) in group.items" :key="idx" class="border-l-4 border-indigo-100 pl-4">
                                
                                <div class="bg-white border border-slate-100 rounded-xl p-3 mb-3 shadow-sm hover:border-cyan-200 transition-colors">
                                    <span class="text-[9px] font-black text-slate-400 uppercase mb-1 block">Media Appearance</span>
                                    <a :href="'movie.html?mediaid=' + item.movieId" class="group flex items-center justify-between">
                                        <div>
                                            <span class="bg-cyan-600 text-white px-1.5 py-0.5 rounded text-[9px] font-black uppercase">
                                                Movie {{ getYear(getMovieData(item.movieId, 'JP Release Date')) }}
                                            </span>
                                            <div class="font-bold text-slate-800 text-sm mt-1 group-hover:text-cyan-600 transition-colors">
                                                {{ getMovieData(item.movieId, 'JP Title') }} 
                                                <span class="text-cyan-500 ml-1">▶</span>
                                            </div>
                                        </div>
                                    </a>
                                </div>
            
                                <div class="bg-slate-50 border border-slate-100 rounded-xl p-3">
                                    <div class="flex items-center justify-between mb-2">
                                        <span class="text-[9px] font-black text-slate-400 uppercase">Source Manga</span>
                                        <span v-if="getMangaDataForWork(item.workId).length" class="bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded-full text-[9px] font-black">
                                            {{ getMangaDataForWork(item.workId).length }} Volumes
                                        </span>
                                    </div>
                                    
                                    <div class="space-y-2">
                                        <div v-for="book in getMangaDataForWork(item.workId)" :key="book.isbn">
                                            <a :href="'manga-database.html?isbn=' + book.isbn + '&region=JP'" target="_blank" 
                                               class="flex items-center justify-between bg-white border border-slate-200 p-2 rounded-lg text-[11px] font-bold text-slate-700 hover:border-indigo-400 hover:text-indigo-600 transition-all">
                                                <span class="truncate pr-2">{{ book.title }}</span>
                                                <svg class="w-3 h-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                                            </a>
                                        </div>
            
                                        <div v-if="item.culture || item.chingwin" class="flex flex-wrap gap-2 mt-2 pt-2 border-t border-slate-200/60">
                                            <span v-if="item.culture && item.culture !== '-'" class="pub-badge pub-culture text-[9px]">文傳: {{ item.culture }}</span>
                                            <span v-if="item.chingwin && item.chingwin !== '-'" class="pub-badge pub-chingwin text-[9px]">青文: {{ item.chingwin }}</span>
                                        </div>
                                    </div>
                                </div>
            
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </main>
    </div>
    
    <script>
        const { createApp } = Vue;
    
        createApp({
            data() {
                return {
                    loading: true,
                    searchQuery: '',
                    groupBy: 'gadget',
                    currentPage: 1,
                    itemsPerPage: 12,
                    gadgetsMaster: [],
                    gadgetMedia: [],
                    movies: [],
                    contents: [],
                    publishJp: [] // Added JP Catalog
                }
            },
            async mounted() {
                await this.init();
            },
            computed: {
                processedData() {
                    if (this.loading) return [];
                    const q = this.searchQuery.toLowerCase().trim();
    
                    let flatList = this.gadgetMedia.map(m => {
                        const gadget = this.gadgetsMaster.find(g => String(g['Gadget ID']) === String(m['Gadget ID']));
                        return {
                            gadgetId: m['Gadget ID'],
                            movieId: m['Movie ID'],
                            workId: m['Work ID'],
                            jpTitle: gadget ? gadget['JP Title'] : 'Unknown',
                            active: gadget ? gadget['Active'] : 'yes',
                            hkTrans: m['HK Translation'],
                            culture: m['CultureCom Trans'],
                            chingwin: m['HKChingWin Trans']
                        };
                    }).filter(item => item.active.toLowerCase() === 'yes');
    
                    if (q) {
                        flatList = flatList.filter(i => 
                            (i.jpTitle + i.hkTrans + i.culture + i.chingwin).toLowerCase().includes(q)
                        );
                    }
                    return flatList;
                },
                displayGroups() {
                    const groups = {};
                    this.processedData.forEach(item => {
                        const key = this.groupBy === 'gadget' ? item.gadgetId : item.movieId;
                        if (!key || key === '-') return;
                        if (!groups[key]) {
                            groups[key] = {
                                id: key,
                                title: this.groupBy === 'gadget' ? item.jpTitle : this.getMovieData(item.movieId, 'JP Title'),
                                hkTrans: item.hkTrans,
                                items: []
                            };
                        }
                        groups[key].items.push(item);
                    });
                    return Object.values(groups).sort((a, b) => a.title.localeCompare(b.title, 'zh-Hant'));
                },
                paginatedGroups() {
                    const start = (this.currentPage - 1) * this.itemsPerPage;
                    return this.displayGroups.slice(start, start + this.itemsPerPage);
                },
                totalPages() { return Math.ceil(this.displayGroups.length / this.itemsPerPage) || 1; },
                paginationRange() {
                    const current = this.currentPage, last = this.totalPages, range = [];
                    for (let i = 1; i <= last; i++) { if (i == 1 || i == last || (i >= current - 2 && i <= current + 2)) range.push(i); }
                    const res = []; let l;
                    for (let i of range) { if (l && i - l !== 1) res.push('...'); res.push(i); l = i; }
                    return res;
                }
            },
            methods: {
            async init() {
                    try {
                        const base = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/";
                        const [g, gm, m, s, jp, hk] = await Promise.all([
                            fetch(base + "法寶").then(r => r.json()),
                            fetch(base + "媒體與法寶").then(r => r.json()),
                            fetch(base + "電影動畫").then(r => r.json()),
                            fetch(base + "書籍收錄作品").then(r => r.json()),
                            fetch(base + "出版目録JP").then(r => r.json()),
                            fetch(base + "出版目録HK").then(r => r.json())
                        ]);
            
                        this.gadgetsMaster = g;
                        this.gadgetMedia = gm;
                        this.movies = m;
                        this.contents = s;
                        this.publishJp = jp; // Now used for the JP links
                        this.publishHk = hk; 
                        
                        this.loading = false;
                    } catch (e) { 
                        console.error("Archive Load Error:", e); 
                        this.loading = false; 
                    }
                },
            
                getMangaDataForWork(workId) {
                    if (!workId || workId === '-' || !this.publishJp.length) return [];
                    
                    // 1. Filter "書籍收錄作品" for the Work ID
                    const entries = this.contents.filter(c => String(c.作品番).trim() === String(workId).trim());
                    const isbns = entries.map(c => String(c.ISBN).trim());
            
                    // 2. Map to "出版目録JP" and return unique records
                    const results = this.publishJp.filter(p => isbns.includes(String(p.ISBN).trim()));
                    
                    return results.map(b => ({
                        isbn: b.ISBN,
                        title: b.Title || b.JP_Title || 'Unnamed Volume'
                    }));
                },
                getMovieData(id, field) {
                    const m = this.movies.find(x => String(x['Media ID']).trim() === String(id).trim());
                    if (!m) return field === 'JP Release Date' ? '-' : 'Unknown';
                    return m[field] || '-';
                },
                getYear(dateStr) {
                    if (!dateStr || dateStr === '-') return 'TBA';
                    const match = dateStr.match(/\d{4}/);
                    return match ? match[0] : 'TBA';
                },
                resetFilters() { this.searchQuery = ''; this.currentPage = 1; },
                changePage(p) { this.currentPage = p; window.scrollTo({top: 0, behavior: 'smooth'}); }
            }
        }).mount('#app');
    </script>
</body>
</html>
