<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Archive | Gadgets in Media</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none; }
        body { 
            -webkit-user-select: text; user-select: text;
            min-height: 100vh; background-color: #f8fafc; 
            font-family: 'Inter', 'Noto Sans TC', 'Noto Sans JP', system-ui, sans-serif; color: #1e293b;
        }
        .bg-grid { background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to bottom, #e2e8f0 1px, transparent 1px); background-size: 40px 40px; }
        .loader-wrapper { position: fixed; inset: 0; background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 5px solid #e2e8f0; border-top: 5px solid #4f46e5; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .top-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .data-card { background: white; border-radius: 20px; border: 1px solid #e2e8f0; transition: all 0.3s ease; }
        .fade-enter-active, .fade-leave-active { transition: opacity 0.3s ease, transform 0.3s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; transform: translateY(20px); }
    </style>
</head>
<body class="bg-grid">
    <div id="app" v-cloak>
        <div v-if="loading" class="loader-wrapper">
            <div class="spinner"></div>
            <p class="mt-4 text-[11px] font-black uppercase tracking-widest text-slate-500">Processing Archive...</p>
        </div>

        <nav class="top-nav">
            <div class="max-w-[1400px] mx-auto px-6 h-20 flex items-center justify-between">
                <div class="flex items-center gap-6">
                    <a href="index.html" class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center text-white shadow-xl">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </a>
                    <h1 class="font-black text-2xl tracking-tighter text-slate-800 uppercase">Gadget Archive</h1>
                </div>
            </div>
        </nav>

        <main class="max-w-[1400px] mx-auto px-6 pt-10">
            <div class="flex flex-wrap items-center gap-4 mb-8 bg-white/80 p-4 rounded-2xl backdrop-blur-md border border-slate-200 sticky top-24 z-30 shadow-sm">
                <div class="flex-1 min-w-[280px] relative">
                    <input type="text" v-model.trim="searchQuery" placeholder="Search gadgets or movies..." 
                           class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl pl-11 pr-10 py-2.5 text-sm font-bold outline-none focus:border-indigo-500 focus:bg-white transition-all">
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="3" stroke-linecap="round"></path></svg>
                    </div>
                    <button v-if="searchQuery" @click="searchQuery = ''" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-600 p-1">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </button>
                </div>
            
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">View By</span>
                    <select v-model="groupBy" class="bg-slate-50 border-2 border-slate-100 rounded-xl px-3 py-2.5 text-sm font-black outline-none focus:border-indigo-500 cursor-pointer">
                        <option value="gadget">Gadget</option>
                        <option value="movie">Movie</option>
                    </select>
                </div>
            
                <div class="bg-indigo-50 border border-indigo-100 px-4 py-2.5 rounded-xl flex items-center gap-3">
                    <span class="text-[10px] font-black text-indigo-400 uppercase">Results</span>
                    <span class="text-base font-black text-indigo-700">{{ displayGroups.length }}</span>
                </div>
            
                <button @click="resetFilters" class="p-2.5 bg-slate-100 hover:bg-slate-200 text-slate-500 rounded-xl transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-12">
                <template v-for="group in paginatedGroups" :key="group.id">
                    <div class="data-card p-6 flex flex-col border-2 border-slate-100 shadow-sm">
                        <div class="mb-6">
                            <template v-if="groupBy === 'movie'">
                                <span class="text-[11px] font-black text-cyan-600 uppercase tracking-widest mb-1 block">
                                    Movie ({{ getYear(getMovieData(group.id, 'JP Release Date')) }})
                                </span>
                                <a :href="'movie.html?mediaid=' + group.id" class="group flex items-center gap-2">
                                    <h2 class="text-2xl font-black text-slate-900 leading-tight group-hover:text-cyan-600 transition-colors">{{ group.title }}</h2>
                                    <span class="text-cyan-500 text-2xl group-hover:translate-x-1 transition-transform">▶</span>
                                </a>
                            
                                <div v-if="getMangaDataForWork(group.workId).length > 0" class="mt-4 bg-slate-50/80 rounded-xl p-3 border border-slate-200/60">
                                    <h4 class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-1.5">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.246.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                                        Manga Reference
                                    </h4>
                                    <div class="flex flex-wrap gap-2">
                                        <a v-for="book in getMangaDataForWork(group.workId)" :key="book.isbn" 
                                           :href="'manga-database.html?isbn=' + book.isbn + '&region=HK'" target="_blank"
                                           :class="['px-2 py-1 rounded-lg text-[10px] font-bold border transition-all shadow-sm', book.type === 'grand' ? 'bg-amber-50 border-amber-200 text-amber-800' : 'bg-white border-slate-200 text-slate-700']">
                                             {{ book.label }}
                                        </a>
                                    </div>
                                </div>
                            </template>
            
                            <template v-else>
                                <span class="text-[11px] font-black text-indigo-500 uppercase tracking-widest mb-1 block">Gadget Identity</span>
                                <h2 class="text-2xl font-black text-slate-900 leading-tight">{{ group.title }}</h2>
                                <h2 v-if="group.hkTrans" class="text-2xl font-black text-slate-500 leading-tight">{{ group.hkTrans }}</h2>
                            </template>
                        </div>
            
                        <hr class="border-slate-100 mb-6">
            
                        <div class="flex-1 space-y-8">
                            <div v-for="(item, idx) in group.items" :key="idx" class="border-l-4 border-indigo-200 pl-5">
                                <div v-if="groupBy === 'movie'">
                                    <div class="bg-white border-2 border-slate-50 rounded-2xl p-4 mb-2 shadow-sm">
                                        <span class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Gadget #{{ idx + 1 }}</span>
                                        <span class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Gadget</span>
                                        <div class="font-black text-slate-800 text-xl">{{ item.jpTitle }}</div>
                                        <div v-if="item.hkTrans" class="font-bold text-slate-500 text-lg">{{ item.hkTrans }}</div>
                                    </div>
                                    <div v-if="item.culture || item.chingwin" class="flex flex-wrap gap-2 mt-2">
                                        <span v-if="item.culture && item.culture !== '-'" class="px-3 py-1.5 text-xs font-black rounded bg-red-50 text-red-800 ring-1 ring-red-100">文傳: {{ item.culture }}</span>
                                        <span v-if="item.chingwin && item.chingwin !== '-'" class="px-3 py-1.5 text-xs font-black rounded bg-blue-50 text-blue-800 ring-1 ring-blue-100">青文: {{ item.chingwin }}</span>
                                    </div>
                                </div>
            
                                <div v-else>
                                    <div class="bg-white border-2 border-slate-50 rounded-2xl p-4 mb-3 shadow-sm hover:border-cyan-300 transition-all">
                                        <a :href="'movie.html?mediaid=' + item.movieId" class="group block">
                                            <span class="bg-cyan-600 text-white px-2 py-1 rounded-md text-[11px] font-black uppercase inline-block mb-2">Movie {{ getYear(getMovieData(item.movieId, 'JP Release Date')) }}</span>
                                            <div class="font-black text-slate-800 text-xl group-hover:text-cyan-600 transition-colors flex items-center gap-2">{{ item.movieTitle }} <span class="text-cyan-500 text-2xl">▶</span></div>
                                        </a>
                                    </div>
                                
                                    <div v-if="getMangaDataForWork(item.workId).length > 0 || item.culture || item.chingwin" class="bg-slate-50/50 rounded-xl p-3 border border-slate-100 shadow-inner">
                                        <h4 class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-1.5">Manga Reference</h4>
                                        
                                        <div class="flex flex-wrap gap-2 mb-2">
                                            <a v-for="book in getMangaDataForWork(item.workId)" :key="book.isbn" 
                                               :href="'manga-database.html?isbn=' + book.isbn + '&region=HK'" target="_blank"
                                               class="px-2 py-1 bg-white border border-slate-200 rounded-lg text-[10px] font-bold text-slate-600">
                                                {{ book.label }}
                                            </a>
                                        </div>
                                
                                        <div v-if="(item.culture && item.culture !== '-') || (item.chingwin && item.chingwin !== '-')" 
                                             class="flex flex-wrap gap-1 pt-2 border-t border-slate-200/50">
                                            <span v-if="item.culture && item.culture !== '-'" class="px-2 py-0.5 text-[9px] font-black bg-red-50 text-red-700 rounded ring-1 ring-red-100/50">文傳: {{ item.culture }}</span>
                                            <span v-if="item.chingwin && item.chingwin !== '-'" class="px-2 py-0.5 text-[9px] font-black bg-blue-50 text-blue-700 rounded ring-1 ring-blue-100/50">青文: {{ item.chingwin }}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
            <div v-if="totalPages > 1" class="flex flex-col items-center gap-4 py-12 border-t border-slate-200">
                <div class="flex items-center gap-2">
                    <button @click="changePage(currentPage - 1)" :disabled="currentPage === 1" 
                            class="px-4 py-2 rounded-xl font-bold transition-all border-2 border-slate-200 hover:bg-white disabled:opacity-30 disabled:cursor-not-allowed">
                        PREV
                    </button>
                    
                    <div class="flex items-center gap-1">
                        <template v-for="page in visiblePages" :key="page">
                            <button v-if="page !== '...'" @click="changePage(page)" 
                                    :class="['w-10 h-10 rounded-xl font-black transition-all', currentPage === page ? 'bg-slate-900 text-white' : 'hover:bg-white border-2 border-transparent hover:border-slate-200']">
                                {{ page }}
                            </button>
                            <span v-else class="px-2 text-slate-400 font-bold">...</span>
                        </template>
                    </div>
            
                    <button @click="changePage(currentPage + 1)" :disabled="currentPage === totalPages" 
                            class="px-4 py-2 rounded-xl font-bold transition-all border-2 border-slate-200 hover:bg-white disabled:opacity-30 disabled:cursor-not-allowed">
                        NEXT
                    </button>
                </div>
                <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Page {{ currentPage }} of {{ totalPages }}</p>
            </div>            
        </main>
        <transition name="fade">
            <button v-show="showScrollTop" @click="scrollToTop" 
                    class="fixed bottom-8 right-8 w-14 h-14 bg-slate-900 text-white rounded-2xl shadow-2xl flex items-center justify-center hover:bg-indigo-600 hover:-translate-y-1 transition-all z-[9999]">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 15l7-7 7 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            </button>
        </transition>
    </div>
    
    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    loading: true,
                    searchQuery: '',
                    groupBy: 'gadget',
                    currentPage: 1,
                    itemsPerPage: 12,
                    gadgetsMaster: [],
                    gadgetMedia: [],
                    movies: [],
                    contents: [],
                    publishHk: [],
                    showScrollTop: false // State for the floating button
                }
            },
            async mounted() {
                await this.init();
                // ADDED THIS:
                window.addEventListener('scroll', () => {
                    this.showScrollTop = window.scrollY > 300; 
                });
            },
            watch: {
                // Reset to page 1 if user searches or changes view
                searchQuery() { this.currentPage = 1; },
                groupBy() { this.currentPage = 1; }
            },
            computed: {
                processedData() {
                    if (this.loading) return [];
                    const q = this.searchQuery.toLowerCase().trim();
                    return this.gadgetMedia.map(m => {
                        const gadget = this.gadgetsMaster.find(g => String(g['Gadget ID']) === String(m['Gadget ID']));
                        return {
                            gadgetId: m['Gadget ID'],
                            movieId: m['Movie ID'],
                            workId: m['Work ID'],
                            jpTitle: gadget ? gadget['JP Title'] : 'Unknown',
                            movieTitle: this.getMovieData(m['Movie ID'], 'JP Title'),
                            active: gadget ? gadget['Active'] : 'yes',
                            hkTrans: m['HK Translation'],
                            culture: m['CultureCom Trans'],
                            chingwin: m['HKChingWin Trans']
                        };
                    }).filter(i => i.active.toLowerCase() === 'yes' && (!q || (i.jpTitle + i.hkTrans + i.culture + i.chingwin + i.movieTitle).toLowerCase().includes(q)));
                },
                displayGroups() {
                    const groups = {};
                    this.processedData.forEach(item => {
                        const key = this.groupBy === 'gadget' ? item.gadgetId : item.movieId;
                        if (!key || key === '-') return;
                        if (!groups[key]) {
                            groups[key] = {
                                id: key,
                                title: this.groupBy === 'gadget' ? item.jpTitle : item.movieTitle,
                                hkTrans: this.groupBy === 'gadget' ? item.hkTrans : '',
                                workId: item.workId,
                                items: []
                            };
                        }
                        groups[key].items.push(item);
                    });
                    return Object.values(groups).sort((a, b) => 
                        this.groupBy === 'movie' 
                        ? this.getMovieData(b.id, 'JP Release Date').localeCompare(this.getMovieData(a.id, 'JP Release Date')) 
                        : a.title.localeCompare(b.title, 'zh-Hant')
                    );
                },
                totalPages() {
                    return Math.ceil(this.displayGroups.length / this.itemsPerPage);
                },
                paginatedGroups() {
                    const start = (this.currentPage - 1) * this.itemsPerPage;
                    return this.displayGroups.slice(start, start + this.itemsPerPage);
                },
                visiblePages() {
                    const t = this.totalPages;
                    if (t <= 5) return Array.from({length: t}, (_, i) => i + 1);
                    return [1, 2, '...', t]; 
                }
            },
            methods: {
                async init() {
                    const base = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/";
                    try {
                        const [g, gm, m, s, hk] = await Promise.all([
                            fetch(base + "法寶").then(r => r.json()),
                            fetch(base + "媒體與法寶").then(r => r.json()),
                            fetch(base + "電影動畫").then(r => r.json()),
                            fetch(base + "書籍收錄作品").then(r => r.json()),
                            fetch(base + "出版目録HK").then(r => r.json())
                        ]);
                        this.gadgetsMaster = g; 
                        this.gadgetMedia = gm; 
                        this.movies = m; 
                        this.contents = s; 
                        this.publishHk = hk;
                
                        // --- ADDED: URL Parameter Logic ---
                        const urlParams = new URLSearchParams(window.location.search);
                        const movieIdParam = urlParams.get('movieid');
                        
                        if (movieIdParam) {
                            const movie = this.movies.find(x => String(x['Media ID']) === String(movieIdParam));
                            if (movie) {
                                this.groupBy = 'movie'; // Switch to movie view
                                this.searchQuery = movie['JP Title']; // Filter by movie name
                            }
                        }
                        // ----------------------------------
                
                        this.loading = false;
                    } catch (e) { console.error(e); }
                },
                changePage(page) {
                    if (page >= 1 && page <= this.totalPages) {
                        this.currentPage = page;
                        // Move to top so the user sees the start of the new page
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                },
                scrollToTop() {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                },
                getMangaDataForWork(workId) {
                    if (!workId || workId === '-') return [];
                    const isbns = this.contents.filter(c => String(c.作品番).trim() === String(workId).trim()).map(c => String(c.ISBN).trim());
                    return this.publishHk.filter(hk => isbns.includes(String(hk.ISBN_JP).trim()) && String(hk.Active).toLowerCase() === 'yes').map(book => ({
                        isbn: book.ISBN,
                        label: `${book.Title} ${book.Volume === '-' ? '' : book.Volume}${book.Subtitle === '-' ? '' : ''+book.Subtitle}`.trim(),
                        type: book.Title.includes('大全集') ? 'grand' : 'standard'
                    }));
                },
                getMovieData(id, field) {
                    const m = this.movies.find(x => String(x['Media ID']) === String(id));
                    return m ? m[field] : (field === 'JP Release Date' ? '-' : 'Unknown');
                },
                getYear(d) { const m = d.match(/\d{4}/); return m ? m[0] : 'TBA'; },
                resetFilters() { this.searchQuery = ''; this.currentPage = 1; }
            }
        }).mount('#app');
    </script>
</body>
</html>
