<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>叮噹多啦A夢漫畫資訊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Security: Disable Selection */
        body {
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
        }

        .bg-grid {
            background-color: #f8fafc;
            background-image: 
                linear-gradient(to right, #e2e8f0 1px, transparent 1px),
                linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .watermark {
            position: fixed; bottom: -20px; right: -20px; font-size: 12rem; font-weight: 900;
            color: rgba(0, 0, 0, 0.03); pointer-events: none; z-index: -1; transform: rotate(-15deg);
        }

        .hover-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .hover-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -10px rgba(0,0,0,0.1);
            border-color: #3b82f6; background-color: #ffffff;
        }
        
        /* Slide Animation Logic */
        .viewport-container {
            width: 100%; overflow: hidden; position: relative;
        }
        .tab-slider {
            display: flex; transition: transform 0.5s cubic-bezier(0.65, 0, 0.35, 1);
            width: 300%;
        }
        .tab-pane {
            width: 33.333%;
            flex-shrink: 0;
        }
    </style>
</head>
<body class="bg-grid text-slate-900 font-sans min-h-screen py-12 px-4 relative overflow-x-hidden" oncontextmenu="return false;">

    <div class="watermark">ARCHIVE</div>

    <div class="max-w-3xl mx-auto space-y-8 relative z-10">
        
        <header class="text-center space-y-2 mb-8">
            <div class="relative inline-block">
                <div class="absolute -inset-1 bg-blue-500 rounded-2xl blur opacity-20"></div>
                <div class="relative w-16 h-16 bg-blue-600 rounded-2xl text-white text-3xl flex items-center justify-center font-black italic shadow-xl">M</div>
            </div>
            <h1 class="text-3xl font-black tracking-tight text-slate-900 uppercase mt-4">Archive Portal</h1>
            <p class="text-slate-400 font-bold text-xs uppercase tracking-[0.2em]">叮噹多啦A夢漫畫資訊</p>
        </header>

        <div class="flex p-1 bg-slate-200/50 backdrop-blur-md rounded-2xl mb-8 gap-1">
            <button onclick="switchTab('manga')" id="btn-manga" class="flex-1 py-3 text-[10px] sm:text-xs font-black uppercase tracking-widest rounded-xl transition-all bg-blue-600 text-white shadow-md">
                Manga / 漫畫
            </button>
            <button onclick="switchTab('gadgets')" id="btn-gadgets" class="flex-1 py-3 text-[10px] sm:text-xs font-black uppercase tracking-widest rounded-xl transition-all text-slate-500 hover:text-slate-700">
                Gadgets / 法寶
            </button>
            <button onclick="switchTab('animate')" id="btn-animate" class="flex-1 py-3 text-[10px] sm:text-xs font-black uppercase tracking-widest rounded-xl transition-all text-slate-500 hover:text-slate-700">
                Movies-Anime / 電影動畫
            </button>
        </div>

        <div class="viewport-container">
            <div id="tab-slider" class="tab-slider">
                
                <!-- Tab 1: Manga -->
                <div class="tab-pane space-y-8 pr-2">
                    <section class="bg-white/80 backdrop-blur-sm rounded-[2.5rem] p-8 border border-slate-200 shadow-sm space-y-6">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <span class="w-2 h-8 bg-blue-600 rounded-full"></span>
                                <h2 class="text-xl font-black text-slate-800">香港版漫畫</h2>
                            </div>
                            <span class="text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full uppercase">HK Edition</span>
                        </div>
                        <a href="manga-database.html?region=HK" class="group flex items-center justify-between bg-blue-600 p-5 rounded-2xl text-white font-black transition-all hover:bg-blue-700 hover:shadow-lg hover:shadow-blue-200">
                            <span class="tracking-tight text-lg">香港版漫畫資訊列表</span>
                            <span class="transform group-hover:translate-x-2 transition-transform text-xl">→</span>
                        </a>
                    </section>

                    <section class="bg-white/80 backdrop-blur-sm rounded-[2.5rem] p-8 border border-slate-200 shadow-sm space-y-6">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <span class="w-2 h-8 bg-red-600 rounded-full"></span>
                                <h2 class="text-xl font-black text-slate-800">日本版漫畫</h2>
                            </div>
                            <span class="text-[10px] font-black text-red-600 bg-red-50 px-3 py-1 rounded-full uppercase">JP Edition</span>
                        </div>
                        <a href="manga-database.html?region=JP" class="group flex items-center justify-between bg-red-600 p-5 rounded-2xl text-white font-black transition-all hover:bg-red-700 hover:shadow-lg hover:shadow-red-200">
                            <span class="tracking-tight text-lg">日本版漫畫資料列表</span>
                            <span class="transform group-hover:translate-x-2 transition-transform text-xl">→</span>
                        </a>
                    </section>

                    <section class="bg-white/80 backdrop-blur-sm rounded-[2.5rem] p-8 border border-slate-200 shadow-sm space-y-6">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <span class="w-2 h-8 bg-slate-800 rounded-full"></span>
                                <h2 class="text-xl font-black text-slate-800">所有日本原作</h2>
                            </div>
                            <span class="text-[10px] font-black text-slate-600 bg-slate-100 px-3 py-1 rounded-full uppercase">Originals</span>
                        </div>
                        <a href="originalworks.html" class="group flex items-center justify-between bg-slate-800 p-5 rounded-2xl text-white font-black transition-all hover:bg-slate-900 hover:shadow-lg hover:shadow-slate-200">
                            <span class="tracking-tight text-lg">所有日本原作作品列表與搜尋</span>
                            <span class="transform group-hover:translate-x-2 transition-transform text-xl">→</span>
                        </a>
                    </section>
                </div>

                <!-- Tab 2: Gadgets (Modern Indigo/Violet theme) -->
                <div class="tab-pane space-y-8 px-2">
                    <!-- Target Link changed to gadgetmedia.html -->
                    <section class="bg-white/80 backdrop-blur-sm rounded-[2.5rem] p-8 border border-slate-200 shadow-sm space-y-6">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <span class="w-2 h-8 bg-indigo-600 rounded-full"></span>
                                <h2 class="text-xl font-black text-slate-800">法寶記錄</h2>
                            </div>
                            <span class="text-[10px] font-black text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full uppercase">Gadget Archive</span>
                        </div>
                        <a href="gadgetmedia.html" class="group flex items-center justify-between bg-indigo-600 p-5 rounded-2xl text-white font-black transition-all hover:bg-indigo-700 hover:shadow-lg hover:shadow-indigo-200">
                            <span class="tracking-tight text-lg">法寶列表與搜尋</span>
                            <span class="transform group-hover:translate-x-2 transition-transform text-xl">→</span>
                        </a>
                    </section>

                    <!-- Characters & Things moved here from Tab 3 -->
                    <section class="bg-white/80 backdrop-blur-sm rounded-[2.5rem] p-8 border border-slate-200 shadow-sm space-y-6">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <span class="w-2 h-8 bg-violet-600 rounded-full"></span>
                                <h2 class="text-xl font-black text-slate-800">角色人物</h2>
                            </div>
                            <span class="text-[10px] font-black text-violet-600 bg-violet-50 px-3 py-1 rounded-full uppercase">Lore & NPCs</span>
                        </div>
                        <a href="charactersandthings.html" class="group flex items-center justify-between bg-violet-600 p-5 rounded-2xl text-white font-black transition-all hover:bg-violet-700 hover:shadow-lg hover:shadow-violet-200">
                            <span class="tracking-tight text-lg">角色人物事理列表與搜尋</span>
                            <span class="transform group-hover:translate-x-2 transition-transform text-xl">→</span>
                        </a>
                    </section>
                </div>

                <!-- Tab 3: Movies & Anime (Modern Rose/Amber theme) -->
                <div class="tab-pane space-y-8 pl-2">
                    <section class="bg-white/80 backdrop-blur-sm rounded-[2.5rem] p-8 border border-slate-200 shadow-sm space-y-6">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <span class="w-2 h-8 bg-rose-600 rounded-full"></span>
                                <h2 class="text-xl font-black text-slate-800">電影作品</h2>
                            </div>
                            <span class="text-[10px] font-black text-rose-600 bg-rose-50 px-3 py-1 rounded-full uppercase">Cinema</span>
                        </div>
                        <a href="movie.html" class="group flex items-center justify-between bg-rose-600 p-5 rounded-2xl text-white font-black transition-all hover:bg-rose-700 hover:shadow-lg hover:shadow-rose-200">
                            <span class="tracking-tight text-lg">電影作品列表</span>
                            <span class="transform group-hover:translate-x-2 transition-transform text-xl">→</span>
                        </a>
                    </section>

                    <section class="bg-white/80 backdrop-blur-sm rounded-[2.5rem] p-8 border border-slate-200 shadow-sm space-y-6">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <span class="w-2 h-8 bg-amber-500 rounded-full"></span>
                                <h2 class="text-xl font-black text-slate-800">動畫作品</h2>
                            </div>
                            <span class="text-[10px] font-black text-amber-600 bg-amber-50 px-3 py-1 rounded-full uppercase">Animation</span>
                        </div>
                        <a href="animate.html" class="group flex items-center justify-between bg-amber-500 p-5 rounded-2xl text-white font-black transition-all hover:bg-amber-600 hover:shadow-lg hover:shadow-amber-200">
                            <span class="tracking-tight text-lg">動畫作品列表</span>
                            <span class="transform group-hover:translate-x-2 transition-transform text-xl">→</span>
                        </a>
                    </section>
                </div>

            </div>
        </div>

        <footer class="text-center space-y-4 pt-8 pb-12">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">
                Last Updated: <span id="current-date"></span>
            </p>
        </footer>
    </div>

    <script>
        function switchTab(tab) {
            const mangaBtn = document.getElementById('btn-manga');
            const gadgetsBtn = document.getElementById('btn-gadgets');
            const animateBtn = document.getElementById('btn-animate');
            const slider = document.getElementById('tab-slider');

            [mangaBtn, gadgetsBtn, animateBtn].forEach(btn => {
                btn.className = 'flex-1 py-3 text-[10px] sm:text-xs font-black uppercase tracking-widest rounded-xl transition-all text-slate-500 hover:text-slate-700';
            });

            if (tab === 'manga') {
                slider.style.transform = 'translateX(0%)';
                mangaBtn.className = 'flex-1 py-3 text-[10px] sm:text-xs font-black uppercase tracking-widest rounded-xl transition-all bg-blue-600 text-white shadow-md';
            } else if (tab === 'gadgets') {
                slider.style.transform = 'translateX(-33.333%)';
                gadgetsBtn.className = 'flex-1 py-3 text-[10px] sm:text-xs font-black uppercase tracking-widest rounded-xl transition-all bg-indigo-600 text-white shadow-md';
            } else if (tab === 'animate') {
                slider.style.transform = 'translateX(-66.666%)';
                animateBtn.className = 'flex-1 py-3 text-[10px] sm:text-xs font-black uppercase tracking-widest rounded-xl transition-all bg-rose-600 text-white shadow-md';
            }
        }

        document.getElementById('current-date').innerText = new Date().toLocaleDateString('zh-HK', { year: 'numeric', month: 'long', day: 'numeric' });

        window.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && ['c','s','p','u','a'].includes(e.key)) e.preventDefault();
        });
    </script>
</body>
</html>
