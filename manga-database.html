<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>漫畫資料庫完整版</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background: #f4f4f4; padding: 30px; }
header { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
nav a { margin-right:15px; text-decoration:none; color:#333; font-weight:bold; cursor:pointer; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:15px; }
.card { background:white; border-radius:8px; padding:15px; box-shadow:0 2px 6px rgba(0,0,0,0.1); cursor:pointer; }
.card img { width:100%; border-radius:6px; }
.story { padding:5px 0; border-bottom:1px dotted #ddd; font-size:13px; cursor:pointer; }
.story:last-child { border:none; }
#timeline{margin-top:40px;}
.matrix{display:grid; grid-template-columns:200px repeat(auto-fill,80px); gap:4px; margin-top:30px;}
.cell{background:#eee; text-align:center; padding:6px; font-size:12px; border-radius:4px;}
.hit{background:#4CAF50; color:white;}
</style>

</head>
<body>

<header>
<h1>漫畫資料庫完整版</h1>
<nav>
<a onclick="renderSeries()">系列瀏覽</a>
<a onclick="renderTimeline()">出版時間線</a>
</nav>
</header>

<div id="content"></div>
<canvas id="timeline" height="150"></canvas>

<script>
const BASE = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8";
const URLS = {
    hk: BASE + "/出版目録HK",
    jp: BASE + "/出版目録JP",
    volumeStories: BASE + "/書籍收錄作品",
    stories: BASE + "/作品完整列表"
};
const DB = {};

async function loadDatabase(){
    const [hk,jp,volStories,stories] = await Promise.all([
        fetch(URLS.hk).then(r=>r.json()),
        fetch(URLS.jp).then(r=>r.json()),
        fetch(URLS.volumeStories).then(r=>r.json()),
        fetch(URLS.stories).then(r=>r.json())
    ]);

    DB.hkBooks = hk.filter(b=>b.Active==="Yes");
    DB.jpBooks = jp.filter(b=>b.Active==="Yes");
    DB.volumeStories = volStories;
    DB.stories = stories;
    buildIndex();
    renderSeries();
}

function buildIndex(){
    DB.hkByISBN = {};
    DB.jpByISBN = {};
    DB.storiesByISBN = {};
    DB.storyMeta = {};
    DB.storyAppearances = {};

    DB.hkBooks.forEach(b=>DB.hkByISBN[b.ISBN]=b);
    DB.jpBooks.forEach(b=>DB.jpByISBN[b.ISBN]=b);

    DB.volumeStories.forEach(v=>{
        if(!DB.storiesByISBN[v.ISBN]) DB.storiesByISBN[v.ISBN]=[];
        DB.storiesByISBN[v.ISBN].push(v);

        if(!DB.storyAppearances[v.作品番]) DB.storyAppearances[v.作品番]=[];
        DB.storyAppearances[v.作品番].push(v);
    });

    DB.stories.forEach(s=>DB.storyMeta[s.作品番]=s);
}

function renderSeries(){
    const titles = [...new Set(DB.hkBooks.map(b=>b.Title))];
    const html = titles.map(t=>{
        const count = DB.hkBooks.filter(b=>b.Title===t).length;
        return `<div class="card" onclick="renderSeriesVolumes('${t}')">
            <h3>${t}</h3><div>${count} volumes</div>
        </div>`;
    }).join("");
    document.getElementById("content").innerHTML=`<div class="grid">${html}</div>`;
}

function renderSeriesVolumes(title){
    const vols = DB.hkBooks.filter(b=>b.Title===title)
                .sort((a,b)=>parseFloat(a.Volume)-parseFloat(b.Volume));
    const html = vols.map(v=>`<div class="card" onclick="renderVolume('${v.ISBN}')">
        <img src="${v.Image}">
        <h3>${v.Title} ${v.Volume}</h3>
        <div>${v.Subtitle || ""}</div>
    </div>`).join("");
    document.getElementById("content").innerHTML=`<h2>${title}</h2><div class="grid">${html}</div>`;
}

function renderVolume(isbn){
    const hk = DB.hkByISBN[isbn];
    const jp = DB.jpByISBN[hk.ISBN_JP];
    const stories = DB.storiesByISBN[hk.ISBN_JP] || [];
    const storyHTML = stories.map(s=>`<div class="story" onclick="renderStory('${s.作品番}')">
        ${s.收錄話} ${s.副題港譯 || ""}
    </div>`).join("");
    document.getElementById("content").innerHTML = `
        <h2>${hk.Title} ${hk.Volume}</h2>
        <img src="${hk.Image}" style="max-width:200px">
        <p>作者: ${hk.Author}</p>
        <p>出版社: ${hk.Publisher}</p>
        <p>出版日期: ${hk.IssueDate}</p>
        <h3>收錄作品</h3>
        ${storyHTML}
    `;
}

function renderStory(id){
    const meta = DB.storyMeta[id];
    const appearances = DB.storyAppearances[id] || [];
    const rows = appearances.map(a=>{
        const jp = DB.jpByISBN[a.ISBN];
        const hk = DB.hkBooks.find(b=>b.ISBN_JP===a.ISBN);
        return `<div class="card">${jp.系列} Vol ${jp.巻}<br>HK: ${hk ? hk.Volume : "-"}</div>`;
    }).join("");
    document.getElementById("content").innerHTML = `
        <h2>${meta.初出副題}</h2>
        <p>初出掲載誌: ${meta.初出掲載誌}</p>
        <p>初出掲載号: ${meta.初出掲載号}</p>
        <h3>收錄單行本</h3>
        <div class="grid">${rows}</div>
    `;
    renderStoryMatrix(id);
    renderStoryGraph(id);
}

function renderStoryMatrix(id){
    const appearances = DB.storyAppearances[id] || [];
    const volumes = appearances.map(a=>DB.jpByISBN[a.ISBN]);
    let html = `<h3>收錄矩陣</h3><div class="matrix">`;
    html += `<div class="cell">Volume</div>`;
    volumes.forEach(v=>html+=`<div class="cell">${v.巻}</div>`);
    html += `<div class="cell">${id}</div>`;
    volumes.forEach(v=>html+=`<div class="cell hit">●</div>`);
    html += `</div>`;
    document.getElementById("content").innerHTML += html;
}

function renderStoryGraph(id){
    const appearances = DB.storyAppearances[id] || [];
    let html = `<h3>完整出版歷史</h3>`;
    appearances.forEach(a=>{
        const jp = DB.jpByISBN[a.ISBN];
        const hk = DB.hkBooks.find(b=>b.ISBN_JP===a.ISBN);
        html += `<div style="margin-bottom:10px;">
            <strong>Magazine:</strong> ${a.收錄初出掲載誌} #${a.收錄初出掲載号}<br>
            <strong>JP Volume:</strong> ${jp.系列} Vol ${jp.巻}<br>
            <strong>HK Volume:</strong> ${hk ? hk.Title+" "+hk.Volume : "-"}
        </div>`;
    });
    document.getElementById("content").innerHTML += html;
}

function renderTimeline(){
    const stories = Object.values(DB.storyMeta).sort((a,b)=>parseInt(a.初出掲載号||0)-parseInt(b.初出掲載号||0));
    const labels = stories.map(s=>s.初出掲載号);
    const data = stories.map((s,i)=>i+1);
    const ctx = document.getElementById("timeline");
    new Chart(ctx,{
        type:"line",
        data:{
            labels:labels,
            datasets:[{label:"作品發表順序",data:data,borderColor:"blue",fill:false}]
        },
        options:{responsive:true,plugins:{legend:{display:true}}}
    });
    document.getElementById("content").innerHTML="<h2>作品發表時間線</h2>";
}

loadDatabase();
</script>

</body>
</html>
