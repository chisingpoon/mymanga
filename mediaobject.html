<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive | Gadgets, Characters and Things</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none; }
        body { 
            -webkit-user-select: text; user-select: text;
            min-height: 100vh; background-color: #f8fafc; 
            font-family: 'Inter', 'Noto Sans TC', 'Noto Sans JP', system-ui, sans-serif; color: #1e293b;
        }
        .bg-grid { background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to bottom, #e2e8f0 1px, transparent 1px); background-size: 40px 40px; }
        .loader-wrapper { position: fixed; inset: 0; background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 5px solid #e2e8f0; border-top: 5px solid #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .top-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .data-card { background: white; border-radius: 24px; border: 2px solid #f1f5f9; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); min-height: 520px; display: flex; flex-direction: column; }
        .data-card:hover { border-color: #6366f1; transform: translateY(-4px); }
        .tab-btn { transition: all 0.2s ease-in-out; border-bottom: 3px solid transparent; cursor: pointer; }
        .tab-btn:hover:not(.active) { background-color: #f1f5f9; color: #1e293b; border-radius: 8px 8px 0 0; }
        .tab-btn.active { border-color: #6366f1; color: #6366f1; font-weight: 900; }
        .scroll-area { max-height: 320px; overflow-y: auto; scrollbar-width: thin; padding-right: 4px; }
        mark { background: #fef08a; color: #854d0e; padding: 0 2px; border-radius: 2px; font-weight: bold; }
    </style>
</head>
<body class="bg-grid">
    <div id="app" v-cloak>
        <div v-if="loading" class="loader-wrapper">
            <div class="spinner"></div>
            <p class="mt-4 text-[11px] font-black uppercase tracking-widest text-slate-500">Syncing Archive...</p>
        </div>

        <nav class="top-nav">
            <div class="max-w-[1400px] mx-auto px-6 h-20 flex items-center justify-between">
                <div class="flex items-center gap-6">
                    <a href="index.html" class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center text-white shadow-xl">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </a>
                    <h1 class="font-black text-2xl tracking-tighter text-slate-800 uppercase">Gadgets, Characters and Things Archive</h1>
                </div>
            </div>
        </nav>

        <main class="max-w-[1400px] mx-auto px-6 pt-10">
            <div class="flex flex-wrap items-center gap-4 mb-8 bg-white/80 p-4 rounded-2xl backdrop-blur-md border border-slate-200 sticky top-24 z-30 shadow-sm">
                <div class="flex-1 min-w-[250px] relative">
                    <input type="text" v-model.trim="searchQuery" placeholder="Search across all fields..." 
                           class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl pl-4 pr-12 py-2.5 text-sm font-bold outline-none focus:border-indigo-500 transition-all">
                    <button v-if="searchQuery" @click="searchQuery = ''" class="absolute right-3 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-rose-500 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </button>
                </div>
                
                <div class="flex gap-4">
                    <select v-model="selectedClass" @change="handleClassChange" class="bg-slate-50 border-2 border-slate-100 rounded-xl px-3 py-2 text-sm font-black outline-none cursor-pointer">
                        <option value="All">All Class</option>
                        <option v-for="cls in classifications" :key="cls" :value="cls">{{ cls }}</option>
                    </select>

                    <select v-model="selectedType" @change="currentPage = 1" class="bg-slate-50 border-2 border-slate-100 rounded-xl px-3 py-2 text-sm font-black outline-none cursor-pointer">
                        <option value="All">All Types</option>
                        <option v-for="t in filteredObjectTypes" :key="t" :value="t">{{ t }}</option>
                    </select>
                </div>

                <div class="bg-indigo-50 border border-indigo-100 px-4 py-2 rounded-xl flex items-center gap-3 ml-auto">
                    <span class="text-[10px] font-black text-indigo-600 uppercase tracking-widest">Matched</span>
                    <span class="text-xl font-black text-indigo-900">{{ displayData.length }}</span>
                </div>
            </div>

            <div class="grid gap-8 mb-12 grid-cols-1 md:grid-cols-2 lg:grid-cols-3">
                <div v-for="parent in paginatedData" :key="parent['Object ID']" class="data-card p-8 shadow-sm">
                    <div class="mb-6">
                        <div class="flex justify-between items-start mb-4">
                            <span class="px-4 py-1.5 bg-slate-100 text-slate-700 text-xs font-black rounded-xl uppercase tracking-wider">{{ parent['Object Classification'] }}</span>
                            <span class="text-xs font-black text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-xl uppercase tracking-wider">{{ parent['Object Type'] }}</span>
                        </div>
                        <h2 class="text-2xl font-black text-slate-900 leading-tight mb-2" v-html="highlight(parent['JP Title'])"></h2>
                        <div v-if="parent['Description'] && parent['Description'] !== '-'" class="bg-slate-50 border-l-4 border-indigo-500 p-4 rounded-r-xl mb-4">
                            <p class="text-sm text-slate-600 leading-relaxed font-medium" v-html="highlight(parent['Description'])"></p>
                        </div>
                    </div>

                    <div class="mt-auto pt-4 border-t border-slate-100">
                        <div class="flex border-b border-slate-200 mb-4 gap-4">
                            <button @click="setTab(parent['Object ID'], 'movie')" :class="['tab-btn px-2 pb-2 text-[10px] font-black uppercase tracking-wider', getTab(parent['Object ID']) === 'movie' ? 'active' : 'text-slate-400']">Movie ({{ parent.movieAppearances.length }})</button>
                            <button @click="setTab(parent['Object ID'], 'manga')" :class="['tab-btn px-2 pb-2 text-[10px] font-black uppercase tracking-wider', getTab(parent['Object ID']) === 'manga' ? 'active' : 'text-slate-400']">Manga ({{ parent.mangaRecords.length }})</button>
                            <button @click="setTab(parent['Object ID'], 'anime')" :class="['tab-btn px-2 pb-2 text-[10px] font-black uppercase tracking-wider', getTab(parent['Object ID']) === 'anime' ? 'active' : 'text-slate-400']">Anime (0)</button>
                        </div>

                        <div class="tab-content">
                            <div v-if="getTab(parent['Object ID']) === 'movie'">
                                <div v-if="parent.movieAppearances.length > 0" class="scroll-area space-y-3 bg-slate-50/50 p-3 rounded-2xl border border-slate-100">
                                    <div v-for="(child, idx) in parent.movieAppearances" :key="idx" class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:border-indigo-300 transition-all">
                                        <div class="flex flex-col gap-2">
                                            <span class="text-[8px] font-black bg-slate-900 text-white px-2 py-0.5 rounded w-fit uppercase">Movie {{ child.movieYear }}</span>
                                            <span class="text-sm font-black text-slate-800" v-html="'<span class=\'text-[9px] text-slate-400 uppercase font-bold mr-1\'>港譯/</span>' + highlight(child['HK Translation'])"></span>
                                            <a :href="'movie.html?mediaid=' + encodeURIComponent(child['Movie ID'])" target="_blank" class="text-[11px] font-bold text-indigo-500 hover:text-indigo-700 flex items-center gap-1">
                                                <span v-html="highlight(child.movieTitle)"></span>
                                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" stroke-width="2.5" stroke-linecap="round"></path></svg>
                                            </a>
                                        </div>
                                    </div>
                                </div>
                                <p v-else class="text-[10px] font-bold text-slate-300 italic py-4 text-center uppercase">No Movie Data</p>
                            </div>

                            <div v-if="getTab(parent['Object ID']) === 'manga'">
                                <div v-if="parent.mangaInfo" class="mb-4 px-1 space-y-2 border-b border-slate-100 pb-3">
                                    <div class="flex items-center gap-2">
                                        <span class="text-[11px] font-black text-slate-400 uppercase tracking-tighter shrink-0">文傳譯:</span>
                                        <span class="text-base text-slate-900 font-black truncate" v-html="highlight(parent.mangaInfo['CultureCom Trans'] || '-')"></span>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <span class="text-[11px] font-black text-slate-400 uppercase tracking-tighter shrink-0">青文譯:</span>
                                        <span class="text-base text-slate-900 font-black truncate" v-html="highlight(parent.mangaInfo['HKChingWin Trans'] || '-')"></span>
                                    </div>
                                </div>
                                <div v-if="parent.mangaRecords.length > 0" class="scroll-area space-y-3 bg-slate-50/50 p-3 rounded-2xl border border-slate-100">
                                    <div v-for="(rec, idx) in parent.mangaRecords" :key="idx" class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:border-indigo-300 transition-all">
                                        <a :href="'manga-database.html?region=JP&isbn=' + encodeURIComponent(rec.isbn)" target="_blank" class="block group">
                                            <div class="text-xs font-black text-slate-800 flex items-center justify-between">
                                                <span v-html="highlight(`[${rec.type}] ${rec.title} ${rec.vol}`)"></span>
                                                <svg class="w-3 h-3 text-slate-300 group-hover:text-indigo-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" stroke-width="2.5" stroke-linecap="round"></path></svg>
                                            </div>
                                            <div class="text-[9px] text-slate-400 mt-1 font-mono tracking-tighter">{{ rec.isbn }}</div>
                                        </a>
                                    </div>
                                </div>
                                <p v-else class="text-[10px] font-bold text-slate-300 italic py-4 text-center uppercase">No Manga Data</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div v-if="totalPages > 1" class="flex flex-col items-center gap-4 py-12 border-t border-slate-200">
                <div class="flex items-center gap-2">
                    <button @click="changePage(currentPage - 1)" :disabled="currentPage === 1" class="w-10 h-10 flex items-center justify-center bg-white border-2 border-slate-100 rounded-xl disabled:opacity-30">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="3" stroke-linecap="round"></path></svg>
                    </button>
                    <div class="flex gap-2">
                        <button v-for="p in totalPages" :key="p" @click="changePage(p)" :class="['w-10 h-10 rounded-xl text-xs font-black transition-all', currentPage === p ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white border-2 border-slate-100 text-slate-400']">{{ p }}</button>
                    </div>
                    <button @click="changePage(currentPage + 1)" :disabled="currentPage === totalPages" class="w-10 h-10 flex items-center justify-center bg-white border-2 border-slate-100 rounded-xl disabled:opacity-30">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="3" stroke-linecap="round"></path></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp, reactive, watch } = Vue;
        createApp({
            data() {
                return {
                    loading: true, searchQuery: '', selectedClass: 'All', selectedType: 'All', currentPage: 1, itemsPerPage: 12,
                    parentData: [], movieChild: [], movieMeta: [], mangaChild: [], workInclude: [], pubCatalog: [],
                    tabStates: reactive({}) 
                }
            },
            watch: {
                searchQuery() { this.currentPage = 1; }
            },
            async mounted() {
                const base = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/";
                try {
                    const [parents, mChild, mMeta, manChild, works, pubs] = await Promise.all([
                        fetch(base + "人物法寶").then(r => r.json()),
                        fetch(base + "電影人物法寶").then(r => r.json()),
                        fetch(base + "電影動畫").then(r => r.json()),
                        fetch(base + "漫畫人物法寶").then(r => r.json()),
                        fetch(base + "書籍收錄作品").then(r => r.json()),
                        fetch(base + "出版目録JP").then(r => r.json())
                    ]);
                    
                    // Critical Fix: Store data first
                    this.parentData = parents;
                    this.movieChild = mChild; 
                    this.movieMeta = mMeta;
                    this.mangaChild = manChild; 
                    this.workInclude = works; 
                    this.pubCatalog = pubs;

                    // Trigger Search ONLY after data is stored
                    const params = new URLSearchParams(window.location.search);
                    const movieID = params.get('movieid');
                    const isbn = params.get('isbn');

                    if (movieID) {
                        const movie = this.movieMeta.find(m => String(m['Media ID']) === String(movieID));
                        if (movie) { this.searchQuery = movie['JP Title']; }
                    } else if (isbn) {
                        const pub = this.pubCatalog.find(p => String(p['ISBN']) === String(isbn));
                        if (pub) { this.searchQuery = `${pub['類']} ${pub['標題']}`; }
                    }

                    this.loading = false;
                } catch (e) { this.loading = false; }
            },
            methods: {
                highlight(text) {
                    if (!this.searchQuery) return text;
                    const regex = new RegExp(`(${this.searchQuery.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&')})`, 'gi');
                    return String(text).replace(regex, '<mark>$1</mark>');
                },
                getTab(id) { return this.tabStates[id] || 'movie'; },
                setTab(id, tab) { this.tabStates[id] = tab; },
                changePage(p) { this.currentPage = p; window.scrollTo({ top: 0, behavior: 'smooth' }); },
                handleClassChange() { this.selectedType = 'All'; this.currentPage = 1; }
            },
            computed: {
                classifications() { return [...new Set(this.parentData.filter(i => i['Active']?.toLowerCase() === 'yes').map(i => i['Object Classification']))].sort(); },
                filteredObjectTypes() {
                    let allTypes = [...new Set(this.parentData.filter(i => i['Active']?.toLowerCase() === 'yes').map(i => i['Object Type']))].sort();
                    if (this.selectedClass === '法寶') return allTypes.filter(t => t === '法寶');
                    if (this.selectedClass === '人物') return allTypes.filter(t => t !== '法寶');
                    return allTypes;
                },
                displayData() {
                    const q = this.searchQuery.toLowerCase();
                    return this.parentData.filter(p => {
                        if (p['Active']?.toLowerCase() !== 'yes') return false;
                        const matchClass = this.selectedClass === 'All' || p['Object Classification'] === this.selectedClass;
                        const matchType = this.selectedType === 'All' || p['Object Type'] === this.selectedType;
                        if (!(matchClass && matchType)) return false;
                        if (!q) return true;

                        // 1. Check Titles/Description
                        if ((p['JP Title'] || '').toLowerCase().includes(q) || (p['Description'] || '').toLowerCase().includes(q)) return true;

                        // 2. Check Manga/Publisher related titles
                        const manInfo = this.mangaChild.find(c => String(c['Object ID']) === String(p['Object ID']));
                        if (manInfo) {
                            if ((manInfo['CultureCom Trans'] || '').toLowerCase().includes(q) || (manInfo['HKChingWin Trans'] || '').toLowerCase().includes(q)) return true;
                            const works = this.workInclude.filter(w => String(w['作品番']) === String(manInfo['Work ID']));
                            if (works.some(w => {
                                const pub = this.pubCatalog.find(pc => String(pc['ISBN']) === String(w['ISBN']));
                                return pub && ((pub['類'] || '').toLowerCase().includes(q) || (pub['標題'] || '').toLowerCase().includes(q));
                            })) return true;
                        }

                        // 3. Check Movie JP Titles
                        const apps = this.movieChild.filter(c => String(c['Object ID']) === String(p['Object ID']));
                        if (apps.some(c => {
                            const meta = this.movieMeta.find(m => String(m['Media ID']) === String(c['Movie ID']));
                            return meta && (meta['JP Title'] || '').toLowerCase().includes(q);
                        })) return true;

                        return false;
                    }).map(p => {
                        const movieAppearances = this.movieChild.filter(c => String(c['Object ID']) === String(p['Object ID'])).map(c => {
                            const m = this.movieMeta.find(movie => String(movie['Media ID']) === String(c['Movie ID']));
                            return { ...c, movieTitle: m ? m['JP Title'] : 'Unknown', movieYear: (m?.['JP Release Date']?.match(/\d{4}/) || ['N/A'])[0] };
                        });
                        const manInfo = this.mangaChild.find(c => String(c['Object ID']) === String(p['Object ID']));
                        let mangaRecords = [];
                        if (manInfo) {
                            mangaRecords = this.workInclude.filter(w => String(w['作品番']) === String(manInfo['Work ID'])).map(w => {
                                const pub = this.pubCatalog.find(pc => String(pc['ISBN']) === String(w['ISBN']));
                                return { isbn: w['ISBN'], type: pub?.['類'] || 'N/A', title: pub?.['標題'] || 'Unknown', vol: pub?.['巻'] || '' };
                            });
                        }
                        return { ...p, movieAppearances, mangaInfo: manInfo, mangaRecords };
                    });
                },
                totalPages() { return Math.ceil(this.displayData.length / this.itemsPerPage); },
                paginatedData() { 
                    const start = (this.currentPage - 1) * this.itemsPerPage;
                    return this.displayData.slice(start, start + this.itemsPerPage);
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
