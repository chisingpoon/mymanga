<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doraemon Database | 人物法寶圖鑑</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        :root {
            --dora-blue: #0099e5;
            --dora-red: #f03e3e;
            --dora-yellow: #ffdb00;
            --bg-light: #f0f4f8;
            --text-dark: #2c3e50;
        }

        [v-cloak] { display: none; }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
        }

        /* Loading Screen */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        /* Filter Section */
        .controls {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            min-width: 250px;
            padding: 12px 15px;
            border: 2px solid #eef2f7;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus { border-color: var(--dora-blue); }

        select {
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #eef2f7;
            background: white;
            cursor: pointer;
        }

        /* Card Grid */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .item-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            border-top: 6px solid var(--dora-blue);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .item-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
        }

        .card-body { padding: 20px; flex-grow: 1; }

        .card-title {
            margin: 0 0 10px 0;
            font-size: 1.4rem;
            color: var(--dora-blue);
        }

        .card-meta {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .tag {
            background: #f1f3f5;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .description {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #444;
            margin-bottom: 20px;
        }

        /* Tabs Interface */
        .card-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: #95a5a6;
            transition: 0.2s;
        }

        .tab-btn.active {
            color: var(--dora-red);
            background: white;
            border-top: 2px solid var(--dora-red);
        }

        .tab-panel {
            padding: 15px;
            font-size: 0.9rem;
            max-height: 250px;
            overflow-y: auto;
        }

        .appearance-item {
            padding: 6px 0;
            border-bottom: 1px solid #f1f1f1;
        }

        mark { background: var(--dora-yellow); color: black; padding: 0 2px; }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 40px 0;
        }

        .page-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .page-btn.active {
            background: var(--dora-blue);
            color: white;
        }

        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--dora-red);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-size: 20px;
        }
    </style>
</head>
<body>

<div id="app" v-cloak>
    <div v-if="loading" class="loading-overlay">
        <h2>Loading Database...</h2>
        <p>Please wait while we fetch the latest data.</p>
    </div>

    <div v-else>
        <div class="controls">
            <input 
                type="text" 
                :value="searchQuery" 
                @input="handleSearchInput" 
                placeholder="搜尋名稱、描述、ISBN或標題..."
            >
            
            <select v-model="selectedClass" @change="handleClassChange">
                <option value="All">所有分類</option>
                <option v-for="c in classifications" :key="c" :value="c">{{ c }}</option>
            </select>

            <select v-model="selectedType">
                <option value="All">所有類型</option>
                <option v-for="t in filteredObjectTypes" :key="t" :value="t">{{ t }}</option>
            </select>
        </div>

        <div class="card-grid">
            <div v-for="item in paginatedData" :key="item['Object ID']" class="item-card">
                <div class="card-body">
                    <h3 class="card-title" v-html="highlight(item['JP Title'])"></h3>
                    <div class="card-meta">
                        <span class="tag">{{ item['Object Classification'] }}</span>
                        <span class="tag">{{ item['Object Type'] }}</span>
                    </div>
                    <p class="description" v-html="highlight(item['Description'])"></p>
                </div>

                <div class="card-tabs">
                    <button class="tab-btn" :class="{active: getTab(item['Object ID']) === 'movie'}" @click="setTab(item['Object ID'], 'movie')">電影</button>
                    <button class="tab-btn" :class="{active: getTab(item['Object ID']) === 'manga'}" @click="setTab(item['Object ID'], 'manga')">漫畫</button>
                    <button class="tab-btn" :class="{active: getTab(item['Object ID']) === 'anime'}" @click="setTab(item['Object ID'], 'anime')">動畫</button>
                </div>

                <div class="tab-panel">
                    <div v-if="getTab(item['Object ID']) === 'movie'">
                        <div v-if="item.movieAppearances.length === 0">無相關紀錄</div>
                        <div v-for="m in item.movieAppearances" class="appearance-item">
                            <strong>{{ m.movieYear }}</strong> - <span v-html="highlight(m.movieTitle)"></span>
                        </div>
                    </div>

                    <div v-if="getTab(item['Object ID']) === 'manga'">
                        <div v-if="item.mangaRecords.length === 0">無相關紀錄</div>
                        <div v-for="r in item.mangaRecords" class="appearance-item">
                            <span class="tag">{{ r.type }}</span> <span v-html="highlight(r.title)"></span> {{ r.vol }} ({{ r.ch }})
                        </div>
                    </div>

                    <div v-if="getTab(item['Object ID']) === 'anime'">
                        <div v-if="item.animeAppearances.length === 0">無相關紀錄</div>
                        <div v-for="a in item.animeAppearances" class="appearance-item">
                            <strong>{{ a.animeDate }}</strong> - <span v-html="highlight(a.animeTitle)"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="pagination" v-if="totalPages > 1">
            <button 
                class="page-btn" 
                v-for="p in visiblePages" 
                :key="p" 
                @click="p !== '...' ? changePage(p) : null"
                :class="{ active: currentPage === p }"
            >
                {{ p }}
            </button>
        </div>

        <button v-show="showBackToTop" @click="scrollToTop" class="back-to-top">↑</button>
    </div>
</div>

<script>
    const { createApp, reactive, watch, nextTick } = Vue;
    createApp({
        data() {
            return {
                loading: true, 
                searchQuery: '', 
                selectedClass: 'All', 
                selectedType: 'All', 
                currentPage: 1, 
                itemsPerPage: 12,
                parentData: [], movieChild: [], movieMeta: [], mangaChild: [], 
                workInclude: [], pubCatalog: [], animeChild: [], animeMeta: [],
                processedData: [], 
                viewMode: 'card',
                tabStates: reactive({}), 
                showBackToTop: false
            }
        },
        async mounted() {
            window.addEventListener('scroll', this.handleScroll);
            const base = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/";
            try {
                const [parents, mChild, mMeta, manChild, works, pubs, aniChild, aniMeta] = await Promise.all([
                    fetch(base + "人物法寶").then(r => r.json()),
                    fetch(base + "電影人物法寶").then(r => r.json()),
                    fetch(base + "電影動畫").then(r => r.json()),
                    fetch(base + "漫畫人物法寶").then(r => r.json()),
                    fetch(base + "書籍收錄作品").then(r => r.json()),
                    fetch(base + "出版目録JP").then(r => r.json()),
                    fetch(base + "動畫人物法寶").then(r => r.json()),
                    fetch(base + "電視動畫").then(r => r.json())
                ]);
                
                this.parentData = parents; this.movieChild = mChild; this.movieMeta = mMeta;
                this.mangaChild = manChild; this.workInclude = works; this.pubCatalog = pubs;
                this.animeChild = aniChild; this.animeMeta = aniMeta;

                this.processedData = this.parentData
                    .filter(p => String(p['Active']).toLowerCase() === 'yes')
                    .map(p => {
                        const objId = String(p['Object ID']).trim();
                        const movieAppearances = this.movieChild
                            .filter(c => String(c['Object ID']).trim() === objId)
                            .map(c => {
                                const m = this.movieMeta.find(mm => String(mm['Media ID']).trim() === String(c['Movie ID']).trim());
                                return { 
                                    ...c, 
                                    movieTitle: m ? m['JP Title'] : 'Unknown Movie', 
                                    movieYear: m ? (m['JP Release Date']?.match(/\d{4}/) || ['N/A'])[0] : 'N/A' 
                                };
                            });

                        const animeAppearances = this.animeChild
                            .filter(c => String(c['Object ID']).trim() === objId)
                            .map(c => {
                                const a = this.animeMeta.find(am => String(am['Media ID']).trim() === String(c['Anime ID']).trim());
                                return { 
                                    ...c, 
                                    animeTitle: a ? a['JP Title'] : 'Unknown Anime', 
                                    animeDate: a ? a['JP Show Date'] : 'N/A' 
                                };
                            });

                        const mangaInfo = this.mangaChild.find(c => String(c['Object ID']).trim() === objId) || null;
                        let mangaRecords = [];
                        if (mangaInfo) {
                            const workId = String(mangaInfo['Work ID']).trim();
                            mangaRecords = this.workInclude
                                .filter(w => String(w['作品番']).trim() === workId)
                                .map(w => {
                                    const pub = this.pubCatalog.find(pc => String(pc['ISBN']).trim() === String(w['ISBN']).trim());
                                    return { 
                                        isbn: w['ISBN'], 
                                        type: pub ? pub['類'] : 'N/A', 
                                        title: pub ? pub['標題'] : 'Unknown Title', 
                                        vol: pub ? pub['巻'] : '', 
                                        ch: w['收錄話'] 
                                    };
                                });
                        }
                        return { ...p, movieAppearances, animeAppearances, mangaInfo, mangaRecords };
                    });

                this.loading = false;
                await nextTick();
                this.applyUrlParams();
            } catch (e) {
                console.error("Critical Load Error:", e);
                this.loading = false;
            }
        },
        methods: {
            applyUrlParams() {
                const params = new URLSearchParams(window.location.search);
                const movieID = params.get('movieid');
                const isbn = params.get('isbn');
                const animeID = params.get('animeid');
                const fClass = params.get('filterclass');
            
                if (fClass) {
                    this.selectedClass = fClass;
                    this.handleClassChange();
                }
            
                let targetSearch = '';
                if (movieID) {
                    const movie = this.movieMeta.find(m => String(m['Media ID']).trim() === String(movieID).trim());
                    if (movie) {
                        targetSearch = movie['JP Title'];
                        this.processedData.forEach(p => {
                            if (p.movieAppearances.some(ma => String(ma['Movie ID']).trim() === String(movieID).trim())) {
                                this.tabStates[p['Object ID']] = 'movie';
                            }
                        });
                    }
                } 
                if (isbn) {
                    const pub = this.pubCatalog.find(p => String(p['ISBN']).trim() === String(isbn).trim());
                    if (pub) {
                        targetSearch = pub['標題'];
                        this.processedData.forEach(p => {
                            if (p.mangaRecords.some(r => String(r.isbn).trim() === String(isbn).trim())) {
                                this.tabStates[p['Object ID']] = 'manga';
                            }
                        });
                    }
                } 
                if (animeID) {
                    const anime = this.animeMeta.find(a => String(a['Media ID']).trim() === String(animeID).trim());
                    if (anime) {
                        targetSearch = anime['JP Title'];
                        this.processedData.forEach(p => {
                            if (p.animeAppearances.some(aa => String(aa['Anime ID']).trim() === String(animeID).trim())) {
                                this.tabStates[p['Object ID']] = 'anime';
                            }
                        });
                    }
                }
                if (targetSearch) this.searchQuery = targetSearch;
                this.currentPage = 1;
            },
            handleScroll() { this.showBackToTop = window.scrollY > 300; },
            scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); },
            highlight(text) {
                if (!this.searchQuery) return text;
                const escaped = String(this.searchQuery).replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                const regex = new RegExp(`(${escaped})`, 'gi');
                return String(text).replace(regex, '<mark>$1</mark>');
            },
            getTab(id) { return this.tabStates[id] || 'movie'; },
            setTab(id, tab) { this.tabStates[id] = tab; },
            changePage(p) {
                if (p >= 1 && p <= this.totalPages) {
                    this.currentPage = p;
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            },
            handleClassChange() { this.selectedType = 'All'; this.currentPage = 1; },
            handleSearchInput(e) {
                this.searchQuery = e.target.value;
                this.currentPage = 1;
            }
        },
        computed: {
            classifications() { 
                return [...new Set(this.parentData.filter(i => i['Active']?.toLowerCase() === 'yes').map(i => i['Object Classification']))].sort(); 
            },
            filteredObjectTypes() {
                let all = [...new Set(this.parentData.filter(i => i['Active']?.toLowerCase() === 'yes').map(i => i['Object Type']))].sort();
                if (this.selectedClass === '法寶') return all.filter(t => t === '法寶');
                if (this.selectedClass === '人物') return all.filter(t => t !== '法寶');
                return all;
            },
            displayData() {
                if (!this.processedData || this.processedData.length === 0) return [];
                const q = (this.searchQuery || '').toLowerCase().trim();
                return this.processedData.filter(p => {
                    const matchClass = this.selectedClass === 'All' || p['Object Classification'] === this.selectedClass;
                    const matchType = this.selectedType === 'All' || p['Object Type'] === this.selectedType;
                    if (!(matchClass && matchType)) return false;
                    if (!q) return true;
                    const inCore = (p['JP Title'] || '').toLowerCase().includes(q) || 
                                   (p['Confirmed Translation'] || '').toLowerCase().includes(q) ||
                                   (p['Description'] || '').toLowerCase().includes(q);
                    if (inCore) return true;
                    const inManga = p.mangaRecords.some(r => `${r.type} ${r.title}`.toLowerCase().includes(q)) ||
                                     (p.mangaInfo?.['CultureCom Trans'] || '').toLowerCase().includes(q);
                    if (inManga) return true;
                    const inMovie = p.movieAppearances.some(m => m.movieTitle.toLowerCase().includes(q));
                    const inAnime = p.animeAppearances.some(a => a.animeTitle.toLowerCase().includes(q));
                    return inMovie || inAnime;
                });
            },
            totalPages() { return Math.ceil(this.displayData.length / this.itemsPerPage); },
            visiblePages() {
                const total = this.totalPages;
                const current = this.currentPage;
                const range = 2; 
                let pages = [];
                for (let i = 1; i <= total; i++) {
                    if (i === 1 || i === total || (i >= current - range && i <= current + range)) {
                        pages.push(i);
                    } else if (i === current - range - 1 || i === current + range + 1) {
                        if (!pages.includes('...')) pages.push('...');
                    }
                }
                return pages;
            },
            paginatedData() { 
                const start = (this.currentPage - 1) * this.itemsPerPage;
                return this.displayData.slice(start, start + this.itemsPerPage);
            }
        },
        watch: {
            searchQuery() { this.currentPage = 1; },
            selectedClass() { this.currentPage = 1; },
            selectedType() { this.currentPage = 1; }
        }
    }).mount('#app');
</script>
</body>
</html>
