<script>
    const { createApp } = Vue;
    createApp({
        data() {
            return {
                loading: true, searchQuery: '', sortOrder: 'desc', 
                movies: [], mangaCatalog: [], hkCatalog: [], 
                selectedMovie: null, mangaTab: 'JP', fcTab: 'JP'
            }
        },
        computed: {
            sortedMovies() {
                let filtered = this.movies;
                if (this.searchQuery) filtered = this.movies.filter(m => m.searchStr.includes(this.searchQuery.toLowerCase()));
                return [...filtered].sort((a, b) => {
                    const yA = parseInt(a.jpYear) || 0; const yB = parseInt(b.jpYear) || 0;
                    return this.sortOrder === 'asc' ? yA - yB : yB - yA;
                });
            },
            mappedManga() { 
                const data = this.lookup(this.selectedMovie?.mangaRaw);
                if (!data) return null;
                const current = this.mangaTab === 'JP' ? data.jp : data.hk;
                return { current: { ...current, region: this.mangaTab }, hasHk: !!data.hk };
            },
            mappedFilmComic() { 
                const data = this.lookup(this.selectedMovie?.filmComicRaw);
                if (!data) return null;
                const current = this.fcTab === 'JP' ? data.jp : data.hk;
                return { current: { ...current, region: this.fcTab }, hasHk: !!data.hk };
            }
        },
        methods: {
            generateUrl(item) {
                if (!item) return '#';
                const params = new URLSearchParams();
                params.append('region', item.region || 'JP'); 
                params.append('isbn', (item.isbnParam || '').toString().trim());
                params.append('series', (item.series || '').toString().trim());
                return `manga-database.html?${params.toString()}`;
            },
            toggleSort() { this.sortOrder = this.sortOrder === 'desc' ? 'asc' : 'desc'; },
            getVal(obj, key) {
                if (!obj) return '';
                const k = Object.keys(obj).find(x => x.trim().toLowerCase() === key.trim().toLowerCase());
                return k ? obj[k] : '';
            },
            lookup(isbn) {
                if (!isbn) return null;
                const cleanIsbn = isbn.toString().replace(/[-\s]/g, '').trim();
                const jpFound = this.mangaCatalog.find(item => {
                    const iIsbn = (this.getVal(item, 'ISBN') || '').toString().replace(/[-\s]/g, '').trim();
                    return iIsbn === cleanIsbn && iIsbn !== "";
                });
                if (!jpFound) return null;
                const hkMatches = this.hkCatalog.filter(item => {
                    const hkIsbnJp = (this.getVal(item, 'ISBN_JP') || '').toString().replace(/[-\s]/g, '').trim();
                    return hkIsbnJp === cleanIsbn;
                });
                let hkFound = hkMatches.length > 0 ? [...hkMatches].sort((a, b) => new Date(this.getVal(b, 'IssueDate')) - new Date(this.getVal(a, 'IssueDate')))[0] : null;
                return {
                    jp: { title: this.getVal(jpFound, '標題'), subtitle: this.getVal(jpFound, '副標題'), author: this.getVal(jpFound, '著'), image: this.getVal(jpFound, 'image'), isbnParam: (this.getVal(jpFound, 'ISBN') || '').trim(), series: (this.getVal(jpFound, '類') || '').trim() },
                    hk: hkFound ? { title: this.getVal(hkFound, 'Title'), subtitle: this.getVal(hkFound, 'Subtitle'), author: this.getVal(hkFound, 'Author'), image: this.getVal(hkFound, 'Image'), isbnParam: (this.getVal(hkFound, 'ISBN') || '').trim(), series: (this.getVal(hkFound, 'Title') || '').trim() } : null
                };
            },
            selectMovie(m) { 
                this.mangaTab = 'JP'; 
                this.fcTab = 'JP'; 
                this.selectedMovie = m; 
                // Update URL parameter to 'mediaid'
                const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?mediaid=' + encodeURIComponent(m.id);
                window.history.pushState({ path: newUrl }, '', newUrl);
                this.$nextTick(() => window.scrollTo({ top: 0, behavior: 'instant' })); 
            },
            closeDetail() { 
                this.selectedMovie = null; 
                // Clear URL parameters
                const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
                window.history.pushState({ path: newUrl }, '', newUrl);
            },
            async init() {
                try {
                    const [mRes, jpRes, hkRes] = await Promise.all([
                        fetch("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/電影動畫"),
                        fetch("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録JP"),
                        fetch("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録HK") 
                    ]);
                    this.mangaCatalog = await jpRes.json();
                    this.hkCatalog = await hkRes.json(); 
                    const data = await mRes.json();
                    this.movies = data.map(i => {
                        const rawDate = this.getVal(i, 'JP Release Date').toString();
                        return {
                            id: this.getVal(i, 'Media ID').toString().trim(),
                            jpTitle: this.getVal(i, 'JP Title'),
                            hkTitle: this.getVal(i, 'HK Title'),
                            enTitle: this.getVal(i, 'EN Title'),
                            jpDate: rawDate,
                            jpYear: (rawDate.match(/\d{4}/) || [])[0] || '',
                            hkDate: this.getVal(i, 'HK Release Date'),
                            jpImage: this.getVal(i, 'JP Image'),
                            hkImage: this.getVal(i, 'HK Image'),
                            mangaRaw: this.getVal(i, 'Manga ISBN'),
                            filmComicRaw: this.getVal(i, 'Film Comics'),
                            searchStr: `${this.getVal(i, 'JP Title')} ${this.getVal(i, 'HK Title')}`.toLowerCase()
                        };
                    });

                    // Check for URL Parameter "mediaid"
                    const urlParams = new URLSearchParams(window.location.search);
                    const mediaIdParam = urlParams.get('mediaid');
                    if (mediaIdParam) {
                        const target = this.movies.find(m => m.id.toLowerCase() === mediaIdParam.trim().toLowerCase());
                        if (target) {
                            // We call the selection but don't want to re-push the state if it's already there
                            this.selectedMovie = target;
                            this.mangaTab = 'JP';
                            this.fcTab = 'JP';
                        }
                    }

                } catch (e) { console.error(e); } finally { this.loading = false; }
            }
        },
        mounted() { this.init(); }
    }).mount('#app')
</script>
