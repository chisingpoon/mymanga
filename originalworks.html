<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Archive | Original Works</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none; }
        
        html, body { 
            min-height: 100vh;
            background-color: #f8fafc; 
            margin: 0; padding: 0; 
            font-family: 'Inter', 'Noto Sans TC', 'Noto Sans JP', system-ui, sans-serif; 
            color: #1e293b;
            -webkit-user-select: none;
            user-select: none;
            scroll-behavior: smooth;
        }

        .bg-grid {
            background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px), 
                              linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .loader-wrapper {
            position: fixed; inset: 0;
            background: #f8fafc;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999;
        }

        .processing-overlay {
            position: absolute; 
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 500;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #e2e8f0; 
            border-top: 5px solid #4f46e5;
            border-radius: 50%; 
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .pulse-text { animation: pulse 1.5s ease-in-out infinite; }

        .top-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #e2e8f0;
            position: sticky; top: 0; z-index: 100;
        }

        .main-card { position: relative; background: white; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); margin-bottom: 3rem; overflow: hidden; border: 1px solid #e2e8f0; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0; table-layout: auto; }
        th { font-size: 11px; font-weight: 800; padding: 14px 15px; text-align: left; color: #64748b; background: #f8fafc; border-bottom: 2px solid #e2e8f0; white-space: nowrap; position: sticky; top: 0; z-index: 10; }
        td { padding: 16px 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; vertical-align: middle; }

        @media (min-width: 769px) {
            .sticky-col-1 { position: sticky; left: 0; z-index: 20; background: inherit; border-right: 1px solid #f1f5f9; }
            .sticky-col-2 { position: sticky; left: 80px; z-index: 20; background: inherit; border-right: 1px solid #f1f5f9; }
            th.sticky-col-1, th.sticky-col-2 { z-index: 40; }
        }

        .row-focused { background-color: #eef2ff !important; }
        
        .vol-link { display: flex; flex-direction: column; font-size: 9px; font-weight: 800; color: white !important; padding: 6px 8px; border-radius: 8px; line-height: 1.1; text-align: center; min-width: 70px; text-decoration: none !important; transition: transform 0.1s; }
        .vol-link:hover { filter: brightness(110%); transform: translateY(-1px); }
        .vol-link:active { transform: scale(0.95); }
        
        .col-wrap { min-width: 150px; max-width: 350px; word-break: break-word; white-space: normal; line-height: 1.5; }

        .scroll-top-btn {
            position: fixed; bottom: 30px; right: 30px;
            width: 50px; height: 50px;
            background: #1e293b; color: white;
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease; opacity: 0; pointer-events: none; z-index: 600;
        }
        .scroll-top-btn.visible { opacity: 1; pointer-events: auto; }
        .scroll-top-btn:hover { transform: translateY(-5px); background: #4f46e5; }

        @media (max-width: 768px) { .mobile-hide { display: none; } }
    </style>
</head>
<body class="bg-grid">

    <div id="app" v-cloak>
        <div v-if="loading" class="loader-wrapper">
            <div class="spinner"></div>
            <p class="mt-4 text-[10px] font-black uppercase tracking-[0.2em] text-slate-500">Initializing Database</p>
        </div>

        <div class="scroll-top-btn" :class="{ 'visible': showScrollButton }" @click="backToTop">
            <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M14.707 12.707a1 1 0 01-1.414 0L10 9.414l-3.293 3.293a1 1 0 01-1.414-1.414l4-4a1 1 0 011.414 0l4 4a1 1 0 010 1.414z" clip-rule="evenodd" /></svg>
        </div>

        <nav class="top-nav">
            <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <a href="index.html" class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white shadow-lg">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </a>
                    <h1 class="font-black text-xl tracking-tighter text-slate-800 uppercase">Master Archive</h1>
                </div>
            </div>
        </nav>

        <main class="max-w-[1600px] mx-auto px-6 pt-8">
            <div class="mb-8">
                <div class="flex items-end justify-between mb-6">
                    <div>
                        <h2 class="text-3xl font-black text-slate-900 mb-2">Original Works</h2>
                        <div class="flex items-center gap-4 mt-2">
                            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Chronological Publication Record</p>
                            <button @click="toggleAllMagazines" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 px-4 py-1.5 rounded-full text-[10px] font-black uppercase transition-all shadow-sm">
                                {{ activeMagazines.length === sortedMagazines.length ? 'Deselect All' : 'Select All Magazines' }}
                            </button>
                        </div>
                    </div>
                    <button v-if="searchQuery || activeMagazines.length > 0" @click="resetFilters" class="text-[10px] font-black text-rose-500 uppercase hover:underline">✕ Reset All</button>
                </div>

                <div class="flex flex-wrap gap-2">
                    <button v-for="mName in sortedMagazines" :key="mName" 
                        @click="toggleMagazine(mName)" 
                        :class="activeMagazines.includes(mName) ? 'bg-indigo-600 text-white border-indigo-600 shadow-md scale-105' : 'bg-white text-slate-500 border-slate-200 opacity-70 hover:opacity-100'" 
                        class="px-3 py-2 rounded-xl text-[10px] font-black uppercase border-2 transition-all">
                        {{ mName }} <span class="ml-1 opacity-50">{{ magazineStats[mName] }}</span>
                    </button>
                </div>
            </div>

            <div class="main-card">
                <div v-if="processing" class="processing-overlay">
                    <div class="spinner"></div>
                    <p class="mt-4 text-[11px] font-black uppercase tracking-[0.15em] text-slate-700 pulse-text">Updating List...</p>
                </div>

                <div class="p-6 border-b border-slate-100">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <input type="text" v-model="searchQuery" placeholder="Search titles..." class="w-full md:max-w-lg bg-slate-50 border-2 border-slate-100 rounded-2xl px-5 py-3 text-sm font-semibold outline-none focus:border-indigo-500 transition-all">
                        <div class="text-right">
                            <span class="block text-[10px] font-black text-slate-400 uppercase tracking-tighter">Matches</span>
                            <span class="text-sm font-black text-slate-800">{{ filteredData.length }}</span>
                        </div>
                    </div>
                </div>

                <div class="overflow-x-auto min-h-[400px]">
                    <table>
                        <thead>
                            <tr>
                                <th class="sticky-col-1">掲載番</th>
                                <th class="sticky-col-2">初出副題</th>
                                <th>初出掲載誌 / 号</th>
                                <th>大全集副題 (HK)</th>
                                <th>單行本</th>
                                <th>大全集</th>
                                <th class="mobile-hide">其他</th>
                                <th>備考</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template v-for="row in paginatedData" :key="row.作品番">
                                <tr @click="setFocus(row.作品番)" :class="{'row-focused': activeRow === row.作品番}">
                                    <td class="sticky-col-1 font-mono text-slate-400 text-xs">{{ row.掲載番 }}</td>
                                    <td class="sticky-col-2 font-extrabold text-slate-800 col-wrap">{{ row.初出副題 }}</td>
                                    <td class="whitespace-nowrap">
                                        <div class="font-bold text-slate-700 leading-tight">{{ row.初出掲載誌 }}</div>
                                        <div class="text-[11px] text-blue-500 font-black mt-1 uppercase">{{ row.初出掲載号 }}</div>
                                    </td>
                                    <td class="col-wrap">
                                        <div class="font-bold text-slate-600 text-[13px]">{{ getSubtitleInfo(row.作品番).pubSub }}</div>
                                        <div class="text-indigo-600 text-[11px] font-bold">{{ getSubtitleInfo(row.作品番).hkSub }}</div>
                                    </td>
                                    <td>
                                        <a v-if="m = getMapping(row.作品番, ['45卷', 'カラー作品集', 'プラス'])" 
                                           :href="'manga-database.html?isbn=' + m.hkIsbn + '&region=HK'"
                                           target="_blank"
                                           @click.stop
                                           class="vol-link bg-emerald-500">
                                            <span>{{m.type}}</span><span>V{{m.vol}}</span>
                                        </a>
                                    </td>
                                    <td>
                                        <a v-if="m = getMapping(row.作品番, ['大全集', '大長編大全集'])" 
                                           :href="'manga-database.html?isbn=' + m.hkIsbn + '&region=HK'"
                                           target="_blank"
                                           @click.stop
                                           class="vol-link bg-indigo-500">
                                            <span>大全集</span><span>V{{m.vol}}</span>
                                        </a>
                                    </td>
                                    <td class="mobile-hide">
                                        <a v-if="m = getMapping(row.作品番, ['0卷', 'ドラミちゃん', '文庫版'])" 
                                           :href="'manga-database.html?isbn=' + m.hkIsbn + '&region=HK'"
                                           target="_blank"
                                           @click.stop
                                           class="vol-link bg-slate-600">
                                            <span>{{m.type}}</span><span>V{{m.vol}}</span>
                                        </a>
                                    </td>
                                    <td class="text-slate-400 italic text-[11px] col-wrap pr-4">{{ row.備考 }}</td>
                                </tr>
                                <tr v-if="activeRow === row.作品番" class="md:hidden bg-indigo-50/30">
                                    <td colspan="8" class="p-4 border-b border-indigo-100">
                                        <div class="flex flex-wrap gap-2">
                                            <a v-for="type in ['0卷', 'ドラミちゃん', '文庫版', 'とっておき', 'ぴっかぴかコミックス']" 
                                                v-if="m = (type === 'ぴっかぴかコミックス' ? getMappingPrefix(row.作品番, type) : getMapping(row.作品番, [type]))"
                                                :href="'manga-database.html?isbn=' + m.hkIsbn + '&region=HK'"
                                                target="_blank"
                                                @click.stop
                                                class="px-3 py-2 bg-white border border-slate-200 rounded-lg text-[10px] font-black uppercase shadow-sm text-slate-700">
                                                {{type}} V{{m.vol}}
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>

                <div class="bg-slate-50 p-8 flex justify-center border-t border-slate-100">
                    <div class="flex gap-2">
                        <button v-for="p in paginationRange" :key="p" @click="p !== '...' ? changePage(p) : null" :class="p === currentPage ? 'bg-slate-900 text-white shadow-lg' : 'bg-white text-slate-500'" class="w-10 h-10 flex items-center justify-center rounded-xl font-black text-xs transition-all">{{ p }}</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    loading: true, processing: false, searchQuery: '', activeMagazines: [],
                    currentPage: 1, itemsPerPage: 50, activeRow: null, showScrollButton: false,
                    master: [], contents: [], publishHk: []
                }
            },
            computed: {
                magazineStats() {
                    const stats = {};
                    this.master.forEach(r => { if (r.初出掲載誌) { const n = r.初出掲載誌.trim(); stats[n] = (stats[n] || 0) + 1; } });
                    return stats;
                },
                sortedMagazines() {
                    return Object.keys(this.magazineStats).sort((a, b) => a.localeCompare(b, 'zh-Hant'));
                },
                filteredData() {
                    const q = this.searchQuery.toLowerCase().trim();
                    return this.master.filter(r => {
                        const sub = this.getSubtitleInfo(r.作品番);
                        const combinedText = [r.掲載番, r.初出副題, sub.pubSub, sub.hkSub, r.初出掲載誌, r.初出掲載号, r.備考].join(' ').toLowerCase();
                        return (q === '' || combinedText.includes(q)) && (this.activeMagazines.length === 0 || this.activeMagazines.includes(r.初出掲載誌?.trim()));
                    });
                },
                totalPages() { return Math.ceil(this.filteredData.length / this.itemsPerPage) || 1; },
                paginatedData() { return this.filteredData.slice((this.currentPage - 1) * this.itemsPerPage, this.currentPage * this.itemsPerPage); },
                paginationRange() {
                    const current = this.currentPage, last = this.totalPages, range = [];
                    for (let i = 1; i <= last; i++) { if (i == 1 || i == last || (i >= current - 2 && i <= current + 2)) range.push(i); }
                    const res = []; let l;
                    for (let i of range) { if (l && i - l !== 1) res.push('...'); res.push(i); l = i; }
                    return res;
                }
            },
            methods: {
                async init() {
                    try {
                        const [m, c, h] = await Promise.all([
                            fetch("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/作品完整列表").then(r => r.json()),
                            fetch("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/書籍收錄作品").then(r => r.json()),
                            fetch("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録HK").then(r => r.json())
                        ]);
                        this.master = m.filter(r => r.作品番);
                        this.contents = c; this.publishHk = h;
                        this.checkUrlParameters();
                        window.addEventListener('scroll', () => { this.showScrollButton = window.scrollY > 400; });
                    } catch (e) { console.error(e); } finally { setTimeout(() => { this.loading = false; }, 400); }
                },
                checkUrlParameters() {
                    const params = new URLSearchParams(window.location.search);
                    const mag = params.get('mag');
                    if (mag) this.activeMagazines = mag.split(',');
                },
                triggerProcessing(callback) {
                    this.processing = true;
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            setTimeout(() => {
                                callback();
                                this.processing = false;
                            }, 20);
                        });
                    });
                },
                toggleMagazine(m) {
                    this.triggerProcessing(() => {
                        const i = this.activeMagazines.indexOf(m);
                        if (i > -1) this.activeMagazines.splice(i, 1);
                        else this.activeMagazines.push(m);
                        this.updateUrl();
                        this.currentPage = 1;
                    });
                },
                toggleAllMagazines() {
                    this.triggerProcessing(() => {
                        if (this.activeMagazines.length === this.sortedMagazines.length) {
                            this.activeMagazines = [];
                        } else {
                            this.activeMagazines = [...this.sortedMagazines];
                        }
                        this.updateUrl();
                        this.currentPage = 1;
                    });
                },
                updateUrl() {
                    const url = new URL(window.location);
                    if (this.activeMagazines.length) url.searchParams.set('mag', this.activeMagazines.join(','));
                    else url.searchParams.delete('mag');
                    window.history.pushState({}, '', url);
                },
                backToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); },
                getMapping(workId, types) {
                    if(!workId) return null;
                    const id = workId.toString().trim();
                    const match = this.contents.find(c => c.作品番?.toString().trim() === id && types.includes(c.類));
                    return this.processMatch(match);
                },
                getMappingPrefix(workId, prefix) {
                    if(!workId) return null;
                    const id = workId.toString().trim();
                    const match = this.contents.find(c => c.作品番?.toString().trim() === id && c.類?.startsWith(prefix));
                    return this.processMatch(match);
                },
                processMatch(match) {
                    if (!match || !match.ISBN) return null;
                    const cleanIsbn = match.ISBN.trim();
                    const hk = this.publishHk.find(h => h.ISBN_JP === cleanIsbn || h.ISBN === cleanIsbn);
                    return hk ? { vol: match.卷 || match.巻, hkIsbn: hk.ISBN, type: match.類 } : null;
                },
                getSubtitleInfo(workId) {
                    const id = workId?.toString().trim();
                    const match = this.contents.find(c => c.作品番?.toString().trim() === id && (c.類 === '大全集' || c.類 === '大長編大全集'));
                    return match ? { pubSub: match.出版副題, hkSub: match.副題港譯 } : { pubSub: '', hkSub: '' };
                },
                setFocus(id) { this.activeRow = (this.activeRow === id) ? null : id; },
                resetFilters() { 
                    this.triggerProcessing(() => {
                        this.searchQuery = ''; this.activeMagazines = []; this.activeRow = null; 
                        window.history.pushState({}, '', window.location.pathname);
                        this.currentPage = 1;
                    });
                },
                changePage(p) { 
                    this.triggerProcessing(() => {
                        this.currentPage = p; 
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    });
                }
            },
            mounted() { this.init(); }
        }).mount('#app')
    </script>
</body>
</html>
