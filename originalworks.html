<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Archive | Large View</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none; }
        body { 
            -webkit-user-select: none; 
            user-select: none; 
            font-size: 18px; /* Increased base font size */
        }
        .bg-grid {
            background-color: #f8fafc;
            background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
            background-size: 50px 50px;
        }
        .filter-scroll::-webkit-scrollbar { width: 6px; }
        .filter-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        td, th { white-space: nowrap; padding: 1.25rem !important; }
        input, button { font-size: 1.1rem !important; }
    </style>
</head>
<body class="bg-grid text-slate-900 font-sans min-h-screen relative overflow-x-hidden" oncontextmenu="return false;">

    <div id="app" v-cloak>
        <header class="bg-white/90 backdrop-blur-md border-b sticky top-0 z-40 shadow-md">
            <div class="max-w-[98%] mx-auto px-6 h-20 flex items-center justify-between">
                <div class="flex items-center gap-6">
                    <a href="index.html" class="w-12 h-12 bg-slate-900 rounded-xl flex items-center justify-center text-white shadow-lg hover:scale-105 transition-all">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </a>
                    <h1 class="font-black text-2xl tracking-tighter text-slate-800 uppercase">Master Archive</h1>
                </div>
            </div>
        </header>

        <main class="max-w-[98%] mx-auto py-10 px-6">
            
            <div v-if="loading" class="flex flex-col items-center justify-center py-40">
                <div class="w-16 h-16 border-8 border-slate-200 border-t-indigo-600 rounded-full animate-spin"></div>
                <p class="mt-6 text-lg font-black text-slate-400 uppercase tracking-widest">Loading Records...</p>
            </div>

            <div v-else>
                <div class="bg-white rounded-[2.5rem] shadow-lg border border-slate-200 p-8 mb-6">
                    <div class="grid grid-cols-1 lg:grid-cols-4 gap-10">
                        <div class="space-y-4">
                            <label class="text-sm font-black text-slate-400 uppercase tracking-widest">Search Keywords</label>
                            <input type="text" v-model="searchQuery" placeholder="Search title or remarks..." 
                                class="w-full bg-slate-50 border-2 border-slate-200 rounded-2xl py-4 px-6 font-bold focus:ring-4 focus:ring-indigo-500/20 outline-none transition-all">
                        </div>

                        <div class="lg:col-span-3 space-y-4">
                            <label class="text-sm font-black text-slate-400 uppercase tracking-widest">Magazine Filter</label>
                            <div class="flex flex-wrap gap-3 max-h-48 overflow-y-auto filter-scroll p-1">
                                <button v-for="(count, mag) in magazineStats" :key="mag" 
                                    @click="toggleMagazine(mag)"
                                    :class="activeMagazines.includes(mag) ? 'bg-indigo-600 text-white border-indigo-600 shadow-indigo-200' : 'bg-white text-slate-600 border-slate-200 hover:border-indigo-400'"
                                    class="px-5 py-2.5 rounded-2xl border-2 font-bold transition-all shadow-md flex items-center gap-3">
                                    {{ mag }} <span class="bg-slate-100 text-slate-500 px-2 py-0.5 rounded-lg text-xs" :class="activeMagazines.includes(mag) ? 'bg-indigo-400 text-white' : ''">{{ count }}</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="px-8 py-5 mb-6 bg-indigo-50 border-2 border-indigo-100 rounded-[2rem] flex items-center justify-between">
                    <span class="font-black text-indigo-900 uppercase tracking-widest">Found {{ filteredData.length }} Records</span>
                    <button @click="resetFilters" class="text-sm font-black text-indigo-500 uppercase hover:underline decoration-2">Clear All Filters</button>
                </div>

                <div class="bg-white rounded-[3rem] shadow-xl border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="text-xs font-black text-slate-400 uppercase tracking-widest border-b-2 bg-slate-50/50">
                                <tr>
                                    <th class="px-8 py-6">掲載番</th>
                                    <th class="px-8 py-6">初出副題</th>
                                    <th class="px-8 py-6">初出掲載誌</th>
                                    <th class="px-8 py-6">初出掲載號</th>
                                    <th class="px-8 py-6">初出掲載頁</th>
                                    <th class="px-8 py-6 text-center bg-indigo-50/50 text-indigo-600">大全集</th>
                                    <th class="px-8 py-6">備考</th>
                                </tr>
                            </thead>
                            <tbody class="text-[17px] divide-y-2 divide-slate-50">
                                <tr v-for="row in paginatedData" :key="row.作品番" class="hover:bg-slate-50/80 transition-colors">
                                    <td class="px-8 py-6 font-bold text-slate-400">{{ row.掲載番 }}</td>
                                    <td class="px-8 py-6 font-black text-slate-900">{{ row.初出副題 }}</td>
                                    <td class="px-8 py-6 font-bold text-slate-600">{{ row.初出掲載誌 }}</td>
                                    <td class="px-8 py-6 text-slate-500 font-medium">{{ row.初出掲載号 }}</td>
                                    <td class="px-8 py-6 text-slate-500 font-medium">{{ row.初出掲載頁 }}</td>
                                    
                                    <td class="px-8 py-6 text-center">
                                        <template v-if="getDQSMapping(row.作品番)">
                                            <a :href="'publishjp.html?isbn=' + getDQSMapping(row.作品番).ISBN" 
                                               class="inline-flex items-center justify-center bg-indigo-600 text-white px-6 py-2 rounded-2xl text-sm font-black hover:bg-indigo-700 hover:scale-105 transition-all shadow-lg shadow-indigo-100">
                                                Vol. {{ getDQSMapping(row.作品番).巻 }}
                                            </a>
                                        </template>
                                        <span v-else class="text-slate-200">——</span>
                                    </td>

                                    <td class="px-8 py-6 text-slate-400 italic font-medium truncate max-w-sm">{{ row.備考 }}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="p-10 border-t-2 bg-slate-50/30 flex items-center justify-between">
                        <button @click="currentPage--" :disabled="currentPage === 1" class="px-10 py-4 bg-white border-2 border-slate-200 rounded-2xl font-black disabled:opacity-20 hover:border-indigo-500 transition-all">PREV</button>
                        <span class="font-black text-slate-400 uppercase tracking-widest text-sm">Page {{ currentPage }} of {{ totalPages }}</span>
                        <button @click="currentPage++" :disabled="currentPage === totalPages" class="px-10 py-4 bg-white border-2 border-slate-200 rounded-2xl font-black disabled:opacity-20 hover:border-indigo-500 transition-all">NEXT</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    loading: true,
                    searchQuery: '', activeMagazines: [],
                    currentPage: 1, itemsPerPage: 50,
                    master: [], contents: [], books: []
                }
            },
            watch: {
                searchQuery() { this.updateURL(); this.currentPage = 1; },
                activeMagazines: { handler() { this.updateURL(); this.currentPage = 1; }, deep: true }
            },
            computed: {
                magazineStats() {
                    const stats = {};
                    this.master.forEach(r => {
                        if (r.初出掲載誌) {
                            const name = r.初出掲載誌.trim();
                            stats[name] = (stats[name] || 0) + 1;
                        }
                    });
                    return stats;
                },
                filteredData() {
                    const q = this.searchQuery.toLowerCase().trim();
                    const hasMags = this.activeMagazines.length > 0;
                    return this.master.filter(r => {
                        const matchesText = !q || (r.初出副題||'').toLowerCase().includes(q) || (r.備考||'').toLowerCase().includes(q);
                        const matchesMag = !hasMags || this.activeMagazines.includes(r.初出掲載誌?.trim());
                        return matchesText && matchesMag;
                    });
                },
                totalPages() { return Math.ceil(this.filteredData.length / this.itemsPerPage) || 1; },
                paginatedData() {
                    const start = (this.currentPage - 1) * this.itemsPerPage;
                    return this.filteredData.slice(start, start + this.itemsPerPage);
                }
            },
            methods: {
                async init() {
                    try {
                        const [m, c, b] = await Promise.all([
                            fetch("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/作品完整列表").then(r => r.json()),
                            fetch("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/書籍收錄作品").then(r => r.json()),
                            fetch("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録JP").then(r => r.json())
                        ]);
                        this.master = m;
                        this.contents = c;
                        this.books = b;

                        const p = new URLSearchParams(window.location.search);
                        if (p.get('q')) this.searchQuery = decodeURIComponent(p.get('q'));
                        if (p.get('mag')) {
                            const requested = p.get('mag').split(',').map(m => decodeURIComponent(m).trim());
                            this.activeMagazines = requested.filter(m => this.magazineStats[m]);
                        }
                    } catch (e) { console.error("Loading error:", e); } finally { this.loading = false; }
                },
                getDQSMapping(workId) {
                    if (!workId) return null;
                    // Logic: Match 作品番 and filter by 類 in the 書籍收錄作品 sheet
                    const record = this.contents.find(c => {
                        if (c.作品番?.toString().trim() !== workId.toString().trim()) return false;
                        // Find the book type in the books sheet
                        const bType = this.books.find(b => b.ISBN === c.ISBN);
                        return bType && (bType.類 === "大全集" || bType.類 === "大長編大全集");
                    });
                    
                    if (!record) return null;
                    
                    // Display the '巻' from the books master list
                    const bInfo = this.books.find(b => b.ISBN === record.ISBN);
                    return bInfo ? { 巻: bInfo.巻, ISBN: bInfo.ISBN } : null;
                },
                toggleMagazine(mag) {
                    const idx = this.activeMagazines.indexOf(mag);
                    if (idx > -1) this.activeMagazines.splice(idx, 1);
                    else this.activeMagazines.push(mag);
                },
                resetFilters() {
                    this.searchQuery = ''; this.activeMagazines = []; this.currentPage = 1;
                },
                updateURL() {
                    const url = new URL(window.location);
                    if (this.searchQuery) url.searchParams.set('q', this.searchQuery); else url.searchParams.delete('q');
                    if (this.activeMagazines.length > 0) url.searchParams.set('mag', this.activeMagazines.join(',')); else url.searchParams.delete('mag');
                    window.history.replaceState({}, '', url);
                }
            },
            mounted() { this.init(); }
        }).mount('#app')
    </script>
</body>
</html>
