<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Archive | Robust Version</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none; }
        body { -webkit-user-select: none; user-select: none; }
        .bg-grid {
            background-color: #f8fafc;
            background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .filter-scroll::-webkit-scrollbar { width: 4px; }
        .filter-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        td, th { white-space: nowrap; }
    </style>
</head>
<body class="bg-grid text-slate-900 font-sans min-h-screen relative overflow-x-hidden" oncontextmenu="return false;">

    <div id="app" v-cloak>
        <header class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-40 shadow-sm">
            <div class="max-w-[98%] mx-auto px-4 h-16 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <a href="index.html" class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white shadow-lg hover:scale-105 transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </a>
                    <h1 class="font-black text-xl tracking-tighter text-slate-800 uppercase">Master Archive</h1>
                </div>
            </div>
        </header>

        <main class="max-w-[98%] mx-auto py-6 px-4">
            
            <div v-if="error" class="flex flex-col items-center justify-center py-32 bg-white rounded-[2rem] border-2 border-dashed border-red-200">
                <div class="text-red-500 mb-4 font-black">CONNECTION ERROR</div>
                <p class="text-slate-500 text-sm mb-6">{{ error }}</p>
                <button @click="forceRefresh" class="px-8 py-3 bg-slate-900 text-white rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-indigo-600 transition-all">Retry Sync</button>
            </div>

            <div v-else-if="loading" class="flex flex-col items-center justify-center py-32">
                <div class="w-12 h-12 border-4 border-slate-200 border-t-indigo-600 rounded-full animate-spin"></div>
                <p class="mt-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Syncing with Google Database...</p>
            </div>

            <div v-else>
                <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 p-6 mb-4">
                    <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                        <div class="space-y-4">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Live Search</label>
                            <div class="relative">
                                <input type="text" v-model="searchQuery" placeholder="Search records..." 
                                    class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 pl-10 pr-4 text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                                <svg class="w-4 h-4 absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2.5"></path></svg>
                            </div>
                            <button @click="resetFilters" class="text-[9px] font-black text-indigo-500 uppercase hover:underline">Reset All</button>
                        </div>

                        <div class="lg:col-span-3 space-y-4">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center justify-between">
                                Magazine Filter
                                <span class="bg-slate-100 px-2 py-0.5 rounded text-slate-500 text-[9px]">{{ activeMagazines.length }} Selected</span>
                            </label>
                            <div class="flex flex-wrap gap-2 max-h-32 overflow-y-auto filter-scroll p-1">
                                <button v-for="(count, mag) in magazineStats" :key="mag" 
                                    @click="toggleMagazine(mag)"
                                    :class="activeMagazines.includes(mag) ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-slate-600 border-slate-200 hover:border-indigo-300'"
                                    class="px-3 py-1.5 rounded-xl border text-[11px] font-bold transition-all flex items-center gap-2 shadow-sm">
                                    {{ mag }}
                                    <span class="opacity-50 text-[9px]">{{ count }}</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex items-center justify-between px-6 py-3 mb-4 bg-indigo-50/50 border border-indigo-100 rounded-2xl">
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-indigo-500"></span>
                            <span class="text-[11px] font-black text-indigo-900 uppercase tracking-widest">Found {{ filteredData.length }} Results</span>
                        </div>
                    </div>
                    <div class="text-[10px] font-black text-slate-400 uppercase">Page {{ currentPage }} / {{ totalPages }}</div>
                </div>

                <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b bg-slate-50">
                                <tr>
                                    <th class="px-6 py-5 w-20">#</th>
                                    <th class="px-6 py-5 w-80">Story Title</th>
                                    <th class="px-6 py-5 w-40">Magazine</th>
                                    <th v-for="col in mappingColumns" :key="col" class="px-6 py-5 bg-indigo-50/20 text-indigo-600 border-x border-slate-100/30 text-center">
                                        {{ col }}
                                    </th>
                                    <th class="px-6 py-5">Remarks</th>
                                </tr>
                            </thead>
                            <tbody class="text-[13px] divide-y divide-slate-50">
                                <tr v-for="row in paginatedData" :key="row.作品番" class="hover:bg-slate-50/50 transition-colors">
                                    <td class="px-6 py-5 font-black text-slate-300">{{ row.作品番 }}</td>
                                    <td class="px-6 py-5">
                                        <div class="font-black text-slate-900">{{ row.初出副題 }}</div>
                                        <div class="text-[11px] text-slate-400 font-bold">{{ row.全集副題 }}</div>
                                    </td>
                                    <td class="px-6 py-5">
                                        <span class="bg-slate-100 px-2 py-1 rounded text-[11px] font-bold text-slate-600">{{ row.初出掲載誌 }}</span>
                                    </td>
                                    
                                    <td v-for="col in mappingColumns" :key="col" class="px-4 py-5 border-x border-slate-50/50 text-center">
                                        <template v-if="cachedMappings[row.作品番] && cachedMappings[row.作品番][col]">
                                            <a :href="'publishjp.html?isbn=' + cachedMappings[row.作品番][col].ISBN" 
                                               class="inline-flex items-center justify-center bg-white border border-indigo-100 px-3 py-1.5 rounded-xl shadow-sm hover:border-indigo-500 transition-all">
                                                <span class="font-black text-indigo-600 text-[10px]">Vol. {{ cachedMappings[row.作品番][col].巻 }}</span>
                                            </a>
                                        </template>
                                        <div v-else class="text-slate-100">-</div>
                                    </td>

                                    <td class="px-6 py-5 text-slate-400 italic text-[11px] truncate max-w-xs">{{ row.備考 }}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="p-6 border-t bg-slate-50/50 flex items-center justify-between">
                        <button @click="currentPage--" :disabled="currentPage === 1" class="px-6 py-2 bg-white border border-slate-200 rounded-xl text-[10px] font-black disabled:opacity-20">PREV</button>
                        <div class="flex gap-2">
                             <button v-for="p in visiblePages" :key="p" @click="currentPage = p" 
                                :class="p === currentPage ? 'bg-indigo-600 text-white' : 'bg-white text-slate-400'"
                                class="w-8 h-8 rounded-lg text-[10px] font-black transition-all">
                                {{ p }}
                             </button>
                        </div>
                        <button @click="currentPage++" :disabled="currentPage === totalPages" class="px-6 py-2 bg-white border border-slate-200 rounded-xl text-[10px] font-black disabled:opacity-20">NEXT</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    loading: true, error: null, refreshing: false,
                    searchQuery: '', activeMagazines: [],
                    currentPage: 1, itemsPerPage: 50,
                    master: [], contents: [], books: [],
                    mappingColumns: ["単行本", "第0巻", "ドラミちゃん", "大全集"],
                    cachedMappings: {}
                }
            },
            watch: {
                searchQuery() { this.updateURL(); this.currentPage = 1; },
                activeMagazines: { handler() { this.updateURL(); this.currentPage = 1; }, deep: true },
                paginatedData: {
                    handler(newVal) { if(newVal.length) this.computeVisibleMappings(newVal); },
                    immediate: true
                }
            },
            computed: {
                magazineStats() {
                    const stats = {};
                    this.master.forEach(r => {
                        if (r.初出掲載誌) {
                            const t = r.初出掲載誌.trim();
                            stats[t] = (stats[t] || 0) + 1;
                        }
                    });
                    return stats;
                },
                filteredData() {
                    const q = this.searchQuery.toLowerCase().trim();
                    const hasMags = this.activeMagazines.length > 0;
                    return this.master.filter(r => {
                        const mText = !q || (r.初出副題||'').toLowerCase().includes(q) || (r.全集副題||'').toLowerCase().includes(q) || (r.作品番||'').toString().includes(q);
                        const mMag = !hasMags || this.activeMagazines.includes(r.初出掲載誌?.trim());
                        return mText && mMag;
                    });
                },
                totalPages() { return Math.ceil(this.filteredData.length / this.itemsPerPage) || 1; },
                paginatedData() {
                    const start = (this.currentPage - 1) * this.itemsPerPage;
                    return this.filteredData.slice(start, start + this.itemsPerPage);
                },
                visiblePages() {
                    let start = Math.max(1, this.currentPage - 2);
                    let end = Math.min(this.totalPages, start + 4);
                    if (end - start < 4) start = Math.max(1, end - 4);
                    const pages = [];
                    for (let i = start; i <= end; i++) pages.push(i);
                    return pages;
                }
            },
            methods: {
                async init() {
                    this.loading = true;
                    this.error = null;

                    try {
                        // 1. Fetch with Timeout
                        const fetchWithTimeout = (url) => {
                            return Promise.race([
                                fetch(url).then(r => {
                                    if(!r.ok) throw new Error("Sheet response not OK");
                                    return r.json();
                                }),
                                new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout")), 10000))
                            ]);
                        };

                        const [m, c, b] = await Promise.all([
                            fetchWithTimeout("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/作品完整列表"),
                            fetchWithTimeout("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/書籍收錄作品"),
                            fetchWithTimeout("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録JP")
                        ]);

                        if (!m || !c || !b) throw new Error("Empty Data Received");

                        this.master = m.filter(r => r.作品番);
                        this.contents = c;
                        this.books = b;
                        
                        // 2. Initialize URL Params
                        const p = new URLSearchParams(window.location.search);
                        if (p.get('q')) this.searchQuery = decodeURIComponent(p.get('q'));
                        if (p.get('mag')) {
                            const requested = p.get('mag').split(',').map(m => decodeURIComponent(m).trim());
                            this.activeMagazines = requested.filter(m => this.magazineStats[m]);
                        }

                        this.loading = false;
                    } catch (e) {
                        console.error("Init Error:", e);
                        this.error = "Failed to load database. This can happen if the Google Sheet is busy or your connection is unstable.";
                        this.loading = false;
                    }
                },
                computeVisibleMappings(rows) {
                    const newMappings = { ...this.cachedMappings };
                    rows.forEach(row => {
                        if (!newMappings[row.作品番]) {
                            const rowMap = {};
                            this.mappingColumns.forEach(cat => {
                                const found = this.contents.find(c => c.作品番?.toString().trim() === row.作品番?.toString().trim() && 
                                    this.books.find(b => b.ISBN === c.ISBN && b.類 === cat));
                                if (found) {
                                    const bInfo = this.books.find(b => b.ISBN === found.ISBN);
                                    rowMap[cat] = { 巻: bInfo.巻, ISBN: bInfo.ISBN };
                                }
                            });
                            newMappings[row.作品番] = rowMap;
                        }
                    });
                    this.cachedMappings = newMappings;
                },
                toggleMagazine(mag) {
                    const idx = this.activeMagazines.indexOf(mag);
                    if (idx > -1) this.activeMagazines.splice(idx, 1);
                    else this.activeMagazines.push(mag);
                },
                resetFilters() {
                    this.searchQuery = ''; this.activeMagazines = []; this.currentPage = 1;
                },
                updateURL() {
                    const url = new URL(window.location);
                    if (this.searchQuery) url.searchParams.set('q', this.searchQuery); else url.searchParams.delete('q');
                    if (this.activeMagazines.length) url.searchParams.set('mag', this.activeMagazines.join(',')); else url.searchParams.delete('mag');
                    window.history.replaceState({}, '', url);
                },
                forceRefresh() {
                    localStorage.clear();
                    window.location.reload();
                }
            },
            mounted() {
                this.init();
            }
        }).mount('#app')
    </script>
</body>
</html>
