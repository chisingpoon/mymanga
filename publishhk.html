<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>香港版漫畫資料</title>

<style>
body {
  font-family: Arial;
  padding: 30px;
  background: #f5f5f5;
}

.controls {
  margin-bottom: 20px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.controls input,
.controls select {
  padding: 8px 10px;
  font-size: 14px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

@media (max-width: 768px) {

  .controls {
    flex-direction: column;
    align-items: stretch;
  }

  .controls input,
  .controls select {
    width: 100%;
    font-size: 16px;   /* better for touch */
  }

}
.page-header {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding-bottom: 15px;

.site-title {

}

.header-link {
  text-decoration: none;

}

.header-link:hover {
  background: #333;

}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));

}

.card {
  background: white;
  border-radius: 8px;

  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;

  border-radius: 6px;
}

.price {
  color: green;
  font-weight: bold;
  margin-top: 5px;
}

.detail-container {
  display: flex;
  gap: 20px;
  align-items: stretch;  /* important */
}

.detail-left {
  width: 35%;
}

.detail-left img {
  width: 100%;
  height: 100%;
  object-fit: contain;   /* show full image */
  display: block;
}

.detail-right {
  width: 65%;
}

.detail-row {
  margin-bottom: 8px;
}

.detail-description {
  margin-top: 15px;
}

.detail-description p {
  margin-top: 5px;
  line-height: 1.6;
}

.modal-content {
  display: flex;
  flex-direction: column;
}

.modal-box {
  background: white;
  width: 90%;
  max-width: 900px;
  margin: 5% auto;
  padding: 20px;
  border-radius: 8px;
  position: relative;
  display: flex;
}

#pagination button {
  margin: 0 4px;
  padding: 6px 10px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
  border-radius: 4px;
}

#pagination button:hover:not(:disabled) {
  background: #f0f0f0;
}

#pagination button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.active-page {
  background: #333 !important;
  color: white;
  font-weight: bold;
}

#pagination {
  margin-top: 20px;
  text-align: center;
}

#pagination button {
  margin: 0 4px;
  padding: 6px 10px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
  border-radius: 4px;
}

#pagination button:hover:not(:disabled) {
  background: #f0f0f0;
}

#pagination button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.active-page {
  background: #333 !important;
  color: white;
  font-weight: bold;
}

.ellipsis {
  margin: 0 6px;
  color: #888;
}

#detailContent {
  width: 100%;
}

.layout {
  display: flex;
  gap: 20px;
}

.sidebar {
  width: 260px;
  background: white;
  padding: 15px;
  border-radius: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  height: fit-content;
}

.sidebar h3 {
  margin-top: 12px;
  margin-bottom: 6px;
  font-size: 14px;
}

.sidebar input,
.sidebar select {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.sidebar {
  font-size: 13px;
}

.sidebar label {
  margin-bottom: 3px;
}

.sidebar label {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
  font-size: 13px;
  cursor: pointer;
}

.sidebar input[type="checkbox"] {
  width: auto;
  margin: 0;
}

#searchInput {
  width: 100%;
  box-sizing: border-box;
  padding: 6px 8px;
  font-size: 13px;
  margin-bottom: 8px;
}

.content {
  flex: 1;
}

/* Mobile */
@media (max-width: 900px) {
  .layout {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
  }
}

/* Collapsible filter styling */
.sidebar details {
  margin-bottom: 10px;
  border-bottom: 1px solid #eee;
  padding-bottom: 8px;
}

.sidebar summary {
  font-weight: bold;
  cursor: pointer;
  list-style: none;
  font-size: 14px;
  margin-bottom: 6px;
}

.sidebar summary::-webkit-details-marker {
  display: none;
}

.sidebar summary::after {
  content: "▾";
  float: right;
  transition: transform 0.2s ease;
}

.sidebar details[open] summary::after {
  transform: rotate(180deg);
}

/* Search Wrapper */
.search-wrapper {
  position: relative;
  margin-bottom: 6px;
}

.search-wrapper input {
  width: 100%;
  box-sizing: border-box;
  padding: 6px 28px 6px 28px;
  font-size: 13px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* Clear button */
#clearFiltersBtn:hover {
  background: #f0f0f0;
}
  
.clear-btn {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  cursor: pointer;
  color: #888;
  display: none;
}

.clear-btn:hover {
  color: #000;
}

/* Result counter */
.result-count {
  font-size: 12px;
  color: #666;
  margin-bottom: 10px;
}

.filter-group {
  max-height: 250px;   /* scroll if long */
  overflow-y: auto;
  padding-right: 5px;
}
</style>
</head>

<body>

<header class="page-header">
  <div class="header-left">
    <h1 class="site-title">香港版漫畫資料</h1>
  </div>

  <div class="header-right">
    <a href="publishjp.html" class="header-link">日本版漫畫資料</a>
    <a href="alloriginalworks.html" class="header-link">日本原作資料</a>
  </div>
</header>

<div class="layout">

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar">
    <button id="clearFiltersBtn" onclick="clearAllFilters()" style="margin-bottom:10px; width:100%; padding:6px 0; font-size:13px; border-radius:6px; border:1px solid #ccc; cursor:pointer;">
      清除所有篩選
    </button>
  
    <h3>排序</h3>
    <select id="sortIssueDate" onchange="applyFilters()">
      <option value="">按出版日期</option>
      <option value="newest">從新到舊</option>
      <option value="oldest">從舊到新</option>
    </select>

    <select id="sortPrice" onchange="applyFilters()">
      <option value="">按售價</option>
      <option value="low">從低到高</option>
      <option value="high">從高到低</option>
    </select>

    <h3>搜尋</h3>
    <div class="search-wrapper">
      <input type="text"
             id="searchInput"
             placeholder="任何文字搜尋..."
             oninput="handleSearchInput()">
      <span class="clear-btn" onclick="clearSearch()">×</span>
    </div>
    <div id="resultCount" class="result-count"></div>
    
    <details>
      <summary>書名</summary>
      <div id="titleFilter" class="filter-group"></div>
    </details>
    
    <details>
      <summary>出版社</summary>
      <div id="publisherFilter" class="filter-group"></div>
    </details>

    <details>
      <summary>作者</summary>
      <div id="authorFilter" class="filter-group"></div>
    </details>

    <details>
      <summary>出版地區</summary>
      <div id="originCountryFilter" class="filter-group"></div>
    </details>


  </aside>

  <!-- RIGHT CONTENT -->
  <main class="content">
    <div id="pagination"></div>
    <div class="grid" id="mangalist">Loading...</div>
  </main>

</div>

<script>
const SHEET_URL = "https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/出版目録HK";
let sheetData = [];
let currentPage = 1;
const itemsPerPage = 20;   // change this to 8, 16, etc.
let currentList = [];      // you already use this for modal nav

fetch(SHEET_URL)
  .then(res => res.json())
  .then(data => {

    // Only keep Active = Yes
    sheetData = data.filter(row =>
      row.Active?.toLowerCase() === "yes"
    );
    populateTitles(); 
    populatePublishers();
    populateAuthors();
    populateOriginCountries();
    applyUrlFilters();
    applyFilters();
  })
  .catch(error => {
    document.getElementById("mangalist").innerHTML = "Failed to load data.";
    console.error(error);
  });
function getUrlParams() {
  const params = new URLSearchParams(window.location.search);
  const obj = {};
  for (const [key, value] of params.entries()) {
    obj[key] = value;
  }
  return obj;
}

function applyUrlFilters() {
  const params = getUrlParams();

  // Search
  if (params.search) {
    const searchInput = document.getElementById("searchInput");
    searchInput.value = decodeURIComponent(params.search);
    document.querySelector(".clear-btn").style.display = searchInput.value ? "block" : "none";
  }

  // Sorts
  if (params.sortPrice) {
    document.getElementById("sortPrice").value = params.sortPrice;
  }

  if (params.sortIssueDate) {
    document.getElementById("sortIssueDate").value = params.sortIssueDate;
  }

  // Helper to check checkboxes and open parent <details>
  function checkAndOpen(containerId, values) {
    if (!values) return;
    const items = values.split(",");
    items.forEach(val => {
      const checkbox = document.querySelector(`#${containerId} input[value="${val}"]`);
      if (checkbox) {
        checkbox.checked = true;
        // Open the parent <details>
        const details = checkbox.closest("details");
        if (details) details.open = true;
      }
    });
  }

  checkAndOpen("titleFilter", params.title);
  checkAndOpen("publisherFilter", params.publisher);
  checkAndOpen("authorFilter", params.author);
  checkAndOpen("originCountryFilter", params.originCountry);
}

function clearAllFilters() {
  // Clear search input
  const searchInput = document.getElementById("searchInput");
  searchInput.value = "";

  // Clear all checkboxes
  document.querySelectorAll('.sidebar input[type="checkbox"]').forEach(cb => {
    cb.checked = false;
  });

  // Reset sort selects
  document.getElementById("sortIssueDate").value = "";
  document.getElementById("sortPrice").value = "";

  // Hide the clear (×) button
  const clearBtn = document.querySelector(".clear-btn");
  if (clearBtn) clearBtn.style.display = "none";

  // Apply filters again to refresh list
  applyFilters();
}

function populateTitles() {
  const container = document.getElementById("titleFilter");
  if (!container) return;

  const titles = [...new Set(sheetData.map(row => row.Title))];

  titles.forEach(title => {
    const label = document.createElement("label");

    label.innerHTML = `
      <input type="checkbox" value="${title}"
             onchange="applyFilters()"> ${title}
    `;

    container.appendChild(label);
  });
}

function populatePublishers() {
  const container = document.getElementById("publisherFilter");
  const publishers = [...new Set(sheetData.map(row => row.Publisher))];

  publishers.forEach(pub => {
    const label = document.createElement("label");

    label.innerHTML = `
      <input type="checkbox" value="${pub}"
             onchange="applyFilters()"> ${pub}
    `;

    container.appendChild(label);
  });
}



function populateAuthors() {
  const container = document.getElementById("authorFilter");
  const authors = [...new Set(sheetData.map(row => row.Author))];

  authors.forEach(author => {
    const label = document.createElement("label");

    label.innerHTML = `
      <input type="checkbox" value="${author}"
             onchange="applyFilters()"> ${author}
    `;

    container.appendChild(label);
  });
}

function populateOriginCountries() {
  const container = document.getElementById("originCountryFilter");
  const origins = [...new Set(sheetData.map(row => row.OriginCountry))];

  origins.forEach(origin => {
    const label = document.createElement("label");

    label.innerHTML = `
      <input type="checkbox" value="${origin}"
             onchange="applyFilters()"> ${origin}
    `;

    container.appendChild(label);
  });
}

function openDetail(id) {

  currentIndex = currentList.findIndex(d => d.ISBN === id);
  const detail = currentList[currentIndex];

  if (!detail) {
    document.getElementById("detailContent").innerHTML =
      "No detail found.";
  } else {
    document.getElementById("detailContent").innerHTML = `
  <div class="detail-container">

    <div class="detail-left">
      <img src="${detail.Image || ""}" 
      alt="${detail.Title} ${detail.Volume}"      
      onclick="openLightbox('${detail.Image}')"
      style="cursor: zoom-in;">
    </div>

    <div class="detail-right">
      <h1>${detail.Title || ""} ${detail.Volume || ""}</h1>
      <h2>${detail.Subtitle || ""}</h2>
      <div class="detail-row"><strong>日文書名: </strong>${detail.OriginalTitle || ""} ${detail.Volume || ""}  ${detail.OriginalSubtitle || ""}</div>  
      <div class="detail-row"><strong>作者: </strong>${detail.Author || ""}</div>
      <div class="detail-row"><strong>出版社: </strong> ${detail.Publisher || ""}</div>
      <div class="detail-row"><strong>尺碼: </strong> ${detail.Size || ""}</div>
      <div class="detail-row date"><strong>出版日期: </strong> ${detail.IssueDate || ""}</div>
      <div class="detail-row price"><strong>售價: </strong> $${detail.Price || ""}</div>
      <div class="detail-row"><strong>頁數: </strong> ${detail.Page || ""}</div>
      <div class="detail-row"><strong>出版地區: </strong> ${detail.OriginCountry || ""}</div>      
      <div class="detail-row"><strong>ISBN:</strong> ${detail.ISBN || ""}</div>
    </div>

  </div>
  <button onclick="prevItem()" style="position:absolute; left:10px; top:50%;">◀</button>
  <button onclick="nextItem()" style="position:absolute; right:10px; top:50%;">▶</button>
    `;
  }

  document.getElementById("detailModal").style.display = "block";
}

function handleSearchInput() {
  const input = document.getElementById("searchInput");
  const clearBtn = document.querySelector(".clear-btn");

  clearBtn.style.display = input.value ? "block" : "none";
  applyFilters();
}

function clearSearch() {
  const input = document.getElementById("searchInput");
  const clearBtn = document.querySelector(".clear-btn");

  input.value = "";
  clearBtn.style.display = "none";
  applyFilters();
}


function closeModal() {
  document.getElementById("detailModal").style.display = "none";
}

function openLightbox(src) {
  document.getElementById("lightboxImg").src = src;
  document.getElementById("imageLightbox").style.display = "flex";
}

function closeLightbox() {
  document.getElementById("imageLightbox").style.display = "none";
}

function nextItem() {
  if (currentIndex < currentList.length - 1) {
    currentIndex++;
    openDetail(currentList[currentIndex].ISBN);
  }
}


function closeModal() {
  document.getElementById("detailModal").style.display = "none";
}

function openLightbox(src) {
  document.getElementById("lightboxImg").src = src;
  document.getElementById("imageLightbox").style.display = "flex";
}

function closeLightbox() {
  document.getElementById("imageLightbox").style.display = "none";
}

function nextItem() {
  if (currentIndex < currentList.length - 1) {
    currentIndex++;
    openDetail(currentList[currentIndex].ISBN);
  }
}

function prevItem() {
  if (currentIndex > 0) {
    currentIndex--;
    openDetail(currentList[currentIndex].ISBN);
  }
}
  
function applyFilters() {

  const search = document.getElementById("searchInput").value.toLowerCase();
  const publisher = [...document.querySelectorAll('#publisherFilter input:checked')]
  .map(cb => cb.value);
  const title = [...document.querySelectorAll('#titleFilter input:checked')]
  .map(cb => cb.value);
  const author = [...document.querySelectorAll('#authorFilter input:checked')]
  .map(cb => cb.value);
  const originCountry = [...document.querySelectorAll('#originCountryFilter input:checked')]
  .map(cb => cb.value);
  const sortPrice = document.getElementById("sortPrice").value; 
  const sortIssueDate = document.getElementById("sortIssueDate").value;
  
  let filtered = sheetData.filter(row => {

//    const searchMatch =
//      row.Title?.toLowerCase().includes(search);
    const searchMatch = Object.values(row)
      .join(" ")
      .toLowerCase()
      .includes(search);

    const publisherMatch =
      publisher.length === 0 || publisher.includes(row.Publisher);

    const titleMatch =
      title.length === 0 || title.includes(row.Title);

    const authorMatch =
      author.length === 0 || author.includes(row.Author);

    const originCountryMatch =
      originCountry.length === 0 || originCountry.includes(row.OriginCountry);
    
    return searchMatch && publisherMatch && titleMatch && authorMatch && originCountryMatch;
  });

  // Sort price
  if (sortPrice === "low") {
    filtered.sort((a,b) => Number(a.Price) - Number(b.Price));
  }

  if (sortPrice === "high") {
    filtered.sort((a,b) => Number(b.Price) - Number(a.Price));
  }

  // Sort Issue Date
  if (sortIssueDate === "newest") {
    filtered.sort((a, b) => new Date(b.IssueDate) - new Date(a.IssueDate) );
  }

  if (sortIssueDate === "oldest") {
    filtered.sort((a, b) => new Date(a.IssueDate) - new Date(b.IssueDate)  );
  }


//  document.getElementById("mangalist").innerHTML =
//    filtered.length ? html : "No Manga found.";
  currentList = filtered;
  currentPage = 1; // reset to first page when filtering

  document.getElementById("resultCount").textContent =
  `共 ${filtered.length} 本作品`;
  renderPage();
}

function renderPage() {

  const start = (currentPage - 1) * itemsPerPage;
  const end = start + itemsPerPage;
  const pageItems = currentList.slice(start, end);

  const html = pageItems.map(row => `
<!--    <div class="card" onclick="openDetail('${row.ISBN}')"> -->
<!--    <div class="card" onclick="location.href='bookdetail.html?isbn=${row.ISBN}'"> -->
<!--   <div class="card" onclick="window.open('bookdetail.html?isbn=${row.ISBN}', '_blank')">  -->
    <div class="card" onclick="window.open('bookdetails.html?isbnhk=${row.ISBN}&isbnjp=${row.ISBN_JP}', '_blank')">
      <img src="${row.Image}" alt="${row.Title}">
      <h3>書名: ${row.Title} ${row.Volume}</h3>
      <h4>${row.Subtitle}</h4>
      <div>作者: ${row.Author}</div>
      <div>出版社: ${row.Publisher}</div>
      <div class="date">出版日期: ${row.IssueDate}</div>
    </div>
  `).join("");

  document.getElementById("mangalist").innerHTML =
    pageItems.length ? html : "No Manga found.";

  renderPaginationControls();
}

function renderPaginationControls() {

  const totalPages = Math.ceil(currentList.length / itemsPerPage);

  if (totalPages <= 1) {
    document.getElementById("pagination").innerHTML = "";
    return;
  }

  let html = "";

  // ----- Page Info -----
  html += `<div style="margin-bottom:10px;">
             Page ${currentPage} of ${totalPages}
           </div>`;

  // ----- First -----
  html += `
    <button onclick="changePage(1)" ${currentPage === 1 ? "disabled" : ""}>
      &laquo; First
    </button>
  `;

  // ----- Prev -----
  html += `
    <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? "disabled" : ""}>
      &lsaquo; Prev
    </button>
  `;

  // ----- Page Numbers Logic -----

  const maxVisible = 5;
  let startPage = Math.max(1, currentPage - 2);
  let endPage = Math.min(totalPages, currentPage + 2);

  // Adjust window if near edges
  if (currentPage <= 3) {
    endPage = Math.min(totalPages, maxVisible);
  }

  if (currentPage >= totalPages - 2) {
    startPage = Math.max(1, totalPages - (maxVisible - 1));
  }

  // Always show page 1
  if (startPage > 1) {
    html += `<button onclick="changePage(1)">1</button>`;
    if (startPage > 2) {
      html += `<span class="ellipsis">...</span>`;
    }
  }

  // Middle Pages
  for (let i = startPage; i <= endPage; i++) {
    html += `
      <button onclick="changePage(${i})"
        ${i === currentPage ? "class='active-page'" : ""}>
        ${i}
      </button>
    `;
  }

  // Always show last page
  if (endPage < totalPages) {
    if (endPage < totalPages - 1) {
      html += `<span class="ellipsis">...</span>`;
    }
    html += `<button onclick="changePage(${totalPages})">${totalPages}</button>`;
  }

  // ----- Next -----
  html += `
    <button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? "disabled" : ""}>
      Next &rsaquo;
    </button>
  `;

  // ----- Last -----
  html += `
    <button onclick="changePage(${totalPages})" ${currentPage === totalPages ? "disabled" : ""}>
      Last &raquo;
    </button>
  `;

  document.getElementById("pagination").innerHTML = html;
}

function changePage(page) {

  const totalPages = Math.ceil(currentList.length / itemsPerPage);

  if (page < 1 || page > totalPages) return;

  currentPage = page;
  renderPage();

  window.scrollTo({ top: 0, behavior: "smooth" });
}

  
  document.addEventListener("contextmenu", function(e) {
    if (e.target.tagName === "IMG") {
      e.preventDefault();
    }
  });
  document.addEventListener("keydown", function(e) {
    if (e.key === "F12") {
      e.preventDefault();
    }
  });
</script>
<div id="detailModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6);">
  <div class="modal-box">
    <button onclick="closeModal()" style="position:absolute; right:10px; top:10px;">X</button>
    <div id="detailContent"></div>
  </div>
</div>

<div id="imageLightbox" onclick="closeLightbox()" style="
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:2000;
">
  <img id="lightboxImg" style="
    max-width:90%;
    max-height:90%;
    object-fit:contain;
    cursor:zoom-out;
  ">
</div>
</body>
</html>
