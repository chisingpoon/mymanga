<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Twists Feed</title>
    <style>
        body {
            background-color: #15202b; /* X Dark Theme */
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
            font-family: sans-serif;
        }
        .feed-card {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="feed-card">
        <a class="twitter-timeline" 
           data-height="800" 
           data-theme="dark" 
           href="https://twitter.com/doraemonChannel?ref_src=twsrc%5Etfw">
           Loading Twists...
        </a> 
        
        <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
    </div>

</body>
</html>
