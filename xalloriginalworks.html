<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本原作目録 | Master Archive</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none; }
        body { -webkit-user-select: none; user-select: none; }
        .bg-grid {
            background-color: #f8fafc;
            background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px), linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
            background-size: 40px 40px;
        }
        /* Custom scrollbar for filter lists */
        .filter-scroll::-webkit-scrollbar { width: 4px; }
        .filter-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-grid text-slate-900 font-sans min-h-screen relative overflow-x-hidden" oncontextmenu="return false;">

    <div id="app" v-cloak>
        <header class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-40 shadow-sm">
            <div class="max-w-[95%] mx-auto px-4 h-16 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <a href="index.html" class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white shadow-lg hover:scale-105 transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </a>
                    <h1 class="font-black text-xl tracking-tighter text-slate-800 uppercase">Original Works</h1>
                </div>

                <div class="hidden md:flex items-center gap-2">
                    <a href="publishhk.html" class="px-4 py-2 text-[10px] font-black uppercase text-slate-500 hover:text-blue-600 transition-colors">HK Archive</a>
                    <a href="publishjp.html" class="px-4 py-2 text-[10px] font-black uppercase text-slate-500 hover:text-red-600 transition-colors">JP Archive</a>
                </div>
            </div>
        </header>

        <main class="max-w-[95%] mx-auto py-8 relative z-10">
            
            <div v-if="loading" class="flex flex-col items-center justify-center py-32 animate-pulse">
                <div class="w-12 h-12 border-4 border-slate-200 border-t-indigo-600 rounded-full animate-spin"></div>
                <p class="mt-4 font-black text-slate-400 uppercase tracking-widest text-[10px]">Loading Master Database...</p>
            </div>

            <div v-else>
                <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 p-6 mb-8">
                    <div class="flex flex-col lg:flex-row gap-6">
                        <div class="flex-1 space-y-4">
                            <div class="relative">
                                <input type="text" v-model="searchQuery" placeholder="Search across all titles..." 
                                    class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-3 pl-12 pr-4 text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                                <svg class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2.5"></path></svg>
                            </div>
                            <div class="flex items-center justify-between">
                                <button @click="clearFilters" class="text-[10px] font-black uppercase text-indigo-600 hover:underline">Clear All Filters</button>
                                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Results: {{ filteredData.length }}</span>
                            </div>
                        </div>

                        <div class="flex-[2] grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div v-for="filter in filterConfigs" :key="filter.id" class="space-y-2">
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">{{ filter.label }}</label>
                                <div class="h-24 overflow-y-auto border border-slate-100 rounded-xl p-2 bg-slate-50/50 filter-scroll">
                                    <div v-for="val in getUniqueValues(filter.col)" :key="val" class="flex items-center gap-2 mb-1">
                                        <input type="checkbox" :value="val" v-model="activeFilters[filter.col]" :id="val" class="rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 w-3 h-3">
                                        <label :for="val" class="text-[10px] font-bold text-slate-600 truncate cursor-pointer">{{ val }}</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left table-fixed min-w-[1200px]">
                            <thead class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b bg-slate-50">
                                <tr>
                                    <th v-for="col in tableColumns" :key="col" @click="sortBy(col)" 
                                        class="px-6 py-4 cursor-pointer hover:text-indigo-600 transition-colors">
                                        <div class="flex items-center gap-1">
                                            {{ col }}
                                            <span v-if="sortCol === col">{{ sortDir === 'asc' ? '▲' : '▼' }}</span>
                                        </div>
                                    </th>
                                </tr>
                            </thead>
                            <tbody class="text-[13px] divide-y divide-slate-50">
                                <tr v-for="row in paginatedData" :key="row.作品番" class="hover:bg-indigo-50/30 transition-colors">
                                    <td v-for="col in tableColumns" :key="col" class="px-6 py-4 font-medium text-slate-700">
                                        {{ row[col] || '-' }}
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="p-6 border-t bg-slate-50/50 flex items-center justify-between">
                        <span class="text-[10px] font-black text-slate-400 uppercase">Page {{ currentPage }} of {{ totalPages }}</span>
                        <div class="flex gap-1">
                            <button @click="currentPage--" :disabled="currentPage === 1" class="px-4 py-2 bg-white border border-slate-200 rounded-lg text-[10px] font-black disabled:opacity-30">PREV</button>
                            <button @click="currentPage++" :disabled="currentPage === totalPages" class="px-4 py-2 bg-white border border-slate-200 rounded-lg text-[10px] font-black disabled:opacity-30">NEXT</button>
                        </div>
                    </div>
                </div>

                <footer class="mt-20 py-10 text-center space-y-4">
                    <button @click="forceRefresh" class="inline-flex items-center gap-2 px-6 py-2 bg-white border border-slate-200 rounded-full text-[10px] font-black uppercase text-slate-400 hover:text-indigo-600 transition-all shadow-sm">
                        <svg class="w-3 h-3" :class="refreshing ? 'animate-spin' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                        {{ refreshing ? 'Updating...' : 'Sync Master Data' }}
                    </button>
                </footer>
            </div>
        </main>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    loading: true, refreshing: false,
                    searchQuery: '', sortCol: '作品番', sortDir: 'asc',
                    currentPage: 1, itemsPerPage: 50,
                    masterList: [],
                    activeFilters: {
                        "初出掲載誌": [], "単行本": [], "大全集": [], "作品類": []
                    },
                    filterConfigs: [
                        { id: 'mag', label: '初出掲載誌', col: '初出掲載誌' },
                        { id: 'tanko', label: '単行本系列', col: '単行本' },
                        { id: 'zenshu', label: '大全集系列', col: '大全集' },
                        { id: 'type', label: '作品類', col: '作品類' }
                    ],
                    tableColumns: ["初出掲載誌","初出掲載号","初出副題","全集副題","全集副題香港譯名","単行本","大全集","備考"]
                }
            },
            computed: {
                filteredData() {
                    let data = this.masterList.filter(row => {
                        // Text Search
                        const textMatch = Object.values(row).join(' ').toLowerCase().includes(this.searchQuery.toLowerCase());
                        
                        // Checkbox Filters
                        const filterMatch = Object.keys(this.activeFilters).every(col => {
                            if (this.activeFilters[col].length === 0) return true;
                            return this.activeFilters[col].includes(row[col]);
                        });

                        return textMatch && filterMatch;
                    });

                    // Sorting
                    return data.sort((a, b) => {
                        let valA = a[this.sortCol] || '';
                        let valB = b[this.sortCol] || '';
                        return this.sortDir === 'asc' 
                            ? valA.toString().localeCompare(valB, 'ja', {numeric: true})
                            : valB.toString().localeCompare(valA, 'ja', {numeric: true});
                    });
                },
                totalPages() { return Math.ceil(this.filteredData.length / this.itemsPerPage) || 1; },
                paginatedData() {
                    const start = (this.currentPage - 1) * this.itemsPerPage;
                    return this.filteredData.slice(start, start + this.itemsPerPage);
                }
            },
            methods: {
                async init() {
                    const cached = localStorage.getItem('manga_master_cache');
                    if (cached) {
                        this.masterList = JSON.parse(cached);
                        this.loading = false;
                    }

                    try {
                        const res = await fetch("https://opensheet.elk.sh/1Ker7vSVvehFJw_D7271lONLKs3b0UGj7OIF2aHK3kG8/作品完整列表");
                        const data = await res.json();
                        this.masterList = data.filter(r => r.作品番);
                        localStorage.setItem('manga_master_cache', JSON.stringify(this.masterList));
                    } catch (e) { console.error(e); } finally { this.loading = false; }
                },
                async forceRefresh() {
                    this.refreshing = true;
                    localStorage.removeItem('manga_master_cache');
                    await this.init();
                    this.refreshing = false;
                },
                getUniqueValues(col) {
                    return [...new Set(this.masterList.map(r => r[col]).filter(Boolean))].sort();
                },
                sortBy(col) {
                    if (this.sortCol === col) this.sortDir = this.sortDir === 'asc' ? 'desc' : 'asc';
                    else { this.sortCol = col; this.sortDir = 'asc'; }
                },
                clearFilters() {
                    this.searchQuery = '';
                    Object.keys(this.activeFilters).forEach(k => this.activeFilters[k] = []);
                }
            },
            mounted() { this.init(); }
        }).mount('#app')
    </script>
</body>
</html>
